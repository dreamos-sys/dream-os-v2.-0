<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center | Dream OS v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --emerald: #10b981;
            --gold: #fbbf24;
            --blue: #3b82f6;
            --orange: #f59e0b;
            --purple: #a855f7;
            --red: #ef4444;
            --cyan: #06b6d4;
            --bg: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #020617 0%, #1e293b 100%);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            padding: 1rem;
            min-height: 100vh;
        }

        /* CRYSTAL CARD */
        .crystal-card {
            background: var(--bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        /* AI INSIGHT */
        .ai-insight {
            background: linear-gradient(135deg, rgba(16,185,129,0.1) 0%, rgba(59,130,246,0.1) 100%);
            border: 1px solid rgba(16,185,129,0.3);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            position: relative;
        }
        .ai-insight::before {
            content: '🤖 AI';
            position: absolute;
            top: 10px; right: 10px;
            font-size: 0.75rem;
            background: rgba(16,185,129,0.2);
            padding: 4px 12px;
            border-radius: 12px;
            color: var(--emerald);
        }

        /* SECURITY STATUS */
        .security-status {
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            text-align: center;
            transition: 0.3s;
        }
        .status-safe    { background: rgba(16,185,129,0.2); color: var(--emerald); border: 1px solid var(--emerald); }
        .status-warning { background: rgba(245,158,11,0.2); color: var(--orange);  border: 1px solid var(--orange); }
        .status-danger  { background: rgba(239,68,68,0.2);  color: var(--red);     border: 1px solid var(--red); }

        /* STATS GRID */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 1.5rem 1rem;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }
        .stat-box:hover {
            transform: translateY(-3px);
            border-color: var(--emerald);
            background: rgba(16,185,129,0.1);
        }
        .stat-value { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; }

        /* TABS */
        .tab-container { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .tab-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            flex: 1;
            text-align: center;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.875rem;
        }
        .tab-btn.active { background: var(--emerald); border-color: var(--emerald); }
        .tab-btn:hover:not(.active) { background: rgba(255,255,255,0.1); }

        /* SUBMENU */
        .submenu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .submenu-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1rem 0.5rem;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }
        .submenu-item:hover { border-color: var(--emerald); transform: translateY(-2px); background: rgba(16,185,129,0.1); }
        .submenu-icon { font-size: 1.5rem; margin-bottom: 0.25rem; display: block; }
        .submenu-name { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; }
        .submenu-badge {
            position: absolute; top: 5px; right: 5px;
            background: rgba(245,158,11,0.2);
            color: var(--orange);
            border-radius: 12px;
            padding: 0.2rem 0.5rem;
            font-size: 0.6rem;
            font-weight: 700;
        }
        /* Developer badge khusus */
        .submenu-item.dev-only { border-color: rgba(168,85,247,0.4); }
        .submenu-item.dev-only:hover { border-color: var(--purple); background: rgba(168,85,247,0.1); }

        /* CONTENT AREA */
        .content-area { min-height: 150px; }

        /* ACTIVITY FEED */
        .activity-feed { max-height: 200px; overflow-y: auto; }
        .activity-item { display: flex; gap: 0.75rem; padding: 0.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .activity-item:last-child { border-bottom: none; }
        .activity-icon { width: 24px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .activity-content { flex: 1; }
        .activity-title { font-size: 0.8rem; font-weight: 600; }
        .activity-meta { font-size: 0.7rem; opacity: 0.6; margin-top: 2px; }

        /* HEALTH BAR */
        .health-item { margin-bottom: 0.75rem; }
        .health-header { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 0.4rem; }
        .health-bar { background: rgba(255,255,255,0.1); border-radius: 8px; height: 6px; overflow: hidden; }
        .health-fill { height: 100%; background: linear-gradient(90deg, var(--emerald), #34d399); border-radius: 8px; transition: width 0.5s ease; }
        .health-fill.warning { background: linear-gradient(90deg, var(--orange), #fcd34d); }
        .health-fill.danger  { background: linear-gradient(90deg, var(--red), #f87171); }

        /* PREDICTIVE */
        .predictive-list { list-style: none; }
        .predictive-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem; border-radius: 8px; margin-bottom: 0.5rem; font-size: 0.8rem; }
        .predictive-item.normal   { background: rgba(16,185,129,0.1); }
        .predictive-item.high     { background: rgba(245,158,11,0.1); }
        .predictive-item.critical { background: rgba(239,68,68,0.1); }

        /* EXPORT BUTTONS */
        .export-buttons { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .btn-action {
            flex: 1;
            padding: 0.6rem 1rem;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }
        .btn-action:hover { background: rgba(255,255,255,0.2); transform: translateY(-1px); }
        .btn-action.btn-blue   { background: rgba(59,130,246,0.2); }
        .btn-action.btn-purple { background: rgba(168,85,247,0.2); }
        .btn-action.btn-red    { background: rgba(239,68,68,0.2); }

        /* BACK BUTTON */
        .back-btn {
            position: fixed; top: 20px; left: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            color: var(--emerald);
            cursor: pointer;
            z-index: 100;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
        }
        .back-btn:hover { background: rgba(16,185,129,0.2); transform: translateX(-3px); }

        /* SHALAWAT */
        .shalawat-top {
            text-align: center;
            padding: 1.5rem 1rem;
            margin-bottom: 1.5rem;
            background: rgba(16,185,129,0.05);
            border: 1px solid rgba(16,185,129,0.2);
            border-radius: 24px;
            backdrop-filter: blur(20px);
        }
        .bismillah {
            font-family: 'Amiri', serif;
            font-size: 2rem;
            color: var(--emerald);
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(16,185,129,0.5);
        }
        .shalawat-arabic {
            font-family: 'Amiri', serif;
            font-size: 1.5rem;
            color: var(--emerald);
            margin-bottom: 0.5rem;
            text-shadow: 0 0 15px rgba(16,185,129,0.4);
        }
        .shalawat-text {
            font-size: 0.75rem;
            color: var(--emerald);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* LAST SYNC */
        .sync-badge {
            font-size: 0.7rem;
            opacity: 0.5;
            text-align: right;
            margin-bottom: 0.5rem;
        }

        /* LOADING SPINNER */
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(16,185,129,0.4); border-radius: 4px; }

        @media (max-width: 480px) {
            .tab-btn { padding: 0.5rem 1rem; font-size: 0.75rem; }
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
            .submenu-grid { grid-template-columns: repeat(4, 1fr); }
            .back-btn { padding: 0.5rem; font-size: 0.75rem; }
            .bismillah { font-size: 1.5rem; }
            .shalawat-arabic { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<!-- BACK BUTTON -->
<button class="back-btn" onclick="window.goBack()">
    <i class="fas fa-arrow-left"></i>
    <span>Back</span>
</button>

<!-- SHALAWAT SECTION -->
<div class="shalawat-top">
    <p class="bismillah">بِسْمِ اللَّهِ</p>
    <p class="shalawat-arabic">اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ</p>
    <p class="shalawat-text">THE POWER SOUL OF SHALAWAT</p>
</div>

<!-- AI INSIGHT -->
<div class="ai-insight">
    <h3 class="text-lg font-bold mb-2 flex items-center gap-2">
        <i class="fas fa-brain text-emerald-400"></i>
        <span>AI Insight</span>
    </h3>
    <p id="aiMessage" class="text-sm" style="color: rgba(255,255,255,0.7);">
        <i class="fas fa-circle-notch spin mr-2"></i> Menganalisis...
    </p>
</div>

<!-- SECURITY STATUS -->
<div class="crystal-card">
    <div class="sync-badge">
        Sinkronisasi: <span id="lastSync">—</span>
    </div>
    <h3 class="text-sm font-bold mb-3" style="opacity:0.6">Status Keamanan</h3>
    <div class="security-status status-safe" id="securityStatus">
        <i class="fas fa-shield-check mr-2"></i>
        <span>AMAN</span>
    </div>
</div>

<!-- STATS GRID -->
<div class="stats-grid">
    <div class="stat-box" onclick="window.goToModule('all')">
        <div class="stat-value" style="color: var(--blue);" id="stat-total">—</div>
        <div class="stat-label">Total Pending</div>

    <div class="stat-box" onclick="window.goToModule('booking')">
        <div class="stat-value" style="color: var(--emerald);" id="stat-booking">—</div>
        <div class="stat-label">Booking</div>
    </div>
    <div class="stat-box" onclick="window.goToModule('k3')">
        <div class="stat-value" style="color: var(--orange);" id="stat-k3">—</div>
        <div class="stat-label">K3</div>
    </div>
    <div class="stat-box" onclick="window.goToModule('dana')">
        <div class="stat-value" style="color: var(--purple);" id="stat-dana">—</div>
        <div class="stat-label">Dana</div>
    </div>
    <div class="stat-box" onclick="window.goToModule('stok')">
        <div class="stat-value" style="color: var(--cyan);" id="stat-stok">—</div>
        <div class="stat-label">Stok</div>
    </div>
    <div class="stat-box" onclick="window.goToModule('maintenance')">
        <div class="stat-value" style="color: var(--gold);" id="stat-maintenance">—</div>
        <div class="stat-label">Maintenance</div>
    </div>
</div>

<!-- TABS -->
<div class="tab-container">
    <button class="tab-btn active" id="tab-dashboard" onclick="window.switchTab('dashboard')">📊 Dashboard</button>
    <button class="tab-btn" id="tab-kerja" onclick="window.switchTab('kerja')">🏢 R. Kerja</button>
    <button class="tab-btn" id="tab-dana" onclick="window.switchTab('dana')">💰 Dana</button>
</div>

<!-- SUBMENU -->
<div id="submenu-container" class="submenu-grid"></div>

<!-- CONTENT -->
<div id="content-area" class="content-area crystal-card">
    <div class="text-center py-8" style="opacity:0.6">
        <i class="fas fa-circle-notch spin text-2xl mb-3"></i>
        <p>Memuat...</p>
    </div>
</div>

<!-- FOOTER -->
<div class="text-center mt-6 mb-4">
    <p style="font-size: 0.5rem; color: rgba(255,255,255,0.2);">
        Dream Team © 2026 | ISO 27001 • ISO 55001 • ISO 9001
    </p>
</div>

<!-- ===================== SCRIPTS ===================== -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ============================================================
// CONFIG
// ============================================================
const SB_URL = 'https://pvznaeppaagylwddirla.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2em5hZXBwYWFneWx3ZGRpcmxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NTEwNDMsImV4cCI6MjA4NzUyNzA0M30.t9SJi3VfsBDkKmeZ3egZ4rbvljl4xe0WwNkPtfA9-vo';
const supabase = window.supabase.createClient(SB_URL, SB_KEY);

// ============================================================
// STATE
// ============================================================
let cachedStats = {};
let currentTab  = 'dashboard';
let refreshTimer = null;

// User role dari localStorage (set oleh auth module)
const USER_ROLE = localStorage.getItem('user_role') || 'GUEST';
const IS_DEV = (USER_ROLE === 'DEVELOPER' || USER_ROLE === 'MASTER');

// ============================================================
// MODULES CONFIG
// ============================================================
const modulesByTab = {
    dashboard: [
        { id: 'analytics',  name: 'Analytics', icon: '📈' },
        { id: 'pengajuan',  name: 'Pengajuan', icon: '📋' },
        { id: 'laporan',    name: 'Laporan',   icon: '📄' },
        { id: 'ai',         name: 'AI',        icon: '🤖' },
        { id: 'slides',     name: 'Slide',     icon: '🖼️' },
        { id: 'files',      name: 'Files',     icon: '📁' },
        { id: 'backup',     name: 'Backup',    icon: '💾' },
        { id: 'qr',         name: 'QR',        icon: '📱' },
        { id: 'approval',   name: 'Approval',  icon: '✅' },
        // Developer Intelligence — hanya tampil jika role sesuai
        ...(IS_DEV ? [{ id: 'developer', name: 'Dev Intel', icon: '🧠', devOnly: true }] : [])
    ],
    kerja: [
        { id: 'booking',          name: 'Booking',     icon: '📅' },
        { id: 'k3',               name: 'K3',          icon: '⚠️' },
        { id: 'sekuriti',         name: 'Sekuriti',    icon: '🛡️' },
        { id: 'janitor-indoor',   name: 'Janitor In',  icon: '🧹' },
        { id: 'janitor-outdoor',  name: 'Janitor Out', icon: '🌿' },
        { id: 'stok',             name: 'Stok',        icon: '📦' },
        { id: 'maintenance',      name: 'Maintenance', icon: '🔧' },
        { id: 'asset',            name: 'Asset',       icon: '🏢' },
        { id: 'gudang',           name: 'Gudang',      icon: '🏭' }
    ],
    dana: [
        { id: 'dana',      name: 'Dana',      icon: '💰' },
        { id: 'approval',  name: 'Approval',  icon: '✅' },
        { id: 'qr',        name: 'QR',        icon: '📱' },
        { id: 'backup',    name: 'Backup',    icon: '💾' },
        { id: 'laporan',   name: 'Laporan',   icon: '📄' },
        { id: 'analytics', name: 'Analytics', icon: '📈' }
    ]
};

// ============================================================
// INIT
// ============================================================
async function init() {
    console.log('[COMMANDCENTER] Init — role:', USER_ROLE);
    await loadAllStats();
    renderSubmenu('dashboard');
    renderContent('dashboard');
    startAutoRefresh();
}

// ============================================================
// LOAD STATS
// ============================================================
async function loadAllStats() {
    try {
        const [booking, k3, dana, stok, maintenance, janitorIn, janitorOut, sekuriti, gudang, assets] = await Promise.all([
            supabase.from('bookings').select('*',          { count: 'exact', head: true }).eq('status', 'pending'),
            supabase.from('k3_reports').select('*',        { count: 'exact', head: true }).eq('status', 'pending'),
            supabase.from('pengajuan_dana').select('*',    { count: 'exact', head: true }).eq('status', 'pending'),
            // FIX: gunakan filter column-to-column yang benar
            supabase.from('inventory').select('id, jumlah, minimal_stok').filter('jumlah', 'lt', 'minimal_stok'),
            supabase.from('maintenance_tasks').select('*', { count: 'exact', head: true }).in('status', ['pending', 'proses']),
            supabase.from('janitor_indoor').select('*',    { count: 'exact', head: true }).eq('status', 'pending'),
            supabase.from('janitor_outdoor').select('*',   { count: 'exact', head: true }).eq('status', 'pending'),
            supabase.from('sekuriti_reports').select('*',  { count: 'exact', head: true }).eq('status', 'pending'),
            // FIX: filter column-to-column untuk gudang_stok
            supabase.from('gudang_stok').select('id, stok, reorder_level').filter('stok', 'lt', 'reorder_level'),
            supabase.from('assets').select('id, kondisi').in('kondisi', ['rusak_ringan', 'rusak_berat'])
        ]);

        cachedStats = {
            booking:      booking.count      || 0,
            k3:           k3.count           || 0,
            dana:         dana.count         || 0,
            stok:         stok.data?.length  || 0,
            maintenance:  maintenance.count  || 0,
            janitorIn:    janitorIn.count     || 0,
            janitorOut:   janitorOut.count    || 0,
            sekuriti:     sekuriti.count      || 0,
            gudang:       gudang.data?.length || 0,
            assetsRusak:  assets.data?.length || 0,
            total: (booking.count||0) + (k3.count||0) + (dana.count||0) + (maintenance.count||0)
        };

        // Update DOM stats
        setEl('stat-total',       cachedStats.total);
        setEl('stat-booking',     cachedStats.booking);
        setEl('stat-k3',          cachedStats.k3);
        setEl('stat-dana',        cachedStats.dana);
        setEl('stat-stok',        cachedStats.stok);
        setEl('stat-maintenance', cachedStats.maintenance);

        updateSecurityStatus(cachedStats.total);
        generateAIInsights(cachedStats);

        // Timestamp sync
        const now = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        setEl('lastSync', now);

        // Re-render submenu badge agar angka pending ikut update
        renderSubmenu(currentTab);

    } catch (err) {
        console.error('[COMMANDCENTER] loadAllStats error:', err);
        showSimpleToast('⚠️ Gagal memuat data: ' + err.message);
    }
}

// ============================================================
// SECURITY STATUS
// ============================================================
function updateSecurityStatus(total) {
    const status = document.getElementById('securityStatus');
    if (!status) return;
    status.className = 'security-status';
    if (total === 0) {
        status.classList.add('status-safe');
        status.innerHTML = '<i class="fas fa-shield-check mr-2"></i><span>AMAN</span>';
    } else if (total < 10) {
        status.classList.add('status-warning');
        status.innerHTML = '<i class="fas fa-triangle-exclamation mr-2"></i><span>WASPADA</span>';
    } else {
        status.classList.add('status-danger');
        status.innerHTML = '<i class="fas fa-circle-exclamation mr-2"></i><span>BAHAYA</span>';
    }
}

// ============================================================
// AI INSIGHTS
// ============================================================
function generateAIInsights(counts) {
    const aiMessage = document.getElementById('aiMessage');
    if (!aiMessage) return;

    const insights = [];
    if (counts.booking    >  5) insights.push('📈 Booking tinggi, siapkan ruangan');
    if (counts.k3         >  3) insights.push('⚠️ Perlu review K3 segera');
    if (counts.dana       >  5) insights.push('💰 Dana pending butuh approval');
    if (counts.stok       >  0) insights.push('📦 Stok menipis, segera order');
    if (counts.assetsRusak>  0) insights.push('🏢 ' + counts.assetsRusak + ' asset perlu perbaikan');
    if (counts.gudang     >  0) insights.push('🏭 Reorder gudang diperlukan');
    if (insights.length   === 0) insights.push('✅ Semua sistem optimal — keep it up!');

    aiMessage.innerHTML = insights.map(i => `<span class="mr-3">${i}</span>`).join('');
}

// ============================================================
// RENDER SUBMENU — FIX: fungsi global agar bisa diakses switchTab
// ============================================================
window.renderSubmenu = function(tab) {
    const container = document.getElementById('submenu-container');
    if (!container) { console.error('[COMMANDCENTER] #submenu-container not found'); return; }

    const modules = modulesByTab[tab] || [];
    container.innerHTML = modules.map(mod => {
        const badge = cachedStats[mod.id]
            ? `<span class="submenu-badge">${cachedStats[mod.id]}</span>` : '';
        const devClass = mod.devOnly ? ' dev-only' : '';
        return `
            <div class="submenu-item${devClass}" onclick="window.goToModule('${mod.id}')">
                <span class="submenu-icon">${mod.icon}</span>
                <span class="submenu-name">${mod.name}</span>
                ${badge}
            </div>
        `;
    }).join('');
};

// ============================================================
// SWITCH TAB — FIX: pakai window.renderSubmenu & window.renderContent
// ============================================================
window.switchTab = function(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    const tabEl = document.getElementById('tab-' + tab);
    if (tabEl) tabEl.classList.add('active');
    currentTab = tab;
    window.renderSubmenu(tab);
    window.renderContent(tab);
};

// ============================================================
// LOAD RECENT ACTIVITIES
// ============================================================
async function loadRecentActivities() {
    const feed = document.getElementById('activityFeed');
    if (!feed) return;

    const { data, error } = await supabase
        .from('audit_logs')
        .select('action, detail, created_at')
        .order('created_at', { ascending: false })
        .limit(10);

    if (error || !data || data.length === 0) {
        feed.innerHTML = '<div class="text-center py-4" style="opacity:0.6">Belum ada aktivitas</div>';
        return;
    }

    feed.innerHTML = data.map(a => `
        <div class="activity-item">
            <div class="activity-icon">
                <i class="fas fa-circle" style="color:var(--emerald);font-size:0.5rem"></i>
            </div>
            <div class="activity-content">
                <div class="activity-title">${escHtml(a.action)}</div>
                <div class="activity-meta">
                    ${escHtml(a.detail)} &bull; ${new Date(a.created_at).toLocaleString('id-ID')}
                </div>
            </div>
        </div>
    `).join('');
}

// ============================================================
// GO TO MODULE — dengan role check untuk developer
// ============================================================
window.goToModule = function(id) {
    if (id === 'developer' && !IS_DEV) {
        showSimpleToast('⛔ Akses ditolak — hanya DEVELOPER/MASTER');
        return;
    }
    console.log('[COMMANDCENTER] Opening module:', id);
    window.location.href = './' + id + '/index.html';
};

window.goBack = function() {
    window.history.back();
};

// ============================================================
// BACKUP
// ============================================================
window.createBackup = async function() {
    showSimpleToast('⏳ Membuat backup...');
    try {
        const tables = [
            'bookings','k3_reports','pengajuan_dana',
            'inventory','assets','maintenance_tasks',
            'sekuriti_reports','janitor_indoor','janitor_outdoor',
            'gudang_stok'
        ];
        const backup = { timestamp: new Date().toISOString() };
        for (const table of tables) {
            const { data } = await supabase.from(table).select('*');
            backup[table] = data || [];
        }
        const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = `dream-os-backup-${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showSimpleToast('✅ Backup berhasil!');
    } catch (err) {
        showSimpleToast('❌ Backup gagal: ' + err.message);
    }
};

window.exportToExcel = function() { showSimpleToast('📊 Fitur Excel dalam pengembangan'); };
window.exportToPDF   = function() { showSimpleToast('📄 Fitur PDF dalam pengembangan'); };

// ============================================================
// AUTO REFRESH
// ============================================================
function startAutoRefresh() {
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(loadAllStats, 30000);
}

// ============================================================
// HELPERS
// ============================================================
function setEl(id, val) {
    const el = document.getElementById(id);
    if (el) el.textContent = val;
}

function escHtml(str) {
    return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

function showSimpleToast(msg) {
    let toast = document.getElementById('_toast');
    if (!toast) {
        toast = document.createElement('div');
        toast.id = '_toast';
        toast.style.cssText = `
            position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
            background:#1e293b;border:1px solid rgba(16,185,129,0.4);
            color:white;padding:0.6rem 1.2rem;border-radius:12px;
            font-size:0.85rem;font-family:'Rajdhani',sans-serif;
            z-index:9999;transition:opacity 0.3s;
        `;
        document.body.appendChild(toast);
    }
    toast.textContent = msg;
    toast.style.opacity = '1';
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => { toast.style.opacity = '0'; }, 3000);
}

// ============================================================
