<div class="max-w-6xl mx-auto p-4">
    <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-400 mb-6">
        📁 File Manager
    </h1>
    <div class="flex gap-2 mb-4">
        <select id="file-bucket" class="bg-slate-800 p-2 rounded-xl border border-slate-700">
            <option value="k3-foto">K3 Foto</option>
            <option value="spj-foto">SPJ Foto</option>
        </select>
        <button onclick="loadFiles()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-xl text-sm font-bold">
            <i class="fas fa-sync-alt mr-2"></i> Refresh
        </button>
    </div>
    <div id="file-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

    <div class="text-center mt-6">
        <button onclick="window.closeModule()" class="px-6 py-2 bg-slate-700 hover:bg-slate-600 rounded-xl">← Kembali</button>
    </div>
</div>
