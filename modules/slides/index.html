<div class="max-w-3xl mx-auto p-4">
    <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-400 mb-6">
        🖼️ Kelola Slide
    </h1>
    <form id="slideForm" class="glass-card p-6 rounded-3xl space-y-4">
        <div>
            <label class="text-xs font-mono text-slate-400">Nomor Slide</label>
            <select id="slide_number" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700">
                <option value="5">Slide 5 - Info Admin</option>
                <option value="6">Slide 6 - Info Tambahan 1</option>
                <option value="7">Slide 7 - Info Tambahan 2</option>
            </select>
        </div>
        <div>
            <label class="text-xs font-mono text-slate-400">Konten Slide</label>
            <textarea id="slide_content" rows="4" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700" placeholder="Tulis konten slide..."></textarea>
        </div>
        <button type="submit" class="w-full bg-purple-600 hover:bg-purple-500 p-4 rounded-xl font-bold">Update Slide</button>
    </form>

    <div class="glass-card p-6 rounded-3xl mt-6">
        <h2 class="text-lg font-bold mb-4">Preview</h2>
        <div><strong>Slide 5:</strong> <span id="preview5">-</span></div>
        <div><strong>Slide 6:</strong> <span id="preview6">-</span></div>
        <div><strong>Slide 7:</strong> <span id="preview7">-</span></div>
    </div>

    <div class="text-center mt-6">
        <button onclick="window.closeModule()" class="px-6 py-2 bg-slate-700 hover:bg-slate-600 rounded-xl">← Kembali</button>
    </div>
</div>
