<div class="glass-card p-6 max-w-4xl mx-auto">
    <h2 class="title-font text-2xl font-bold mb-6 text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-red-400">
        ⚠️ Laporan K3
    </h2>
    
    <form id="k3Form" class="space-y-4">
        <div>
            <label class="block text-sm text-slate-400 mb-2">Tanggal</label>
            <input type="date" name="tanggal" class="input-modern w-full" required>
        </div>
        
        <div>
            <label class="block text-sm text-slate-400 mb-2">Lokasi</label>
            <input type="text" name="lokasi" class="input-modern w-full" required>
        </div>
        
        <div>
            <label class="block text-sm text-slate-400 mb-2">Jenis Laporan</label>
            <select name="jenis_laporan" class="input-modern w-full" required>
                <option value="">-- Pilih Jenis --</option>
                <option value="kerusakan">🔧 Kerusakan Fasilitas</option>
                <option value="kehilangan">📦 Kehilangan</option>
                <option value="kebersihan">🧹 Kebersihan</option>
                <option value="kecelakaan">⚠️ Kecelakaan</option>
                <option value="bahaya">☢️ Potensi Bahaya</option>
                <option value="lainnya">📌 Lainnya</option>
            </select>
        </div>
        
        <div>
            <label class="block text-sm text-slate-400 mb-2">Deskripsi</label>
            <textarea name="deskripsi" rows="4" class="input-modern w-full" required></textarea>
        </div>
        
        <div>
            <label class="block text-sm text-slate-400 mb-2">Pelapor</label>
            <input type="text" name="pelapor" class="input-modern w-full" required>
        </div>
        
        <div>
            <label class="block text-sm text-slate-400 mb-2">Prioritas</label>
            <select name="priority" class="input-modern w-full">
                <option value="normal">⚪ Normal</option>
                <option value="high">🟡 Tinggi</option>
                <option value="critical">🔴 Critical</option>
            </select>
        </div>
        
        <button type="submit" class="btn-primary w-full">
            <i class="fas fa-exclamation-triangle mr-2"></i> Laporkan
        </button>
    </form>
    
    <div id="form-result" class="mt-4 text-center"></div>
    
    <button class="mt-6 w-full bg-slate-700 hover:bg-slate-600 p-3 rounded-xl font-bold cursor-pointer" onclick="closeMod()">
        ← Back to Dashboard
    </button>
</div>

<script>
document.getElementById('k3Form').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    var formData = new FormData(e.target);
    var data = Object.fromEntries(formData);
    
    var btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Sending...';
    
    try {
        var result = await supabase.from('k3_reports').insert([{
            tanggal: data.tanggal,
            lokasi: data.lokasi,
            jenis_laporan: data.jenis_laporan,
            deskripsi: data.deskripsi,
            pelapor: data.pelapor,
            priority: data.priority,
            status: 'pending'
        }]);
        
        if (result.error) throw result.error;
        
        document.getElementById('form-result').innerHTML = '<p class="text-green-400 font-bold">✅ Laporan K3 berhasil!</p>';
        toast('K3 report submitted!', true);
        e.target.reset();
        
    } catch (err) {
        document.getElementById('form-result').innerHTML = '<p class="text-red-400 font-bold">❌ ' + err.message + '</p>';
        toast('Error: ' + err.message, false);
        
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-exclamation-triangle mr-2"></i> Laporkan';
    }
});
</script>
