<div class="max-w-4xl mx-auto p-4">
    <h2 class="text-2xl font-bold text-orange-400 mb-6">⚠️ Laporan K3</h2>
    
    <form id="k3Form" class="space-y-4 bg-slate-800 p-6 rounded-2xl">
        <div>
            <label class="block text-sm text-slate-400 mb-2">Tanggal</label>
            <input type="date" name="tanggal" class="w-full p-3 rounded-xl bg-slate-700 border border-slate-600 text-white" required>
        </div>
        
        <div>
            <label class="block text-sm text-slate-400 mb-2">Lokasi</label>
            <input type="text" name="lokasi" class="w-full p-3 rounded-xl bg-slate-700 border border-slate-600 text-white" required>
        </div>
        
        <div>
            <label class="block text-sm text-slate-400 mb-2">Jenis Laporan</label>
            <select name="jenis_laporan" class="w-full p-3 rounded-xl bg-slate-700 border border-slate-600 text-white" required>
                <option value="">-- Pilih Jenis --</option>
                <option value="kerusakan">🔧 Kerusakan Fasilitas</option>
                <option value="kehilangan">📦 Kehilangan</option>
                <option value="kebersihan">🧹 Kebersihan</option>
                <option value="kecelakaan">⚠️ Kecelakaan</option>
                <option value="lainnya">📌 Lainnya</option>
            </select>
        </div>
        
        <div>
            <label class="block text-sm text-slate-400 mb-2">Deskripsi</label>
            <textarea name="deskripsi" rows="4" class="w-full p-3 rounded-xl bg-slate-700 border border-slate-600 text-white" required></textarea>
        </div>
        
        <div>
            <label class="block text-sm text-slate-400 mb-2">Pelapor</label>
            <input type="text" name="pelapor" class="w-full p-3 rounded-xl bg-slate-700 border border-slate-600 text-white" required>
        </div>
        
        <div>
            <label class="block text-sm text-slate-400 mb-2">Prioritas</label>
            <select name="priority" class="w-full p-3 rounded-xl bg-slate-700 border border-slate-600 text-white">
                <option value="normal">⚪ Normal</option>
                <option value="high">🟡 Tinggi</option>
                <option value="critical">🔴 Critical</option>
            </select>
        </div>
        
        <button type="submit" class="w-full bg-orange-600 hover:bg-orange-500 p-4 rounded-xl font-bold">📤 Laporkan</button>
    </form>
    
    <div id="form-result" class="mt-4 text-center"></div>
    
    <button onclick="closeModule()" class="mt-6 w-full bg-slate-700 hover:bg-slate-600 p-3 rounded-xl font-bold">← Kembali ke Dashboard</button>
</div>
