<div class="max-w-4xl mx-auto p-4">
    <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400 mb-6">
        📄 Ekspor Laporan
    </h1>
    <div class="glass-card p-6 rounded-3xl space-y-4">
        <div>
            <label class="text-xs font-mono text-slate-400">Jenis Laporan</label>
            <select id="report-type" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700">
                <option value="booking">Booking</option>
                <option value="k3">K3</option>
                <option value="dana">Pengajuan Dana</option>
            </select>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="text-xs font-mono text-slate-400">Dari Tanggal</label>
                <input type="date" id="report-start" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700">
            </div>
            <div>
                <label class="text-xs font-mono text-slate-400">Sampai Tanggal</label>
                <input type="date" id="report-end" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700">
            </div>
        </div>
        <div>
            <label class="text-xs font-mono text-slate-400">Format</label>
            <select id="report-format" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700">
                <option value="pdf">PDF</option>
                <option value="excel">Excel (XLSX)</option>
            </select>
        </div>
        <button onclick="generateReport()" class="w-full bg-blue-600 hover:bg-blue-500 p-4 rounded-xl font-bold">
            <i class="fas fa-download mr-2"></i> Generate Laporan
        </button>
        <div id="report-status" class="text-center text-sm"></div>
    </div>

    <div class="text-center mt-6">
        <button onclick="window.closeModule()" class="px-6 py-2 bg-slate-700 hover:bg-slate-600 rounded-xl">← Kembali</button>
    </div>
    <div class="flex gap-2">
    <button onclick="generateReport()" class="btn-action btn-green flex-1">
        <i class="fas fa-file-pdf"></i> Generate PDF
    </button>
    <button onclick="printReport()" class="btn-action btn-purple flex-1">
        <i class="fas fa-print"></i> Cetak Langsung
    </button>
    </div>
</div>
