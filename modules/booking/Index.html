<div class="glass-card p-6 max-w-4xl mx-auto">
    <h2 class="title-font text-2xl font-bold mb-6 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400">
        📅 Booking Sarana
    </h2>
    
    <form id="bookingForm" class="space-y-4">
        <div>
            <label class="block text-sm text-slate-400 mb-2">Nama Peminjam</label>
            <input type="text" name="nama" class="input-modern w-full" required>
        </div>
        
        <div>
            <label class="block text-sm text-slate-400 mb-2">Divisi</label>
            <input type="text" name="divisi" class="input-modern w-full">
        </div>
        
        <div>
            <label class="block text-sm text-slate-400 mb-2">No HP</label>
            <input type="text" name="no_hp" class="input-modern w-full">
        </div>
        
        <div>
            <label class="block text-sm text-slate-400 mb-2">Pilih Sarana</label>
            <select name="ruang" id="sarana" class="input-modern w-full" required>
                <option value="">-- Pilih Sarana --</option>
                <option value="Aula SMP">Aula SMP</option>
                <option value="Aula SMA">Aula SMA</option>
                <option value="Saung Besar">Saung Besar</option>
                <option value="Saung Kecil">Saung Kecil</option>
                <option value="Masjid">Masjid</option>
                <option value="Mushalla SMA">Mushalla SMA</option>
                <option value="Ruang Serbaguna">Ruang Serbaguna</option>
                <option value="Lapangan Basket">Lapangan Basket</option>
                <option value="Lapangan Volly">Lapangan Volly</option>
                <option value="Kantin">Kantin</option>
                <option value="Labkom">Labkom</option>
                <option value="Perpustakaan">Perpustakaan</option>
            </select>
        </div>
        
        <div>
            <label class="block text-sm text-slate-400 mb-2">Tanggal</label>
            <input type="date" name="tanggal" class="input-modern w-full" required>
        </div>
        
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm text-slate-400 mb-2">Jam Mulai</label>
                <input type="time" name="jam_mulai" class="input-modern w-full" required>
            </div>            <div>
                <label class="block text-sm text-slate-400 mb-2">Jam Selesai</label>
                <input type="time" name="jam_selesai" class="input-modern w-full" required>
            </div>
        </div>
        
        <div>
            <label class="block text-sm text-slate-400 mb-2">Keperluan</label>
            <textarea name="keperluan" rows="3" class="input-modern w-full"></textarea>
        </div>
        
        <div>
            <label class="block text-sm text-slate-400 mb-2">Peralatan</label>
            <textarea name="peralatan" rows="2" class="input-modern w-full"></textarea>
        </div>
        
        <button type="submit" class="btn-primary w-full">
            <i class="fas fa-paper-plane mr-2"></i> Ajukan Booking
        </button>
    </form>
    
    <div id="form-result" class="mt-4 text-center"></div>
    
    <button class="mt-6 w-full bg-slate-700 hover:bg-slate-600 p-3 rounded-xl font-bold cursor-pointer" onclick="closeMod()">
        ← Back to Dashboard
    </button>
</div>

<script>
document.getElementById('bookingForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    var formData = new FormData(e.target);
    var data = Object.fromEntries(formData);
    
    var btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Sending...';
    
    try {
        var result = await supabase.from('bookings').insert([{
            nama_peminjam: data.nama,
            divisi: data.divisi || null,
            no_hp: data.no_hp || null,
            ruang: data.ruang,
            tanggal: data.tanggal,
            jam_mulai: data.jam_mulai,
            jam_selesai: data.jam_selesai,
            keperluan: data.keperluan || null,
            peralatan: data.peralatan || null,            status: 'pending'
        }]);
        
        if (result.error) throw result.error;
        
        document.getElementById('form-result').innerHTML = '<p class="text-green-400 font-bold">✅ Booking berhasil diajukan!</p>';
        toast('Booking submitted!', true);
        e.target.reset();
        
    } catch (err) {
        document.getElementById('form-result').innerHTML = '<p class="text-red-400 font-bold">❌ ' + err.message + '</p>';
        toast('Error: ' + err.message, false);
        
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i> Ajukan Booking';
    }
});
</script>
