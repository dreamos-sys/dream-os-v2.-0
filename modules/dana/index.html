<div class="max-w-3xl mx-auto p-4">
    <h2 class="text-2xl font-bold text-emerald-400 mb-4">💰 Pengajuan Dana</h2>
    
    <form id="danaForm" class="space-y-4 bg-slate-800 p-6 rounded-xl">
        <div>
            <label class="block text-sm font-medium mb-1">Kategori</label>
            <select name="kategori" required class="w-full p-3 rounded bg-slate-700 border border-slate-600">
                <option value="">Pilih kategori</option>
                <option value="makan_sekuriti_bulanan">🍱 Makan Sekuriti Bulanan</option>
                <option value="makan_sahur_sekuriti">🌙 Makan Sahur Sekuriti</option>
                <option value="makanan_ringan_rapat">🍪 Makanan Ringan Rapat</option>
                <option value="janitor_taman_bulanan">🌿 Janitor Taman Bulanan</option>
                <option value="gaji_tukang_harian_mingguan">🛠️ Gaji Tukang</option>
                <option value="apresiasi_keamanan">🛡️ Apresiasi Keamanan</option>
                <option value="tip_jasa">💵 Tip Jasa</option>
                <option value="urunan_kesehatan">🏥 Urunan Kesehatan</option>
                <option value="umum">📌 Umum</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">Judul / Keperluan</label>
            <input type="text" name="judul" required placeholder="Contoh: Makan siang sekuriti Februari" class="w-full p-3 rounded bg-slate-700 border border-slate-600">
        </div>

        <div>
            <label class="block text-sm font-medium mb-1">Deskripsi</label>
            <textarea name="deskripsi" rows="3" placeholder="Rincian tambahan..." class="w-full p-3 rounded bg-slate-700 border border-slate-600"></textarea>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">Nominal (Rp)</label>
                <input type="number" name="nominal" required class="w-full p-3 rounded bg-slate-700 border border-slate-600">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Periode</label>
                <input type="text" name="periode" placeholder="Februari 2026" class="w-full p-3 rounded bg-slate-700 border border-slate-600">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium mb-1">Unit Kerja</label>
                <input type="text" name="unit_kerja" required placeholder="Contoh: SD, Umum" class="w-full p-3 rounded bg-slate-700 border border-slate-600">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Pengaju</label>
                <input type="text" name="pengaju" required placeholder="Nama lengkap" class="w-full p-3 rounded bg-slate-700 border border-slate-600">
            </div>
        </div>

        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 p-3 rounded-lg font-bold transition">
            AJUKAN DANA
        </button>
        <div id="form-result" class="text-center text-sm"></div>
    </form>
</div>
