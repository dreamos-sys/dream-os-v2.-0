<div class="max-w-4xl mx-auto p-4">
    <h2 class="text-2xl font-bold text-purple-400 mb-6">💰 Pengajuan Dana</h2>
    
    <form id="danaForm" class="space-y-4 bg-slate-800 p-6 rounded-2xl">
        <div>
            <label class="block text-sm text-slate-400 mb-2">Kategori</label>
            <select name="kategori" class="w-full p-3 rounded-xl bg-slate-700 border border-slate-600 text-white" required>
                <option value="">-- Pilih Kategori --</option>
                <option value="makan_sekuriti_bulanan">🍱 Makan Sekuriti Bulanan</option>
                <option value="makan_sahur_sekuriti">🌙 Makan Sahur Sekuriti</option>
                <option value="makanan_ringan_rapat">🍪 Makanan Ringan Rapat</option>
                <option value="janitor_taman_bulanan">🌿 Janitor Taman Bulanan</option>
                <option value="gaji_tukang_harian_mingguan">🛠️ Gaji Tukang Harian/Mingguan</option>
                <option value="apresiasi_keamanan">🛡️ Apresiasi Keamanan</option>
                <option value="tip_jasa">💵 Tip Jasa (PLN, Telkom, dll)</option>
                <option value="urunan_kesehatan">🏥 Urunan Kesehatan</option>
                <option value="umum">📌 Umum</option>
            </select>
        </div>
        
        <div>
            <label class="block text-sm text-slate-400 mb-2">Judul</label>
            <input type="text" name="judul" class="w-full p-3 rounded-xl bg-slate-700 border border-slate-600 text-white" required>
        </div>
        
        <div>
            <label class="block text-sm text-slate-400 mb-2">Deskripsi</label>
            <textarea name="deskripsi" rows="3" class="w-full p-3 rounded-xl bg-slate-700 border border-slate-600 text-white"></textarea>
        </div>
        
        <div>
            <label class="block text-sm text-slate-400 mb-2">Nominal (Rp)</label>
            <input type="number" name="nominal" class="w-full p-3 rounded-xl bg-slate-700 border border-slate-600 text-white" required>
        </div>
        
        <div>
            <label class="block text-sm text-slate-400 mb-2">Periode</label>
            <input type="text" name="periode" class="w-full p-3 rounded-xl bg-slate-700 border border-slate-600 text-white" placeholder="Contoh: Januari 2026">
        </div>
        
        <div>
            <label class="block text-sm text-slate-400 mb-2">Pengaju</label>
            <input type="text" name="pengaju" class="w-full p-3 rounded-xl bg-slate-700 border border-slate-600 text-white" required>
        </div>
        
        <div>
            <label class="block text-sm text-slate-400 mb-2">Departemen</label>
            <input type="text" name="departemen" class="w-full p-3 rounded-xl bg-slate-700 border border-slate-600 text-white">
        </div>
        
        <button type="submit" class="w-full bg-purple-600 hover:bg-purple-500 p-4 rounded-xl font-bold">📤 Ajukan Dana</button>
    </form>
    
    <div id="form-result" class="mt-4 text-center"></div>
    
    <button onclick="closeModule()" class="mt-6 w-full bg-slate-700 hover:bg-slate-600 p-3 rounded-xl font-bold">← Kembali ke Dashboard</button>
</div>
