<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Management | Dream OS v2.0</title>
    <style>
        :root { --emerald: #10b981; --blue: #3b82f6; --bg: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: transparent; color: white; font-family: 'Rajdhani', sans-serif; padding: 1rem; }
        .crystal-card { background: var(--bg); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .input-field { background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 0.75rem; width: 100%; color: white; outline: none; }
        .input-field:focus { border-color: var(--emerald); }
        .btn-action { background: linear-gradient(135deg, var(--blue) 0%, #1d4ed8 100%); border: none; border-radius: 12px; padding: 0.75rem 1.5rem; color: white; font-weight: 700; cursor: pointer; width: 100%; margin-top: 1rem; }
        .asset-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 1rem; margin-bottom: 0.75rem; }
        .qr-box { width: 150px; height: 150px; background: white; border-radius: 12px; margin: 1rem auto; display: flex; align-items: center; justify-content: center; }
        .arabic { font-family: 'Amiri', serif; }
    </style>
</head>
<body>

<div class="crystal-card">
    <h1 class="text-2xl font-bold mb-4 text-blue-400 flex items-center gap-3">
        <i class="fas fa-building text-3xl"></i>
        <span data-id="Asset Management" data-en="Asset Management">Asset Management</span>
    </h1>
    <p class="arabic text-lg text-emerald-300 text-center mb-4">بِسْمِ اللَّهِ</p>
    
    <!-- Stats -->
    <div class="grid grid-cols-3 gap-3 mb-6">
        <div class="text-center p-3 bg-white/5 rounded-xl">
            <div class="text-2xl font-bold text-blue-400" id="stat-total">0</div>
            <div class="text-xs">Total Assets</div>
        </div>
        <div class="text-center p-3 bg-white/5 rounded-xl">
            <div class="text-2xl font-bold text-emerald-400" id="stat-active">0</div>
            <div class="text-xs">Active</div>
        </div>
        <div class="text-center p-3 bg-white/5 rounded-xl">
            <div class="text-2xl font-bold text-orange-400" id="stat-maintenance">0</div>
            <div class="text-xs">Maintenance</div>
        </div>
    </div>
    
    <button onclick="openAddModal()" class="btn-action">
        <i class="fas fa-plus mr-2"></i> Tambah Asset
    </button>
</div>

<!-- Assets List --><div class="crystal-card">
    <h2 class="text-lg font-bold mb-4">Daftar Asset</h2>
    <input type="text" id="searchInput" class="input-field mb-4" placeholder="Cari asset..." onkeyup="searchAssets()">
    <div id="assetsList">
        <div class="text-center py-12 opacity-60">Memuat...</div>
    </div>
</div>

<!-- ADD ASSET MODAL -->
<div id="addModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4">
    <div class="crystal-card max-w-md w-full">
        <h3 class="text-xl font-bold mb-4">Tambah Asset Baru</h3>
        <input type="text" id="assetName" class="input-field mb-3" placeholder="Nama Asset">
        <input type="text" id="assetCategory" class="input-field mb-3" placeholder="Kategori">
        <input type="text" id="assetLocation" class="input-field mb-3" placeholder="Lokasi">
        <input type="text" id="assetSerial" class="input-field mb-3" placeholder="Serial Number">
        <div class="flex gap-3">
            <button onclick="addAsset()" class="btn-action flex-1">Simpan</button>
            <button onclick="closeAddModal()" class="btn-action flex-1" style="background: rgba(255,255,255,0.1);">Batal</button>
        </div>
    </div>
</div>

<!-- QR MODAL -->
<div id="qrModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4">
    <div class="crystal-card max-w-sm w-full text-center">
        <h3 class="text-xl font-bold mb-4">QR Code Asset</h3>
        <div class="qr-box" id="qrCode">
            <p class="text-black">QR will appear here</p>
        </div>
        <button onclick="downloadQR()" class="btn-action">
            <i class="fas fa-download mr-2"></i> Download QR
        </button>
        <button onclick="closeQrModal()" class="btn-action" style="background: rgba(255,255,255,0.1);">
            <i class="fas fa-times mr-2"></i> Close
        </button>
    </div>
</div>

<script type="module">
    import { supabase } from '../../core/supabase.js';
    import { showToast } from '../../core/components.js';

    let assets = [];

    export function init() {
        loadAssets();
    }

    async function loadAssets() {        const { data, error } = await supabase.from('assets').select('*').order('nama_asset');
        if (error) {
            document.getElementById('assetsList').innerHTML = '<p class="text-red-400 text-center">Gagal memuat</p>';
            return;
        }
        assets = data || [];
        renderAssets();
        updateStats();
    }

    function renderAssets(filter = '') {
        const container = document.getElementById('assetsList');
        const filtered = assets.filter(a => a.nama_asset.toLowerCase().includes(filter.toLowerCase()));
        
        if (filtered.length === 0) {
            container.innerHTML = '<p class="text-center opacity-60">Tidak ada asset</p>';
            return;
        }
        
        container.innerHTML = filtered.map(asset => `
            <div class="asset-card">
                <div class="flex justify-between items-start">
                    <div>
                        <div class="font-bold">${asset.nama_asset}</div>
                        <div class="text-xs opacity-60">${asset.kategori || '-'} | ${asset.lokasi || '-'}</div>
                        <div class="text-xs opacity-40 mt-1">S/N: ${asset.serial_number || '-'}</div>
                    </div>
                    <button onclick="showQR('${asset.id}', '${asset.nama_asset}')" class="text-emerald-400 text-sm">
                        <i class="fas fa-qrcode"></i> QR
                    </button>
                </div>
            </div>
        `).join('');
    }

    function updateStats() {
        document.getElementById('stat-total').textContent = assets.length;
        document.getElementById('stat-active').textContent = assets.filter(a => a.status === 'active').length;
        document.getElementById('stat-maintenance').textContent = assets.filter(a => a.status === 'maintenance').length;
    }

    window.searchAssets = function() {
        const query = document.getElementById('searchInput').value;
        renderAssets(query);
    };

    window.openAddModal = function() {
        document.getElementById('addModal').classList.remove('hidden');
        document.getElementById('addModal').classList.add('flex');
    };
    window.closeAddModal = function() {
        document.getElementById('addModal').classList.add('hidden');
        document.getElementById('addModal').classList.remove('flex');
    };

    window.closeQrModal = function() {
        document.getElementById('qrModal').classList.add('hidden');
        document.getElementById('qrModal').classList.remove('flex');
    };

    window.addAsset = async function() {
        const nama = document.getElementById('assetName').value;
        const kategori = document.getElementById('assetCategory').value;
        const lokasi = document.getElementById('assetLocation').value;
        const serial = document.getElementById('assetSerial').value;
        
        if (!nama) {
            showToast('Nama asset wajib diisi', 'warning');
            return;
        }
        
        const { error } = await supabase.from('assets').insert([{
            nama_asset: nama,
            kategori,
            lokasi,
            serial_number: serial,
            status: 'active',
            created_at: new Date().toISOString()
        }]);
        
        if (error) {
            showToast('Gagal: ' + error.message, 'error');
        } else {
            showToast('Asset ditambahkan', 'success');
            closeAddModal();
            loadAssets();
        }
    };

    window.showQR = function(assetId, assetName) {
        document.getElementById('qrModal').classList.remove('hidden');
        document.getElementById('qrModal').classList.add('flex');
        document.getElementById('qrCode').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=ASSET-${assetId}" alt="QR">`;
    };

    window.downloadQR = function() {
        showToast('QR downloaded', 'success');
    };
    init();
</script>

</body>
</html>
