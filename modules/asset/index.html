<script type="module">
    import { supabase } from '../../core/supabase.js';
    
    let assets = [];
    let inventory = [];
    
    async function init() {
        console.log('🏢 Asset Module Loading...');
        setupTabs();
        await loadData();
    }
    
    function setupTabs() {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                document.getElementById('tab-' + this.dataset.tab).classList.add('active');
            });
        });
    }
    
    async function loadData() {
        await Promise.all([loadAssets(), loadInventory()]);
        updateStats();
    }
    
    async function loadAssets() {
        const container = document.getElementById('assetList');
        try {
            const { data, error } = await supabase.from('assets').select('*').order('created_at', { ascending: false });
            if (error) throw error;
            assets = data || [];
            renderAssets();
        } catch (err) {
            container.innerHTML = '<p class="text-center text-red-400 py-8">Gagal: ' + err.message + '</p>';
        }
    }
    
    async function loadInventory() {
        try {
            const { data, error } = await supabase.from('inventory').select('*').order('nama_barang');
            if (error) throw error;
            inventory = data || [];
            renderInventory();            renderGudang();
        } catch (err) {
            inventory = [];
        }
    }
    
    function renderAssets() {
        const container = document.getElementById('assetList');
        if (assets.length === 0) {
            container.innerHTML = '<p class="text-center opacity-60 py-8">Belum ada asset</p>';
            return;
        }
        container.innerHTML = assets.map(a => `
            <div class="asset-card">
                <div class="flex justify-between items-start">
                    <div class="flex-1">
                        <div class="font-bold">${a.nama_asset || '-'}</div>
                        <div class="text-xs opacity-60">${a.kategori || '-'} | ${a.lokasi || '-'}</div>
                    </div>
                    <span class="badge badge-good">${a.kondisi || 'baik'}</span>
                </div>
            </div>
        `).join('');
    }
    
    function renderInventory() {
        const container = document.getElementById('inventoryList');
        if (inventory.length === 0) {
            container.innerHTML = '<p class="text-center opacity-60 py-8">Belum ada inventory</p>';
            return;
        }
        container.innerHTML = inventory.map(i => `
            <div class="asset-card">
                <div class="flex justify-between items-center">
                    <div>
                        <div class="font-bold">${i.nama_barang}</div>
                        <div class="text-xs opacity-60">${i.kategori || '-'}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-lg font-bold text-emerald-400">${i.jumlah} ${i.satuan || ''}</div>
                    </div>
                </div>
            </div>
        `).join('');
    }
    
    function renderGudang() {
        const container = document.getElementById('gudangList');
        if (inventory.length === 0) {
            container.innerHTML = '<p class="text-center opacity-60 col-span-2 py-8">Belum ada data</p>';            return;
        }
        const categories = {};
        inventory.forEach(i => {
            const cat = i.kategori || 'Umum';
            if (!categories[cat]) categories[cat] = [];
            categories[cat].push(i);
        });
        container.innerHTML = Object.entries(categories).map(([cat, items]) => `
            <div class="stat-box">
                <h3 class="font-bold mb-3 text-left">${cat}</h3>
                <div class="space-y-2 text-left">
                    ${items.map(i => `<div class="flex justify-between text-sm"><span>${i.nama_barang}</span><span class="text-emerald-400">${i.jumlah} ${i.satuan || ''}</span></div>`).join('')}
                </div>
            </div>
        `).join('');
    }
    
    function updateStats() {
        document.getElementById('stat-total-asset').textContent = assets.length;
        document.getElementById('stat-total-inventory').textContent = inventory.length;
        document.getElementById('stat-total-value').textContent = assets.reduce((s, a) => s + (a.harga || 0), 0).toLocaleString('id-ID');
    }
    
    window.openAssetModal = () => document.getElementById('assetModal').classList.remove('hidden');
    window.closeAssetModal = () => document.getElementById('assetModal').classList.add('hidden');
    window.openInventoryModal = () => document.getElementById('inventoryModal').classList.remove('hidden');
    window.closeInventoryModal = () => document.getElementById('inventoryModal').classList.add('hidden');
    
    window.saveAsset = async () => {
        const data = {
            nama_asset: document.getElementById('assetName').value,
            kategori: document.getElementById('assetCategory').value,
            lokasi: document.getElementById('assetLocation').value,
            harga: parseFloat(document.getElementById('assetPrice').value) || 0,
            kondisi: document.getElementById('assetCondition').value,
            created_at: new Date().toISOString()
        };
        await supabase.from('assets').insert([data]);
        alert('✅ Asset disimpan');
        closeAssetModal();
        loadAssets();
        updateStats();
    };
    
    window.saveInventory = async () => {
        const data = {
            nama_barang: document.getElementById('invName').value,
            kategori: document.getElementById('invCategory').value,
            jumlah: parseInt(document.getElementById('invQty').value) || 0,            minimal_stok: parseInt(document.getElementById('invMin').value) || 0,
            created_at: new Date().toISOString()
        };
        await supabase.from('inventory').insert([data]);
        alert('✅ Inventory disimpan');
        closeInventoryModal();
        loadInventory();
        updateStats();
    };
    
    init();
</script>
