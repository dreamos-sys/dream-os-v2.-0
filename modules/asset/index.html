<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset & Inventory | Dream OS v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --emerald: #10b981; --blue: #3b82f6; --orange: #f59e0b; --bg: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #020617 0%, #1e293b 100%); color: white; font-family: sans-serif; padding: 1rem; }
        .crystal-card { background: var(--bg); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .input-field { background: rgba(255,255,255,0.07); border: 2px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 0.75rem; width: 100%; color: white; }
        .btn-action { background: linear-gradient(135deg, var(--emerald) 0%, #059669 100%); border: none; border-radius: 12px; padding: 0.75rem 1.5rem; color: white; font-weight: 700; cursor: pointer; }
        .btn-blue { background: linear-gradient(135deg, var(--blue) 0%, #1d4ed8 100%); }
        .asset-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 1rem; margin-bottom: 0.75rem; }
        .tab-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 1.5rem; color: white; cursor: pointer; }
        .tab-btn.active { background: var(--emerald); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .stat-box { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 1rem; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 700; }
        .badge { padding: 0.25rem 0.75rem; border-radius: 12px; font-size: 0.75rem; }
        .badge-good { background: rgba(16,185,129,0.2); color: var(--emerald); }
        .badge-warning { background: rgba(245,158,11,0.2); color: var(--orange); }
        .badge-danger { background: rgba(239,68,68,0.2); color: var(--red); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 50; }
        .modal.active { display: flex; }
        .back-btn { position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 0.75rem 1rem; color: var(--emerald); cursor: pointer; z-index: 100; }
    </style>
</head>
<body>

<button class="back-btn" onclick="window.history.back()">← Kembali</button>

<div class="crystal-card">
    <h1 class="text-2xl font-bold mb-2 text-blue-400">🏢 Asset & Inventory</h1>
    <p class="text-sm opacity-60">Inventaris + Gudang</p>
</div>

<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
    <div class="stat-box"><div class="stat-value text-blue-400" id="stat-total-asset">0</div><div class="text-xs">Total Asset</div></div>
    <div class="stat-box"><div class="stat-value text-emerald-400" id="stat-total-inventory">0</div><div class="text-xs">Total Inventory</div></div>
    <div class="stat-box"><div class="stat-value text-orange-400" id="stat-low-stock">0</div><div class="text-xs">Low Stock</div></div>
    <div class="stat-box"><div class="stat-value text-purple-400" id="stat-total-value">0</div><div class="text-xs">Total Value</div></div>
</div>

<div class="flex gap-2 mb-6 overflow-x-auto">    <button class="tab-btn active" onclick="switchTab('asset')">🏢 Asset</button>
    <button class="tab-btn" onclick="switchTab('inventory')">📦 Inventory</button>
    <button class="tab-btn" onclick="switchTab('gudang')">🏭 Gudang</button>
    <button class="tab-btn" onclick="switchTab('report')">📊 Report</button>
</div>

<div id="tab-asset" class="tab-content active">
    <div class="crystal-card">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold">Daftar Asset</h2>
            <button onclick="openAssetModal()" class="btn-action btn-blue text-sm">+ Tambah</button>
        </div>
        <div id="assetList"><div class="text-center py-12">Memuat...</div></div>
    </div>
</div>

<div id="tab-inventory" class="tab-content">
    <div class="crystal-card">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold">Inventory</h2>
            <button onclick="openInventoryModal()" class="btn-action text-sm">+ Tambah</button>
        </div>
        <div id="inventoryList"><div class="text-center py-12">Memuat...</div></div>
    </div>
</div>

<div id="tab-gudang" class="tab-content">
    <div class="crystal-card">
        <h2 class="text-lg font-bold mb-4">🏭 Gudang</h2>
        <div id="gudangList" class="grid grid-cols-1 md:grid-cols-2 gap-4"><div class="text-center py-12">Memuat...</div></div>
    </div>
</div>

<div id="tab-report" class="tab-content">
    <div class="crystal-card">
        <h2 class="text-lg font-bold mb-4">📊 Report</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="stat-box"><h3 class="font-bold mb-2">Asset per Kategori</h3><div id="assetChart" class="py-8">Memuat...</div></div>
            <div class="stat-box"><h3 class="font-bold mb-2">Inventory Status</h3><div id="invChart" class="py-8">Memuat...</div></div>
        </div>
    </div>
</div>

<div id="assetModal" class="modal">
    <div class="crystal-card max-w-md w-full">
        <h3 class="text-xl font-bold mb-4">Tambah Asset</h3>
        <input type="text" id="assetName" class="input-field mb-3" placeholder="Nama Asset">
        <input type="text" id="assetCategory" class="input-field mb-3" placeholder="Kategori">
        <input type="text" id="assetLocation" class="input-field mb-3" placeholder="Lokasi">
        <input type="number" id="assetPrice" class="input-field mb-3" placeholder="Harga">        <select id="assetCondition" class="input-field mb-3">
            <option value="baik">Baik</option>
            <option value="rusak_ringan">Rusak Ringan</option>
            <option value="rusak_berat">Rusak Berat</option>
        </select>
        <div class="flex gap-3">
            <button onclick="saveAsset()" class="btn-action flex-1">Simpan</button>
            <button onclick="closeAssetModal()" class="btn-action flex-1" style="background:rgba(255,255,255,0.1)">Batal</button>
        </div>
    </div>
</div>

<div id="inventoryModal" class="modal">
    <div class="crystal-card max-w-md w-full">
        <h3 class="text-xl font-bold mb-4">Tambah Inventory</h3>
        <input type="text" id="invName" class="input-field mb-3" placeholder="Nama Barang">
        <input type="text" id="invCategory" class="input-field mb-3" placeholder="Kategori">
        <input type="number" id="invQty" class="input-field mb-3" placeholder="Jumlah">
        <input type="number" id="invMin" class="input-field mb-3" placeholder="Minimal Stok">
        <div class="flex gap-3">
            <button onclick="saveInventory()" class="btn-action flex-1">Simpan</button>
            <button onclick="closeInventoryModal()" class="btn-action flex-1" style="background:rgba(255,255,255,0.1)">Batal</button>
        </div>
    </div>
</div>

<script>
const SB_URL = 'https://pvznaeppaagylwddirla.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2em5hZXBwYWFneWx3ZGRpcmxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NTEwNDMsImV4cCI6MjA4NzUyNzA0M30.t9SJi3VfsBDkKmeZ3egZ4rbvljl4xe0WwNkPtfA9-vo';
const db = window.supabase.createClient(SB_URL, SB_KEY);
let assets = [], inventory = [];

async function init() {
    await loadData();
}

window.switchTab = function(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
};

async function loadData() {
    const [a, i] = await Promise.all([
        db.from('assets').select('*').order('created_at', { ascending: false }),
        db.from('inventory').select('*').order('nama_barang')
    ]);
    assets = a.data || [];
    inventory = i.data || [];    renderAll();
}

function renderAll() {
    document.getElementById('assetList').innerHTML = assets.length ? assets.map(x => `<div class="asset-card"><div class="flex justify-between"><div><div class="font-bold">${x.nama_asset}</div><div class="text-xs opacity-60">${x.kategori} | ${x.lokasi}</div>${x.harga ? `<div class="text-xs text-emerald-400">Rp ${x.harga.toLocaleString()}</div>` : ''}</div><span class="badge ${x.kondisi === 'baik' ? 'badge-good' : x.kondisi === 'rusak_ringan' ? 'badge-warning' : 'badge-danger'}">${x.kondisi}</span></div></div>`).join('') : '<p class="text-center py-8 opacity-60">Belum ada</p>';
    
    document.getElementById('inventoryList').innerHTML = inventory.length ? inventory.map(x => `<div class="asset-card"><div class="flex justify-between"><div><div class="font-bold">${x.nama_barang}</div><div class="text-xs opacity-60">${x.kategori}</div></div><div class="text-right"><div class="text-lg font-bold ${x.jumlah <= x.minimal_stok ? 'text-red-400' : 'text-emerald-400'}">${x.jumlah} ${x.satuan || ''}</div><div class="text-xs opacity-60">Min: ${x.minimal_stok}</div></div></div></div>`).join('') : '<p class="text-center py-8 opacity-60">Belum ada</p>';
    
    const cats = {}; inventory.forEach(x => { cats[x.kategori || 'Umum'] = (cats[x.kategori || 'Umum'] || 0) + 1; });
    document.getElementById('gudangList').innerHTML = Object.entries(cats).map(([c, items]) => `<div class="stat-box"><h3 class="font-bold mb-3 text-left">${c}</h3>${inventory.filter(x => x.kategori === c).map(x => `<div class="flex justify-between text-sm"><span>${x.nama_barang}</span><span class="text-emerald-400">${x.jumlah}</span></div>`).join('')}</div>`).join('');
    
    const ac = {}; assets.forEach(x => { ac[x.kategori || 'Lainnya'] = (ac[x.kategori || 'Lainnya'] || 0) + 1; });
    document.getElementById('assetChart').innerHTML = Object.entries(ac).map(([c, n]) => `<div class="flex justify-between mb-2"><span>${c}</span><span class="text-emerald-400">${n}</span></div>`).join('');
    
    const good = inventory.filter(x => x.jumlah > x.minimal_stok).length;
    document.getElementById('invChart').innerHTML = `<div class="space-y-2"><div class="flex justify-between"><span>Stock Aman</span><span class="text-emerald-400">${good}</span></div><div class="flex justify-between"><span>Stock Rendah</span><span class="text-red-400">${inventory.length - good}</span></div></div>`;
    
    document.getElementById('stat-total-asset').textContent = assets.length;
    document.getElementById('stat-total-inventory').textContent = inventory.length;
    document.getElementById('stat-low-stock').textContent = inventory.filter(x => x.jumlah <= x.minimal_stok).length;
    document.getElementById('stat-total-value').textContent = assets.reduce((s, x) => s + (x.harga || 0), 0).toLocaleString();
}

window.openAssetModal = () => document.getElementById('assetModal').classList.add('active');
window.closeAssetModal = () => document.getElementById('assetModal').classList.remove('active');
window.openInventoryModal = () => document.getElementById('inventoryModal').classList.add('active');
window.closeInventoryModal = () => document.getElementById('inventoryModal').classList.remove('active');

window.saveAsset = async () => {
    const d = { nama_asset: document.getElementById('assetName').value, kategori: document.getElementById('assetCategory').value, lokasi: document.getElementById('assetLocation').value, harga: parseFloat(document.getElementById('assetPrice').value) || 0, kondisi: document.getElementById('assetCondition').value, status: 'active', created_at: new Date().toISOString() };
    if (!d.nama_asset) { alert('Nama wajib!'); return; }
    await db.from('assets').insert([d]);
    alert('✅ Disimpan');
    closeAssetModal();
    loadData();
};

window.saveInventory = async () => {
    const d = { nama_barang: document.getElementById('invName').value, kategori: document.getElementById('invCategory').value, jumlah: parseInt(document.getElementById('invQty').value) || 0, minimal_stok: parseInt(document.getElementById('invMin').value) || 0, created_at: new Date().toISOString() };
    if (!d.nama_barang) { alert('Nama wajib!'); return; }
    await db.from('inventory').insert([d]);
    alert('✅ Disimpan');
    closeInventoryModal();
    loadData();
};

init();
</script>
</body>
</html>
