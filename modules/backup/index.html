<div class="max-w-3xl mx-auto p-4">
    <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400 mb-6">
        💾 Backup & Restore
    </h1>
    <div class="glass-card p-6 rounded-3xl space-y-4">
        <button onclick="createBackup()" class="w-full bg-indigo-600 hover:bg-indigo-500 p-4 rounded-xl font-bold">
            <i class="fas fa-database mr-2"></i> Buat Backup Sekarang
        </button>
        <div id="backup-list" class="space-y-2">
            <p class="text-slate-400">Belum ada backup</p>
        </div>
    </div>

    <div class="text-center mt-6">
        <button onclick="window.closeModule()" class="px-6 py-2 bg-slate-700 hover:bg-slate-600 rounded-xl">← Kembali</button>
    </div>
</div>
