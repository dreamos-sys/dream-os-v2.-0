<div class="crystal-card p-6 max-w-4xl mx-auto">
    <h1 class="text-2xl font-bold mb-6 text-orange-400 flex items-center gap-3">
        <i class="fas fa-exclamation-triangle text-3xl"></i>
        Laporan K3
    </h1>
    
    <form id="k3Form" class="space-y-4">
        <div>
            <label class="text-xs text-white/60 mb-2 block">Tanggal</label>
            <input type="date" name="tanggal" class="input-field" required>
        </div>
        <div>
            <label class="text-xs text-white/60 mb-2 block">Lokasi</label>
            <input type="text" name="lokasi" class="input-field" placeholder="Contoh: Gedung A, Lantai 2" required>
        </div>
        <div>
            <label class="text-xs text-white/60 mb-2 block">Jenis Laporan</label>
            <select name="jenis_laporan" class="input-field" required>
                <option value="">-- Pilih Jenis --</option>
                <option value="kerusakan">🔧 Kerusakan Fasilitas</option>
                <option value="kehilangan">📦 Kehilangan</option>
                <option value="kebersihan">🧹 Kebersihan</option>
                <option value="kecelakaan">⚠️ Kecelakaan</option>
                <option value="bahaya">☢️ Potensi Bahaya</option>
                <option value="lainnya">📌 Lainnya</option>
            </select>
        </div>
        <div>
            <label class="text-xs text-white/60 mb-2 block">Deskripsi</label>
            <textarea name="deskripsi" rows="4" class="input-field" placeholder="Jelaskan detail kejadian..." required></textarea>
        </div>
        <div>
            <label class="text-xs text-white/60 mb-2 block">Pelapor</label>
            <input type="text" name="pelapor" class="input-field" placeholder="Nama Anda" required>
        </div>
        <div>
            <label class="text-xs text-white/60 mb-2 block">Prioritas</label>
            <select name="priority" class="input-field">
                <option value="normal">⚪ Normal</option>
                <option value="high">🟡 Tinggi</option>
                <option value="critical">🔴 Critical</option>
            </select>
        </div>
        <button type="submit" class="btn-submit">
            <i class="fas fa-paper-plane mr-2"></i> Laporkan
        </button>
    </form>
    
    <div id="formResult" class="mt-4 text-center hidden"></div>
    
    <button onclick="window.closeModule()" class="mt-6 w-full bg-slate-700 hover:bg-slate-600 p-3 rounded-xl font-bold">
        ← Kembali ke Dashboard
    </button>
</div>

<script type="module">
    import { supabase } from '../../core/supabase.js';
    import { showToast } from '../../core/components.js';

    document.getElementById('k3Form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData);
        const btn = e.target.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Mengirim...';

        try {
            const { error } = await supabase.from('k3_reports').insert([{
                tanggal: data.tanggal,
                lokasi: data.lokasi,
                jenis_laporan: data.jenis_laporan,
                deskripsi: data.deskripsi,
                pelapor: data.pelapor,
                priority: data.priority || 'normal',
                status: 'pending'
            }]);

            if (error) throw error;

            document.getElementById('formResult').innerHTML = '<p class="text-green-400 font-bold">✅ Laporan K3 berhasil dikirim!</p>';
            document.getElementById('formResult').classList.remove('hidden');
            showToast('Laporan K3 berhasil', 'success');
            e.target.reset();
        } catch (err) {
            document.getElementById('formResult').innerHTML = '<p class="text-red-400 font-bold">❌ Error: ' + err.message + '</p>';
            document.getElementById('formResult').classList.remove('hidden');
            showToast('Gagal: ' + err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i> Laporkan';
        }
    });
</script>
