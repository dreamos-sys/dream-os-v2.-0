<div class="max-w-3xl mx-auto p-4">
    <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 mb-6">
        🤖 AI Assistant
    </h1>
    <div class="glass-card p-6 rounded-3xl">
        <div class="flex gap-2 mb-4">
            <input type="text" id="ai-question" placeholder="Tanya sesuatu..." class="flex-1 p-3 rounded-xl bg-slate-800 border border-slate-700">
            <button onclick="askAI()" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-3 rounded-xl font-bold">Tanya</button>
        </div>
        <div id="ai-answer" class="p-4 bg-slate-800 rounded-xl min-h-[100px]">
            <p class="text-slate-400">Halo, saya asisten Dream OS. Silakan bertanya seputar sistem.</p>
        </div>
    </div>

    <div class="text-center mt-6">
        <button onclick="window.closeModule()" class="px-6 py-2 bg-slate-700 hover:bg-slate-600 rounded-xl">← Kembali</button>
    </div>
</div>
