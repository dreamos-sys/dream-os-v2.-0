<div class="max-w-6xl mx-auto p-4">
    <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-red-400 mb-6">
        📈 Analitik
    </h1>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="glass-card p-6 rounded-3xl">
            <h2 class="text-lg font-bold mb-4">Booking per Hari (7 hari)</h2>
            <canvas id="chartBooking" height="200"></canvas>
        </div>
        <div class="glass-card p-6 rounded-3xl">
            <h2 class="text-lg font-bold mb-4">Status Booking</h2>
            <canvas id="chartStatus" height="200"></canvas>
        </div>
        <div class="glass-card p-6 rounded-3xl">
            <h2 class="text-lg font-bold mb-4">Pengajuan Dana per Kategori</h2>
            <canvas id="chartDana" height="200"></canvas>
        </div>
        <div class="glass-card p-6 rounded-3xl">
            <h2 class="text-lg font-bold mb-4">K3 per Lokasi</h2>
            <canvas id="chartK3" height="200"></canvas>
        </div>
    </div>

    <div class="text-center mt-6">
        <button onclick="window.closeModule()" class="px-6 py-2 bg-slate-700 hover:bg-slate-600 rounded-xl">← Kembali</button>
    </div>
</div>
