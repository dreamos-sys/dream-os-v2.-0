<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <title>Dream OS v2.0 | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #020617; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; padding: 1rem; }
        .arabic { font-family: 'Amiri', serif; }
        
        /* HEADER */
        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .user-info { display: flex; align-items: center; gap: 1rem; }
        .user-badge {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .logout-btn {
            background: #ef4444;
            border: none;
            border-radius: 12px;
            padding: 0.5rem 1rem;
            color: white;
            cursor: pointer;
            font-weight: 600;
        }
        
        /* WELCOME */        .welcome { text-align: center; margin-bottom: 2rem; }
        .bismillah { font-size: 2rem; color: #10b981; margin-bottom: 1rem; text-shadow: 0 0 20px rgba(16,185,129,0.5); }
        
        /* STATS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
        }
        .stat-value { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
        .stat-label { font-size: 0.65rem; opacity: 0.6; text-transform: uppercase; }
        
        /* MODULE GRID */
        .module-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            max-width: 500px;
            margin: 0 auto;
        }
        .module-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }
        .module-card:hover {
            transform: translateY(-5px);
            border-color: #10b981;
        }
        .module-icon {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.1);            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 0.5rem;
            font-size: 1.5rem;
        }
        .module-name { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; }
        
        /* FOOTER */
        .footer { text-align: center; margin-top: 3rem; opacity: 0.3; font-size: 0.75rem; }
        
        /* SESSION TIMER */
        .session-timer {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 0.5rem 1rem;
            border-radius: 12px;
            font-size: 0.75rem;
            z-index: 50;
        }
        
        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .module-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<!-- SESSION TIMER -->
<div class="session-timer">
    <i class="fas fa-clock"></i> <span id="timerDisplay">5:00</span>
</div>

<!-- HEADER -->
<div class="header">
    <div class="user-info">
        <div class="user-badge" id="userBadge">D</div>
        <div>
            <div style="font-weight: 700;">Dream OS <span style="color: #10b981;">v2.0</span></div>
            <div style="font-size: 0.75rem; opacity: 0.5;">Logged as: <span id="userRole">-</span></div>
        </div>
    </div>
    <button class="logout-btn" onclick="doLogout()">Logout</button>
</div>
<!-- WELCOME -->
<div class="welcome">
    <p class="arabic bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</p>
    <p class="arabic" style="color: #10b981; margin-bottom: 1rem;">اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ</p>
    <h2 style="margin-bottom: 0.5rem;">Welcome, <span id="welcomeName" style="color: #10b981;">User</span>!</h2>
    <p style="opacity: 0.5; font-size: 0.875rem;">Select a module to continue</p>
</div>

<!-- STATS -->
<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-value" style="color: #3b82f6;" id="stat-booking">0</div>
        <div class="stat-label">Booking</div>
    </div>
    <div class="stat-card">
        <div class="stat-value" style="color: #f59e0b;" id="stat-k3">0</div>
        <div class="stat-label">K3</div>
    </div>
    <div class="stat-card">
        <div class="stat-value" style="color: #a855f7;" id="stat-dana">0</div>
        <div class="stat-label">Dana</div>
    </div>
    <div class="stat-card">
        <div class="stat-value" style="color: #10b981;" id="stat-security">SAFE</div>
        <div class="stat-label">Security</div>
    </div>
</div>

<!-- MODULE GRID -->
<div class="module-grid" id="moduleGrid"></div>

<!-- FOOTER -->
<div class="footer">
    <p>🔐 ISO 27001 • ISO 55001 • ISO 9001</p>
    <p style="margin-top: 0.5rem;">Dream Team © 2026</p>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CHECK SESSION
// ═══════════════════════════════════════════════════════
var role = sessionStorage.getItem('dream_role');
var modules = sessionStorage.getItem('dream_modules');

if (!role || !modules) {
    alert('❌ Please login first!');
    window.location.href = 'index.html';
}

// Display user infodocument.getElementById('userRole').textContent = role;
document.getElementById('welcomeName').textContent = role;
document.getElementById('userBadge').textContent = role.charAt(0);

// ═══════════════════════════════════════════════════════
// MODULES
// ═══════════════════════════════════════════════════════
var MODULES = [
    { id: 'booking', name: 'Booking', icon: '📅', color: '#3b82f6' },
    { id: 'k3', name: 'K3 Report', icon: '⚠️', color: '#f59e0b' },
    { id: 'sekuriti', name: 'Sekuriti', icon: '🛡️', color: '#10b981' },
    { id: 'janitor-indoor', name: 'Janitor In', icon: '🧹', color: '#06b6d4' },
    { id: 'janitor-outdoor', name: 'Janitor Out', icon: '🌿', color: '#22c55e' },
    { id: 'stok', name: 'Stok', icon: '📦', color: '#a855f7' },
    { id: 'maintenance', name: 'Maintenance', icon: '🔧', color: '#eab308' },
    { id: 'asset', name: 'Asset', icon: '🏢', color: '#6366f1' },
    { id: 'commandcenter', name: 'Command', icon: '📊', color: '#ec4899' }
];

var userModules = JSON.parse(modules);
var grid = document.getElementById('moduleGrid');
grid.innerHTML = '';

MODULES.forEach(function(m) {
    if (userModules.includes(m.id) || userModules.includes('all')) {
        var card = document.createElement('div');
        card.className = 'module-card';
        card.onclick = function() { openModule(m.id); };
        card.innerHTML = '<div class="module-icon" style="background: ' + m.color + '20; color: ' + m.color + ';">' + m.icon + '</div><div class="module-name">' + m.name + '</div>';
        grid.appendChild(card);
    }
});

// ═══════════════════════════════════════════════════════
// OPEN MODULE
// ═══════════════════════════════════════════════════════
function openModule(id) {
    console.log('📂 Opening module:', id);
    window.location.href = 'modules/' + id + '/index.html';
}

// ═══════════════════════════════════════════════════════
// SESSION TIMER
// ═══════════════════════════════════════════════════════
var sessionTime = 300;
var sessionTimer = setInterval(function() {
    sessionTime--;
    var m = Math.floor(sessionTime / 60);
    var s = sessionTime % 60;
    document.getElementById('timerDisplay').textContent = m + ':' + (s < 10 ? '0' : '') + s;    
    if (sessionTime <= 0) {
        clearInterval(sessionTimer);
        alert('⏰ Session expired!');
        sessionStorage.clear();
        window.location.href = 'index.html';
    }
}, 1000);

// ═══════════════════════════════════════════════════════
// LOGOUT
// ═══════════════════════════════════════════════════════
function doLogout() {
    sessionStorage.clear();
    window.location.href = 'index.html';
}

console.log('✅ App Shell Ready! User:', role);
</script>

</body>
</html>
