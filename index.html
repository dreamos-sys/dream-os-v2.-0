<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream OS v2.0 | Crystal Prism</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== CSS LENGKAP (salin dari file sebelumnya) ===== */
        :root { --emerald: #10b981; --gold: #fbbf24; --deep-space: #020617; --crystal: rgba(255,255,255,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--deep-space); color: white; font-family: 'Rajdhani', sans-serif; min-height: 100vh; }
        .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.15); border-radius: 24px; }
        .crystal-icon { width: 70px; height: 70px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2) 0%, transparent 70%); border: 2px solid rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; margin: 0 auto 0.5rem; font-size: 2rem; }
        .module-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; max-width: 450px; margin: 0 auto; }
        .module-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 2rem 1rem; text-align: center; cursor: pointer; transition: 0.3s; }
        .module-card:hover { transform: translateY(-12px); border-color: var(--emerald); }
        .toast { position: fixed; top: 20px; right: 20px; background: rgba(16,185,129,0.95); color: white; padding: 1rem; border-radius: 16px; z-index: 10000; }
        .hidden { display: none !important; }
        /* Tambahkan CSS lain yang diperlukan (slider, dll) nanti */
    </style>
</head>
<body class="theme-isha">

<!-- LOGIN ZONE -->
<div id="login-zone" class="fixed inset-0 z-50 flex items-center justify-center p-6">
    <div class="glass-card p-8 max-w-sm w-full text-center">
        <div class="crystal-logo"><i class="fas fa-rocket"></i></div>
        <h1 class="text-2xl font-bold mb-1">Dream OS <span style="color: var(--emerald);">v2.0</span></h1>
        <p class="text-xs text-slate-400 mb-6">Crystal Prism Edition</p>
        <p class="arabic text-2xl text-emerald-300 mb-6">بِسْمِ اللَّهِ</p>
        <div class="relative mb-6">
            <input type="password" id="passkey" class="input-crystal" placeholder="Access Code">
            <button type="button" id="toggleBtn" class="eye-btn"><i class="fas fa-eye" id="eyeIcon"></i></button>
        </div>
        <button id="btnLogin" class="btn-crystal"><i class="fas fa-lock-open mr-2"></i> Access System</button>
        <p id="error-msg" class="text-red-400 text-xs mt-4 h-4 font-bold"></p>
        <p class="text-[8px] text-slate-500 mt-8">🔐 ISO 27001 | Dream Team © 2026</p>
    </div>
</div>

<!-- APP SHELL -->
<div id="app-shell" class="hidden max-w-7xl mx-auto p-4">
    <div class="glass-card p-4 mb-6 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="text-3xl">🚀</div>
            <div><h1 class="text-xl font-bold">Dream OS <span class="text-white">v2.0</span></h1></div>
        </div>
        <div class="flex items-center gap-4">
            <span id="user-role" class="text-sm"></span>
            <button onclick="window.doLogout()" class="bg-red-600 px-3 py-1 rounded-lg text-xs">Logout</button>
        </div>
    </div>

    <!-- Grid Modul -->
    <div class="module-grid" id="grid-modules"></div>
</div>

<!-- MODULE WINDOW -->
<div id="module-window" class="hidden fixed inset-0 z-50 p-4" style="background: rgba(0,0,0,0.95); overflow-y: auto;">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <button onclick="window.doCloseModule()" class="text-emerald-400"><i class="fas fa-arrow-left mr-2"></i>Back</button>
            <button onclick="window.doCloseModule()" class="text-white/40"><i class="fas fa-times"></i></button>
        </div>
        <div id="module-content"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
    import { store } from './core/store.js';
    import { login, logout, checkSession } from './core/auth.js';
    import { loadModule, closeModule } from './core/router.js';
    import { showToast } from './core/components.js';

    window.loadModule = loadModule;
    window.doCloseModule = closeModule;
    window.doLogout = logout;

    const MODULES = [
        { id: 'commandcenter', name: 'COMMAND', icon: '📊' },
        { id: 'booking', name: 'BOOKING', icon: '📅' },
        { id: 'k3', name: 'K3', icon: '⚠️' },
        { id: 'sekuriti', name: 'SEKURITI', icon: '🛡️' },
        { id: 'janitor-indoor', name: 'JANITOR IN', icon: '🧹' },
        { id: 'janitor-outdoor', name: 'JANITOR OUT', icon: '🌿' },
        { id: 'stok', name: 'STOK', icon: '📦' },
        { id: 'maintenance', name: 'MAINTENANCE', icon: '🔧' },
        { id: 'asset', name: 'ASSET', icon: '🏢' }
    ];

    function renderGrid(modules) {
        const container = document.getElementById('grid-modules');
        if (!container) return;
        container.innerHTML = '';
        MODULES.forEach(m => {
            if (modules.includes(m.id) || modules.includes('all')) {
                const card = document.createElement('div');
                card.className = 'module-card';
                card.onclick = () => loadModule(m.id);
                card.innerHTML = `<div class="crystal-icon">${m.icon}</div><div class="text-xs font-bold uppercase">${m.name}</div>`;
                container.appendChild(card);
            }
        });
    }

    // Toggle password
    document.getElementById('toggleBtn').addEventListener('click', function() {
        const pass = document.getElementById('passkey');
        const icon = document.getElementById('eyeIcon');
        pass.type = pass.type === 'password' ? 'text' : 'password';
        icon.className = pass.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
    });

    // Login
    document.getElementById('btnLogin').addEventListener('click', async () => {
        const key = document.getElementById('passkey').value;
        const success = await login(key);
        if (success) {
            const user = store.get('user');
            document.getElementById('login-zone').classList.add('hidden');
            document.getElementById('app-shell').classList.remove('hidden');
            document.getElementById('user-role').textContent = user.role;
            renderGrid(user.modules);
            showToast('Welcome, ' + user.role + '!', true);
        } else {
            document.getElementById('error-msg').textContent = '❌ Access Denied!';
            setTimeout(() => document.getElementById('error-msg').textContent = '', 2000);
        }
    });

    // Enter key
    document.getElementById('passkey').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('btnLogin').click();
    });

    // Check session
    if (checkSession()) {
        const user = store.get('user');
        document.getElementById('login-zone').classList.add('hidden');
        document.getElementById('app-shell').classList.remove('hidden');
        document.getElementById('user-role').textContent = user.role;
        renderGrid(user.modules);
    }
</script>
</body>
</html>
