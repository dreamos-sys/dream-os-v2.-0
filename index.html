<!DOCTYPE html>
<html>
<head>
    <title>Dream OS v2.0</title>
</head>
<body>
    <h2>Dream OS v2.0</h2>
    <input type="password" id="passkey" placeholder="Access Code">
    <button id="btnLogin">Login</button>
    <p id="error-msg"></p>

    <script type="module">
        import { login } from './core/auth.js';

        document.getElementById('btnLogin').addEventListener('click', async () => {
            const key = document.getElementById('passkey').value;
            const success = await login(key);
            if (success) {
                alert('Login berhasil dengan core!');
            } else {
                document.getElementById('error-msg').textContent = '❌ Access Denied!';
            }
        });
    </script>
</body>
</html>
