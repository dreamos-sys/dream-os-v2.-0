// ===== TOAST =====
function showToast(msg, ok) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = (ok ? '✅ ' : '❌ ') + msg;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(() => t.remove(), 3000);
}
// ===== SHOW/HIDE PASSWORD =====
document.getElementById('toggleBtn').addEventListener('click', function() {
    const pass = document.getElementById('passkey');
    const icon = document.getElementById('eyeIcon');
    pass.type = pass.type === 'password' ? 'text' : 'password';
    icon.className = pass.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
});

// ===== RENDER MODULES =====
function renderGrid(modules) {
    const container = document.getElementById('grid-modules');
    container.innerHTML = '';
    MODULES.forEach(m => {
        if (modules.includes(m.id) || modules.includes('all')) {
            const card = document.createElement('div');
            card.className = 'module-card';
            card.onclick = () => openModule(m.id);
            card.innerHTML = `
                <div class="crystal-icon">${m.icon}</div>
                <div class="text-xs font-bold uppercase tracking-wider">${m.name}</div>
            `;
            container.appendChild(card);
        }
    });
}

// ===== OPEN MODULE =====
function openModule(id) {
    document.getElementById('module-window').classList.remove('hidden');
    document.getElementById('module-content').innerHTML = '<div class="shalawat-loading"><div class="arabic">اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ</div><p class="text-slate-400 mt-4">Loading ' + id + '...</p></div>';
    
    fetch('./modules/' + id + '/index.html')
        .then(r => r.text())
        .then(h => { document.getElementById('module-content').innerHTML = h; })
        .catch(e => { document.getElementById('module-content').innerHTML = '<div class="text-center py-20"><p class="text-red-400">Module not found: ' + id + '</p></div>'; });
}

// ===== CLOSE MODULE =====
function doCloseModule() {
    document.getElementById('module-window').classList.add('hidden');
}

// ===== SESSION TIMER =====
function startSessionTimer() {
    sessionTime = 300;
    const display = document.getElementById('timerDisplay');
    sessionTimer = setInterval(() => {
        sessionTime--;
        const m = Math.floor(sessionTime / 60);
        const s = sessionTime % 60;        display.textContent = m + ':' + (s < 10 ? '0' : '') + s;
        if (sessionTime <= 0) {
            clearInterval(sessionTimer);
            showToast('Session expired!', false);
            sessionStorage.clear();
            location.reload();
        }
    }, 1000);
}

// ===== PRAYER TIME =====
function updatePrayerTheme() {
    const hour = new Date().getHours();
    const body = document.body;
    const prayer = document.getElementById('prayerTime');
    
    body.className = '';
    
    if (hour >= 4 && hour < 6) { body.classList.add('theme-fajr'); prayer.textContent = '🌅 Fajr'; }
    else if (hour >= 6 && hour < 12) { body.classList.add('theme-dhuhr'); prayer.textContent = '☀️ Dhuhr'; }
    else if (hour >= 12 && hour < 15) { body.classList.add('theme-asr'); prayer.textContent = '🌤️ Asr'; }
    else if (hour >= 15 && hour < 18) { body.classList.add('theme-maghrib'); prayer.textContent = '🌅 Maghrib'; }
    else { body.classList.add('theme-isha'); prayer.textContent = '🌙 Isha'; }
}

// ===== LOGIN FUNCTION =====
document.getElementById('btnLogin').addEventListener('click', async () => {
    const key = document.getElementById('passkey').value.trim();
    const msg = document.getElementById('error-msg');
    
    if (!key) {
        msg.textContent = '❌ Masukkan Access Code!';
        return;
    }
    
    const userData = ACCESS_CODES[key];
    
    if (!userData) {
        msg.textContent = '❌ Access Denied!';
        showToast('Invalid access code!', false);
        setTimeout(() => msg.textContent = '', 2000);
        return;
    }
    
    // SUCCESS!
    sessionStorage.setItem('role', userData.role);
    sessionStorage.setItem('modules', JSON.stringify(userData.modules));
    
    document.getElementById('login-zone').classList.add('hidden');
    document.getElementById('app-shell').classList.remove('hidden');    document.getElementById('prayerIndicator').classList.remove('hidden');
    document.getElementById('sessionTimer').classList.remove('hidden');
    document.getElementById('user-role').textContent = userData.role;
    
    renderGrid(userData.modules);
    startSessionTimer();
    updatePrayerTheme();
    showToast('Welcome, ' + userData.role + '!', true);
});

// ===== LOGOUT =====
function doLogout() {
    sessionStorage.clear();
    location.reload();
}

// ===== ENTER KEY =====
document.getElementById('passkey').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') document.getElementById('btnLogin').click();
});

// ===== CHECK SESSION =====
window.addEventListener('load', () => {
    const role = sessionStorage.getItem('role');
    const modules = JSON.parse(sessionStorage.getItem('modules') || '[]');
    
    if (role) {
        document.getElementById('login-zone').classList.add('hidden');
        document.getElementById('app-shell').classList.remove('hidden');
        document.getElementById('prayerIndicator').classList.remove('hidden');
        document.getElementById('sessionTimer').classList.remove('hidden');
        document.getElementById('user-role').textContent = role;
        renderGrid(modules);
        startSessionTimer();
        updatePrayerTheme();
    }
});
