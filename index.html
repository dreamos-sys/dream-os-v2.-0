<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <title>Dream OS v2.0 | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rajdhani', sans-serif; background: #0f172a; color: white; min-height: 100vh; overflow-x: hidden; }
        .bg-animated { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); }
        .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; position: relative; z-index: 1; }
        .module-card { background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 2rem; cursor: pointer; transition: all 0.4s ease; position: relative; z-index: 1; }
        .module-card:hover { transform: translateY(-8px); border-color: #10b981; box-shadow: 0 20px 60px rgba(16,185,129,0.3); }
        .module-icon { font-size: 3.5rem; margin-bottom: 1rem; transition: transform 0.3s ease; }
        .module-card:hover .module-icon { transform: scale(1.2); }
        .btn-primary { background: linear-gradient(135deg, #10b981 0%, #059669 100%); border: none; border-radius: 16px; padding: 1rem 2rem; font-weight: 700; cursor: pointer; transition: all 0.3s ease; position: relative; z-index: 10; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(16,185,129,0.4); }
        .input-modern { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 1rem 1.5rem; color: white; font-family: 'Rajdhani', sans-serif; transition: all 0.3s ease; position: relative; z-index: 10; }
        .input-modern:focus { outline: none; border-color: #10b981; box-shadow: 0 0 20px rgba(16,185,129,0.3); }
        .eye-btn { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); z-index: 100; pointer-events: auto !important; background: transparent; border: none; cursor: pointer; padding: 8px; }
        .eye-btn:hover { color: #10b981 !important; }
        .toast { background: linear-gradient(135deg, #10b981 0%, #059669 100%); border-radius: 16px; padding: 1rem 2rem; box-shadow: 0 10px 40px rgba(16,185,129,0.4); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .title-font { font-family: 'Orbitron', sans-serif; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="bg-animated"></div>
<div id="toast-container" class="fixed top-4 right-4 z-50"></div>

<!-- LOGIN -->
<div id="login-zone" class="fixed inset-0 z-40 flex items-center justify-center">
    <div class="glass-card p-8 max-w-md w-full mx-4">
        <div class="text-center">
            <div class="text-6xl mb-4">🚀</div>
            <h1 class="title-font text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 mb-2">DREAM OS v2.0</h1>
            <p class="text-sm text-slate-400 mb-6">The Future of Management</p>
            <p class="text-xl text-emerald-300 mb-6">بِسْمِ اللَّهِ</p>
            
            <div class="relative mb-6" style="z-index: 50;">
                <input type="password" id="passkey" class="input-modern w-full text-center font-mono pr-12" placeholder="Enter Access Code">
                <button type="button" id="toggleBtn" class="eye-btn text-slate-400" onclick="togglePass()" title="Show/Hide Password">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </button>            </div>
            
            <button class="btn-primary w-full mb-4" onclick="doLogin()">
                <i class="fas fa-lock-open mr-2"></i> Access System
            </button>
            
            <p id="errMsg" class="text-red-400 text-xs hidden"></p>
            <p class="text-[8px] text-slate-500 mt-8">Dream Team © 2026</p>
        </div>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden max-w-7xl mx-auto p-4 md:p-8">
    <div class="glass-card p-6 mb-8">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="text-4xl">🚀</div>
                <div>
                    <h1 class="title-font text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">DREAM OS v2.0</h1>
                    <p class="text-xs text-slate-400">COMMAND CENTER</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="glass-card px-4 py-2">
                    <span class="text-xs text-slate-400">USER:</span>
                    <span id="userRole" class="text-emerald-400 font-bold ml-2"></span>
                </div>
                <button class="bg-red-600 hover:bg-red-500 px-4 py-2 rounded-xl text-xs font-bold cursor-pointer" onclick="doLogout()">Logout</button>
            </div>
        </div>
    </div>
    
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        <div class="glass-card p-4 text-center">
            <div class="text-3xl mb-2">📅</div>
            <div class="text-2xl font-black text-emerald-400" id="stat-booking">0</div>
            <div class="text-xs text-slate-400">BOOKINGS</div>
        </div>
        <div class="glass-card p-4 text-center">
            <div class="text-3xl mb-2">⚠️</div>
            <div class="text-2xl font-black text-orange-400" id="stat-k3">0</div>
            <div class="text-xs text-slate-400">K3 REPORTS</div>
        </div>
        <div class="glass-card p-4 text-center">
            <div class="text-3xl mb-2">💰</div>
            <div class="text-2xl font-black text-purple-400" id="stat-dana">0</div>
            <div class="text-xs text-slate-400">PENDING</div>
        </div>
        <div class="glass-card p-4 text-center">            <div class="text-3xl mb-2">🛡️</div>
            <div class="text-2xl font-black text-cyan-400">SAFE</div>
            <div class="text-xs text-slate-400">SECURITY</div>
        </div>
    </div>
    
    <div class="mb-8">
        <h2 class="title-font text-xl font-bold mb-6 text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">MODULES</h2>
        <div id="moduleGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
    </div>
</div>

<!-- MODULE WINDOW -->
<div id="modWindow" class="hidden fixed inset-0 bg-slate-900/95 z-50 overflow-y-auto p-4 backdrop-blur-xl">
    <div class="max-w-7xl mx-auto">
        <button class="mb-6 text-emerald-400 hover:text-emerald-300 transition cursor-pointer text-lg" onclick="closeMod()">
            <i class="fas fa-arrow-left mr-2"></i> Back to Dashboard
        </button>
        <div id="modContent"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ===== CONFIG =====
var SB_URL = 'https://pvznaeppaagylwddirla.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2em5hZXBwYWFneWx3ZGRpcmxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NTEwNDMsImV4cCI6MjA4NzUyNzA0M30.t9SJi3VfsBDkKmeZ3egZ4rbvljl4xe0WwNkPtfA9-vo';
var supabase = window.supabase.createClient(SB_URL, SB_KEY);

// ===== ROLES =====
var ROLES = {
    "012443410": { role: "DEVELOPER", mods: ['booking','k3','dana','commandcenter'] },
    "Mr.M_Architect_2025": { role: "MASTER", mods: ['booking','k3','dana','commandcenter'] },
    "4dm1n_AF6969@00": { role: "ADMIN", mods: ['booking','k3','dana','commandcenter'] },
    "user_@1234": { role: "USER", mods: ['booking'] },
    "user_@2345": { role: "USER", mods: ['k3'] }
};

// ===== MODULES =====
var MODS = [
    { id: 'booking', name: 'BOOKING', icon: '📅' },
    { id: 'k3', name: 'K3 REPORT', icon: '⚠️' },
    { id: 'dana', name: 'DANA', icon: '💰' },
    { id: 'commandcenter', name: 'COMMAND CENTER', icon: '📊' }
];

var curRole = null;
var curMods = [];

// ===== TOAST =====function toast(msg, ok) {
    var t = document.createElement('div');
    t.className = 'toast text-white text-sm font-bold';
    t.innerHTML = (ok ? '✅ ' : '❌ ') + msg;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(function() { t.remove(); }, 3000);
}

// ===== TOGGLE PASSWORD =====
window.togglePass = function() {
    console.log('👁️ togglePass CALLED!');
    var pass = document.getElementById('passkey');
    var icon = document.getElementById('eyeIcon');
    
    console.log('pass element:', pass);
    console.log('icon element:', icon);
    
    if (pass && icon) {
        if (pass.type === 'password') {
            pass.type = 'text';
            icon.className = 'fas fa-eye-slash';
            console.log('✅ Password VISIBLE');
        } else {
            pass.type = 'password';
            icon.className = 'fas fa-eye';
            console.log('✅ Password HIDDEN');
        }
    } else {
        console.error('❌ Elements not found!');
    }
};

// ===== LOGIN =====
window.doLogin = function() {
    console.log('🔓 doLogin CALLED!');
    var k = document.getElementById('passkey').value.trim();
    var err = document.getElementById('errMsg');
    var u = ROLES[k];
    
    console.log('Key:', k);
    console.log('User:', u);
    
    if (!u) {
        err.textContent = '❌ Access Denied!';
        err.className = 'text-red-400 text-xs';
        toast('Access Denied!', false);
        setTimeout(function() { err.className = 'hidden'; }, 2000);
        return;
    }
        curRole = u.role;
    curMods = u.mods;
    
    sessionStorage.setItem('role', u.role);
    sessionStorage.setItem('mods', JSON.stringify(u.mods));
    
    toast('Welcome, ' + u.role + '!', true);
    
    document.getElementById('login-zone').className = 'hidden';
    document.getElementById('dashboard').className = 'max-w-7xl mx-auto p-4 md:p-8';
    document.getElementById('userRole').textContent = u.role;
    
    renderMods();
};

// ===== RENDER MODULES =====
window.renderMods = function() {
    var g = document.getElementById('moduleGrid');
    g.innerHTML = '';
    
    for (var i = 0; i < MODS.length; i++) {
        var m = MODS[i];
        if (curMods.indexOf(m.id) !== -1) {
            var c = document.createElement('div');
            c.className = 'module-card';
            c.onclick = (function(mid) { return function() { openMod(mid); }; })(m.id);
            c.innerHTML = '<div class="module-icon">' + m.icon + '</div><div class="text-lg font-bold">' + m.name + '</div>';
            g.appendChild(c);
        }
    }
};

// ===== OPEN MODULE =====
window.openMod = function(id) {
    console.log('📂 Opening module:', id);
    document.getElementById('modWindow').className = 'fixed inset-0 bg-slate-900/95 z-50 overflow-y-auto p-4 backdrop-blur-xl';
    document.getElementById('modContent').innerHTML = '<div class="text-center py-20"><p class="text-emerald-400">Loading ' + id + '...</p></div>';
    
    fetch('./modules/' + id + '/index.html')
        .then(function(r) { return r.text(); })
        .then(function(h) {
            document.getElementById('modContent').innerHTML = h;
        })
        .catch(function(e) {
            document.getElementById('modContent').innerHTML = '<p class="text-red-400 text-center">Module not found: ' + id + '</p>';
        });
};

// ===== CLOSE MODULE =====
window.closeMod = function() {    document.getElementById('modWindow').className = 'hidden';
};

// ===== LOGOUT =====
window.doLogout = function() {
    sessionStorage.clear();
    location.reload();
};

// ===== CHECK SESSION =====
window.checkSession = function() {
    var r = sessionStorage.getItem('role');
    var m = sessionStorage.getItem('mods');
    
    if (r && m) {
        curRole = r;
        curMods = JSON.parse(m);
        
        document.getElementById('login-zone').className = 'hidden';
        document.getElementById('dashboard').className = 'max-w-7xl mx-auto p-4 md:p-8';
        document.getElementById('userRole').textContent = r;
        
        renderMods();
        toast('Welcome back!', true);
    }
};

// ===== INIT =====
console.log('🚀 Dream OS v2.0 - Command Center Starting...');
console.log('👁️ togglePass function:', typeof window.togglePass);
console.log('🔓 doLogin function:', typeof window.doLogin);

checkSession();
</script>

</body>
</html>
