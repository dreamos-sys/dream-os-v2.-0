<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#10b981">
    <title>Dream OS v2.0 | Crystal Prism</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --emerald: #10b981;
            --gold: #fbbf24;
            --deep-space: #020617;
            --crystal: rgba(255,255,255,0.1);
            --bg: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: linear-gradient(135deg, #020617 0%, #1e293b 100%);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            padding: 1rem;
            transition: background 1s ease;
        }
        /* Islamic pattern */
        .islamic-pattern {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.05;
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(16,185,129,0.1) 10px, rgba(16,185,129,0.1) 20px),
                repeating-linear-gradient(-45deg, transparent, transparent 10px, rgba(16,185,129,0.1) 10px, rgba(16,185,129,0.1) 20px);
        }
        /* Crystal logo */
        .crystal-logo {
            width: 100px; height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.1) 50%, transparent 70%);
            border: 2px solid rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem auto;
            font-size: 3rem;
            box-shadow: inset 0 0 30px rgba(255,255,255,0.2), 0 10px 40px rgba(16,185,129,0.3);
            animation: float 6s ease-in-out infinite, rotate 20s linear infinite;
            position: relative;
            overflow: hidden;
        }
        .crystal-logo::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(16,185,129,0.2), transparent);
            animation: rotate 10s linear infinite;
        }
        .crystal-logo i { position: relative; z-index: 10; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes rotate { to { transform: rotate(360deg); } }
        /* Glass card */
        .glass-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px) saturate(150%);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s ease;
        }
        .glass-card:hover::before { left: 100%; }
        /* Crystal icon for modules */
        .crystal-icon {
            width: 70px; height: 70px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2) 0%, transparent 70%);
            border: 2px solid rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 0.5rem auto;
            font-size: 2rem;
            box-shadow: inset 0 0 20px rgba(255,255,255,0.1), 0 5px 20px rgba(0,0,0,0.4);
            transition: 0.3s;
            position: relative;
        }
        .crystal-icon::after {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--emerald);
            border-right-color: var(--gold);
            animation: spin 3s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* Input crystal */
        .input-crystal {
            background: rgba(255,255,255,0.07);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 18px;
            padding: 14px;
            width: 100%;
            color: white;
            outline: none;
            text-align: center;
            font-family: monospace;
            letter-spacing: 4px;
            font-size: 1rem;
            transition: 0.3s;
        }
        .input-crystal:focus {
            border-color: var(--emerald);
            box-shadow: 0 0 30px rgba(16,185,129,0.4);
        }
        /* Eye button for password */
        .eye-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            cursor: pointer;
            color: rgba(255,255,255,0.5);
            padding: 8px;
            z-index: 100;
            transition: 0.3s;
        }
        .eye-btn:hover { color: var(--emerald); transform: translateY(-50%) scale(1.1); }
        /* Button crystal */
        .btn-crystal {
            background: linear-gradient(135deg, var(--emerald) 0%, #059669 100%);
            border: none;
            border-radius: 18px;
            padding: 14px;
            width: 100%;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }
        .btn-crystal::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        .btn-crystal:hover::before { width: 300px; height: 300px; }
        .btn-crystal:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(16,185,129,0.4); }
        /* Module grid */
        .module-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            padding: 1rem;
            max-width: 450px;
            margin: 0 auto;
        }
        .module-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .module-card:hover {
            transform: translateY(-12px) scale(1.05);
            border-color: var(--emerald);
            box-shadow: 0 20px 60px rgba(16,185,129,0.3);
        }
        .module-card:hover .crystal-icon {
            transform: scale(1.2) rotate(5deg);
        }
        /* Arabic font */
        .arabic { font-family: 'Amiri', serif; }
        /* Toast */
        .toast {
            position: fixed;
            top: 20px; right: 20px;
            background: rgba(16,185,129,0.95);
            backdrop-filter: blur(10px);
            color: white;
            padding: 1rem 2rem;
            border-radius: 16px;
            z-index: 10000;
            animation: slideIn 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2);
        }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        /* Shalawat loading */
        .shalawat-loading {
            text-align: center;
            padding: 3rem;
        }
        .shalawat-loading .arabic {
            font-size: 2rem;
            color: var(--emerald);
            animation: glow 2s ease-in-out infinite;
        }
        @keyframes glow { 0%,100% { text-shadow: 0 0 10px rgba(16,185,129,0.5); } 50% { text-shadow: 0 0 30px rgba(16,185,129,0.8); } }
        /* ===== SLIDER 7 SLIDE ===== */
        .slider-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            margin-bottom: 2.5rem;
            border-radius: 32px;
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .slider-wrapper {
            display: flex;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .slider-slide {
            min-width: 100%;
            padding: 2.5rem 2rem;
            box-sizing: border-box;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .slider-slide::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(16,185,129,0.1) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
            z-index: -1;
        }
        .slider-dots {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            padding: 1rem;
            background: linear-gradient(to top, rgba(0,0,0,0.3), transparent);
        }
        .slider-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid transparent;
        }
        .slider-dot.active {
            background: var(--emerald);
            transform: scale(1.3);
            box-shadow: 0 0 15px var(--emerald);
        }
        .slider-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: 0.3s;
            color: white;
            font-size: 1.2rem;
        }
        .slider-arrow:hover {
            background: rgba(16,185,129,0.3);
            border-color: var(--emerald);
            transform: translateY(-50%) scale(1.1);
        }
        .slider-arrow.left { left: 20px; }
        .slider-arrow.right { right: 20px; }
        .slide-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--emerald), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(16,185,129,0.3);
        }
        .slide-content {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.6;
        }
        .slide-meta {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .slide-meta-item {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 0.5rem 1.2rem;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
        }
        .slide-weather-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        @media (max-width: 480px) {
            .slider-slide { padding: 1.5rem 1rem; }
            .slide-title { font-size: 1.4rem; }
            .slide-content { font-size: 1rem; }
            .slider-arrow { width: 36px; height: 36px; font-size: 1rem; }
            .slider-arrow.left { left: 10px; }
            .slider-arrow.right { right: 10px; }
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- Islamic pattern background -->
    <div class="islamic-pattern"></div>

    <!-- LOGIN ZONE -->
    <div id="login-zone" class="fixed inset-0 z-50 flex items-center justify-center p-6">
        <div class="glass-card p-8 max-w-sm w-full text-center">
            <div class="crystal-logo"><i class="fas fa-rocket"></i></div>
            <h1 class="text-2xl font-bold mb-1">Dream OS <span style="color: var(--emerald);">v2.0</span></h1>
            <p class="text-xs text-slate-400 mb-6">Crystal Prism Edition</p>
            <p class="arabic text-2xl text-emerald-300 mb-6">بِسْمِ اللَّهِ</p>
            <div class="relative mb-6">
                <input type="password" id="passkey" class="input-crystal" placeholder="Access Code">
                <button type="button" id="toggleBtn" class="eye-btn">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
            </div>
            <button id="btnLogin" class="btn-crystal"><i class="fas fa-lock-open mr-2"></i> Access System</button>
            <p id="error-msg" class="text-red-400 text-xs mt-4 h-4 font-bold"></p>
            <p class="text-[8px] text-slate-500 mt-8">🔐 ISO 27001 | Dream Team © 2026</p>
        </div>
    </div>

    <!-- APP SHELL (setelah login) -->
    <div id="app-shell" class="hidden max-w-7xl mx-auto p-4">
        <!-- HEADER -->
        <div class="glass-card p-4 mb-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="text-3xl">🚀</div>
                <div>
                    <h1 class="text-xl font-bold" style="color: var(--emerald);">Dream OS <span class="text-white">v2.0</span></h1>
                    <p class="text-[8px] text-slate-400">COMMAND CENTER</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <span id="user-role" class="text-sm text-slate-300"></span>
                <button onclick="window.doLogout()" class="bg-red-600 hover:bg-red-500 px-3 py-1 rounded-lg text-xs transition">Logout</button>
            </div>
        </div>

        <!-- BISMILLAH & SHALAWAT -->
        <div class="text-center mb-6">
            <p class="arabic text-xl text-emerald-300 mb-2">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</p>
            <p class="arabic text-base text-emerald-400">اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ</p>
            <p class="text-[8px] text-slate-500 mt-2 tracking-[3px]">THE POWER SOUL OF SHALAWAT</p>
        </div>

        <!-- SLIDER 7 SLIDE -->
        <div class="slider-container">
            <div class="slider-wrapper" id="sliderWrapper"></div>
            <div class="slider-arrow left" onclick="window.prevSlide()"><i class="fas fa-chevron-left"></i></div>
            <div class="slider-arrow right" onclick="window.nextSlide()"><i class="fas fa-chevron-right"></i></div>
            <div class="slider-dots" id="sliderDots"></div>
        </div>

        <!-- GRID MODUL -->
        <div class="module-grid" id="grid-modules"></div>

        <!-- FOOTER -->
        <footer class="text-center py-8 mt-8">
            <p class="text-[8px] text-slate-500">ISO 27001 • ISO 55001 • ISO 9001</p>
            <p class="text-[8px] text-slate-600 mt-2">Dream Team © 2026</p>
        </footer>
    </div>

    <!-- MODULE WINDOW (tempat modul dimuat) -->
    <div id="module-window" class="hidden fixed inset-0 z-50 p-4" style="background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); overflow-y: auto;">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <button onclick="window.doCloseModule()" class="text-emerald-400 hover:text-emerald-300 transition text-lg">
                    <i class="fas fa-arrow-left mr-2"></i> Back to Dashboard
                </button>
                <button onclick="window.doCloseModule()" class="text-white/40 hover:text-white text-xl">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="module-content"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import { store } from './core/store.js';
        import { login, logout, checkSession } from './core/auth.js';
        import { showToast } from './core/components.js';

        // Fungsi memuat modul
        async function loadModule(moduleId) {
            const win = document.getElementById('module-window');
            const content = document.getElementById('module-content');
            if (!win || !content) return;
            win.classList.remove('hidden');
            content.innerHTML = `<div class="shalawat-loading"><div class="arabic">اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ</div><p class="text-slate-400 mt-4">Memuat...</p></div>`;
            try {
                const mod = await import(`./modules/${moduleId}/module.js`);
                if (mod && typeof mod.init === 'function') {
                    await mod.init();
                } else {
                    content.innerHTML = '<p class="text-center py-20 text-red-400">Modul tidak memiliki fungsi init</p>';
                }
            } catch (err) {
                console.error(err);
                content.innerHTML = `<p class="text-center py-20 text-red-400">❌ Gagal memuat modul: ${err.message}</p>`;
            }
        }

        function closeModule() {
            document.getElementById('module-window').classList.add('hidden');
            document.getElementById('module-content').innerHTML = '';
        }

        window.loadModule = loadModule;
        window.doCloseModule = closeModule;
        window.doLogout = logout;

        // Daftar modul yang tersedia (sesuai folder di modules/)
        const MODULES = [
            { id: 'commandcenter', name: 'COMMAND', icon: '📊' },
            { id: 'booking', name: 'BOOKING', icon: '📅' },
            { id: 'k3', name: 'K3', icon: '⚠️' },
            { id: 'sekuriti', name: 'SEKURITI', icon: '🛡️' },
            { id: 'janitor-indoor', name: 'JANITOR IN', icon: '🧹' },
            { id: 'janitor-outdoor', name: 'JANITOR OUT', icon: '🌿' },
            { id: 'stok', name: 'STOK', icon: '📦' },
            { id: 'maintenance', name: 'MAINTENANCE', icon: '🔧' },
            { id: 'asset', name: 'ASSET', icon: '🏢' }
        ];

        function renderGrid(modules) {
            const container = document.getElementById('grid-modules');
            if (!container) return;
            container.innerHTML = '';
            MODULES.forEach(m => {
                if (modules.includes(m.id) || modules.includes('all')) {
                    const card = document.createElement('div');
                    card.className = 'module-card';
                    card.onclick = () => loadModule(m.id);
                    card.innerHTML = `
                        <div class="crystal-icon">${m.icon}</div>
                        <div class="text-xs font-bold uppercase tracking-wider">${m.name}</div>
                    `;
                    container.appendChild(card);
                }
            });
        }

        // ========== SLIDER ==========
        let currentSlide = 0;
        const totalSlides = 7;
        let slideInterval = null;

        window.goToSlide = function(index) {
            if (index < 0) index = totalSlides - 1;
            if (index >= totalSlides) index = 0;
            currentSlide = index;
            const wrapper = document.getElementById('sliderWrapper');
            if (wrapper) wrapper.style.transform = `translateX(-${currentSlide * 100}%)`;
            document.querySelectorAll('.slider-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentSlide);
            });
            resetSlideInterval();
        };

        window.nextSlide = function() { goToSlide(currentSlide + 1); };
        window.prevSlide = function() { goToSlide(currentSlide - 1); };

        function startSlideInterval() {
            if (slideInterval) clearInterval(slideInterval);
            slideInterval = setInterval(() => { nextSlide(); }, 7000);
        }

        function resetSlideInterval() {
            if (slideInterval) {
                clearInterval(slideInterval);
                startSlideInterval();
            }
        }

        // Muat konten slide (bisa diganti dengan data real dari Supabase)
        async function loadSlideData() {
            const slides = [
                { title: 'Assalamualaikum', content: 'Selamat datang di Dream OS v2.0' },
                { title: 'Booking Hari Ini', content: 'Tidak ada booking' },
                { title: 'K3 Hari Ini', content: 'Tidak ada laporan' },
                { title: 'Cuaca & Mitigasi', content: '<div class="slide-weather-icon">🌤️</div><div>26°C, Kelembaban 80%</div><div class="slide-meta"><span class="slide-meta-item">🚦 Lalu lintas: Lancar</span><span class="slide-meta-item">🌋 Mitigasi: Aman</span></div>' },
                { title: 'Pengumuman', content: 'Tidak ada' },
                { title: 'Info Tambahan 1', content: 'Kosong' },
                { title: 'Info Tambahan 2', content: 'Kosong' }
            ];
            const wrapper = document.getElementById('sliderWrapper');
            if (!wrapper) return;
            wrapper.innerHTML = slides.map(s => `
                <div class="slider-slide">
                    <h3 class="slide-title">${s.title}</h3>
                    <div class="slide-content">${s.content}</div>
                </div>
            `).join('');
            const dotsContainer = document.getElementById('sliderDots');
            if (!dotsContainer) return;
            dotsContainer.innerHTML = slides.map((_, i) => `
                <div class="slider-dot ${i === 0 ? 'active' : ''}" onclick="goToSlide(${i})"></div>
            `).join('');
        }

        // ========== TOGGLE PASSWORD ==========
        document.getElementById('toggleBtn').addEventListener('click', function() {
            const pass = document.getElementById('passkey');
            const icon = document.getElementById('eyeIcon');
            if (pass && icon) {
                pass.type = pass.type === 'password' ? 'text' : 'password';
                icon.className = pass.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
            }
        });

        // ========== LOGIN HANDLER ==========
        document.getElementById('btnLogin').addEventListener('click', async () => {
            const key = document.getElementById('passkey').value;
            const success = await login(key);
            if (success) {
                const user = store.get('user');
                document.getElementById('login-zone').classList.add('hidden');
                document.getElementById('app-shell').classList.remove('hidden');
                document.getElementById('user-role').textContent = user.role;
                renderGrid(user.modules);
                await loadSlideData();
                startSlideInterval();
                showToast('Welcome, ' + user.role + '!', 'success');
            } else {
                document.getElementById('error-msg').textContent = '❌ Access Denied!';
                setTimeout(() => document.getElementById('error-msg').textContent = '', 2000);
            }
        });

        // ========== ENTER KEY ==========
        document.getElementById('passkey').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('btnLogin').click();
        });

        // ========== CHECK SESSION ON LOAD ==========
        if (checkSession()) {
            const user = store.get('user');
            document.getElementById('login-zone').classList.add('hidden');
            document.getElementById('app-shell').classList.remove('hidden');
            document.getElementById('user-role').textContent = user.role;
            renderGrid(user.modules);
            loadSlideData().then(() => {
                startSlideInterval();
            });
        }
    </script>
</body>
</html>
