<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <title>Dream OS v2.0 | Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #020617; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .arabic { font-family: 'Amiri', serif; }
        .login-box { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 3rem 2rem; width: 100%; max-width: 400px; text-align: center; }
        .logo { width: 80px; height: 80px; background: linear-gradient(135deg, #10b981, #059669); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 2.5rem; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .version { color: #10b981; }
        .subtitle { color: rgba(255,255,255,0.5); font-size: 0.875rem; margin-bottom: 2rem; }
        .bismillah { font-size: 2rem; color: #10b981; margin-bottom: 2rem; text-shadow: 0 0 20px rgba(16,185,129,0.5); }
        .input-group { position: relative; margin-bottom: 1.5rem; z-index: 999; }
        .input-group input { width: 100%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 18px; padding: 14px 50px 14px 14px; color: white; font-size: 1rem; text-align: center; letter-spacing: 4px; outline: none; }
        .input-group input:focus { border-color: #10b981; box-shadow: 0 0 30px rgba(16,185,129,0.4); }
        .eye-btn { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: transparent; border: none; cursor: pointer; color: rgba(255,255,255,0.5); font-size: 1.25rem; padding: 5px; z-index: 9999; }
        .eye-btn:hover { color: #10b981; }
        .login-btn { width: 100%; background: linear-gradient(135deg, #10b981, #059669); border: none; border-radius: 18px; padding: 14px; color: white; font-weight: 700; font-size: 1rem; cursor: pointer; }
        .error-msg { color: #ef4444; font-size: 0.875rem; margin-top: 1rem; min-height: 1.25rem; }
        .footer { color: rgba(255,255,255,0.3); font-size: 0.75rem; margin-top: 2rem; }
        .keys-info { margin-top: 2rem; padding: 1rem; background: rgba(255,255,255,0.03); border-radius: 12px; font-size: 0.65rem; opacity: 0.5; }
        .keys-info details { cursor: pointer; }
        .keys-info summary { margin-bottom: 0.5rem; font-weight: 600; }
        .keys-info code { background: rgba(16,185,129,0.2); padding: 2px 6px; border-radius: 4px; display: block; margin: 4px 0; }
    </style>
</head>
<body>

<div class="login-box">
    <div class="logo">🚀</div>
    <h1>Dream OS <span class="version">v2.0</span></h1>
    <p class="subtitle">Crystal Prism Edition</p>
    <p class="arabic bismillah">بِسْمِ اللَّهِ</p>
    
    <div class="input-group">
        <input type="password" id="passkey" placeholder="Access Code" autocomplete="off">
        <button type="button" class="eye-btn" onclick="togglePassword()">
            <i class="fas fa-eye" id="eyeIcon"></i>
        </button>
    </div>
    
    <button class="login-btn" onclick="doLogin()">        <i class="fas fa-lock-open" style="margin-right: 8px;"></i>Access System
    </button>
    
    <p class="error-msg" id="errorMsg"></p>
    
    <div class="keys-info">
        <details>
            <summary>🔑 Access Keys</summary>
            <code>DEVELOPER: 012443410</code>
            <code>ARCHITECT: Mr.M_Architect_2025</code>
            <code>ADMIN: 4dm1n_AF6969@00</code>
            <code>USER: user_@1234</code>
        </details>
    </div>
    
    <p class="footer">🔐 ISO 27001 | Dream Team © 2026</p>
</div>

<script>
var KEYS = {
    "012443410": { role: "DEVELOPER", modules: ['all'] },
    "Mr.M_Architect_2025": { role: "ARCHITECT", modules: ['all'] },
    "4dm1n_AF6969@00": { role: "ADMIN", modules: ['all'] },
    "user_@1234": { role: "USER", modules: ['booking'] },
    "user_@2345": { role: "USER", modules: ['k3'] }
};

function togglePassword() {
    var pass = document.getElementById('passkey');
    var icon = document.getElementById('eyeIcon');
    if (pass.type === 'password') {
        pass.type = 'text';
        icon.className = 'fas fa-eye-slash';
    } else {
        pass.type = 'password';
        icon.className = 'fas fa-eye';
    }
}

function doLogin() {
    var key = document.getElementById('passkey').value.trim();
    var user = KEYS[key];
    var errorMsg = document.getElementById('errorMsg');
    
    if (user) {
        sessionStorage.setItem('dream_role', user.role);
        sessionStorage.setItem('dream_modules', JSON.stringify(user.modules));
        errorMsg.style.color = '#10b981';
        errorMsg.textContent = '✅ Login berhasil! Redirecting...';
                // LANGSUNG KE MODULE JIKA USER BIASA
        if (user.modules.length === 1 && user.modules[0] !== 'all') {
            setTimeout(function() {
                window.location.href = 'modules/' + user.modules[0] + '/index.html';
            }, 1000);
        } 
        // KE COMMAND CENTER JIKA ADMIN/DEVELOPER
        else {
            setTimeout(function() {
                window.location.href = 'modules/commandcenter/index.html';
            }, 1000);
        }
    } else {
        errorMsg.style.color = '#ef4444';
        errorMsg.textContent = '❌ Access Denied!';
    }
}

document.getElementById('passkey').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') doLogin();
});

// Check session
var session = sessionStorage.getItem('dream_role');
var modules = sessionStorage.getItem('dream_modules');
if (session && modules) {
    var userModules = JSON.parse(modules);
    if (userModules.length === 1 && userModules[0] !== 'all') {
        window.location.href = 'modules/' + userModules[0] + '/index.html';
    } else {
        window.location.href = 'modules/commandcenter/index.html';
    }
}
</script>

</body>
</html>
