<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream OS v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-white min-h-screen">

<!-- LOGIN -->
<div id="login-zone" class="fixed inset-0 z-40 flex items-center justify-center bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900">
    <div class="bg-white/10 backdrop-blur-xl p-8 rounded-3xl border border-white/20 max-w-sm w-full mx-4">
        <div class="text-center">
            <div class="text-5xl mb-3">🚀</div>
            <h1 class="text-2xl font-black text-emerald-400 mb-1">Dream OS v2.0</h1>
            <p class="text-xs text-slate-400 mb-6">The Power Soul of Shalawat</p>
            <p class="text-lg text-emerald-300 mb-4">بِسْمِ اللَّهِ</p>
            
            <div class="relative mb-4">
                <input type="password" id="passkey" class="w-full p-3 pr-12 rounded-xl bg-slate-800 border border-slate-700 text-white text-center font-mono" placeholder="Access Code">
                <button type="button" id="toggleBtn" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-emerald-400 cursor-pointer" onclick="togglePass()">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
            </div>
            
            <button id="loginBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 p-3 rounded-xl font-bold cursor-pointer" onclick="doLogin()">
                🔓 Login
            </button>
            
            <p id="errMsg" class="text-red-400 text-xs mt-3 hidden"></p>
            <p class="text-[8px] text-slate-500 mt-6">Dream Team © 2026</p>
        </div>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden max-w-7xl mx-auto p-4">
    <div class="bg-slate-800 rounded-2xl p-4 mb-6 flex justify-between items-center">
        <h1 class="text-xl font-bold text-emerald-400">Dream OS v2.0</h1>
        <div class="flex items-center gap-2">
            <span id="userRole" class="text-sm text-slate-300"></span>
            <button class="bg-red-600 px-3 py-1 rounded-lg text-xs cursor-pointer" onclick="doLogout()">Logout</button>
        </div>
    </div>
    <div id="moduleGrid" class="grid grid-cols-3 md:grid-cols-4 gap-4"></div>
</div>

<!-- MODULE WINDOW --><div id="modWindow" class="hidden fixed inset-0 bg-slate-900/95 z-50 overflow-y-auto p-4">
    <div class="max-w-7xl mx-auto">
        <button class="mb-4 text-emerald-400 cursor-pointer" onclick="closeMod()">← Back</button>
        <div id="modContent"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ===== GLOBAL FUNCTIONS (MUST BE IN WINDOW SCOPE) =====

// Toggle Password - GLOBAL
window.togglePass = function() {
    console.log('[TOGGLE] Eye icon clicked!');
    var pass = document.getElementById('passkey');
    var icon = document.getElementById('eyeIcon');
    
    if (!pass || !icon) {
        console.error('[TOGGLE] Elements not found!');
        return;
    }
    
    if (pass.type === 'password') {
        pass.type = 'text';
        icon.className = 'fas fa-eye-slash';
        console.log('[TOGGLE] Password visible');
    } else {
        pass.type = 'password';
        icon.className = 'fas fa-eye';
        console.log('[TOGGLE] Password hidden');
    }
};

// Login - GLOBAL
window.doLogin = function() {
    console.log('[LOGIN] Login button clicked!');
    var key = document.getElementById('passkey').value.trim();
    var err = document.getElementById('errMsg');
    
    console.log('[LOGIN] Key entered:', key);
    
    var roles = {
        "012443410": { role: "DEVELOPER", mods: ['booking','k3','dana','admin'] },
        "Mr.M_Architect_2025": { role: "MASTER", mods: ['booking','k3','dana','admin'] },
        "4dm1n_AF6969@00": { role: "ADMIN", mods: ['booking','k3','dana','admin'] },
        "user_@1234": { role: "USER", mods: ['booking'] },
        "user_@2345": { role: "USER", mods: ['k3'] }
    };
    
    var user = roles[key];    
    if (!user) {
        err.textContent = '❌ Access Denied!';
        err.className = 'text-red-400 text-xs mt-3';
        setTimeout(function() { err.className = 'text-red-400 text-xs mt-3 hidden'; }, 2000);
        return;
    }
    
    sessionStorage.setItem('role', user.role);
    sessionStorage.setItem('mods', JSON.stringify(user.mods));
    
    document.getElementById('login-zone').className = 'hidden';
    document.getElementById('dashboard').className = 'max-w-7xl mx-auto p-4';
    document.getElementById('userRole').textContent = user.role;
    
    renderMods();
    console.log('[LOGIN] Success! Role:', user.role);
};

// Render Modules - GLOBAL
window.renderMods = function() {
    var grid = document.getElementById('moduleGrid');
    grid.innerHTML = '';
    
    var mods = [
        { id: 'booking', name: 'BOOKING', icon: '📅' },
        { id: 'k3', name: 'K3 REPORT', icon: '⚠️' },
        { id: 'dana', name: 'DANA', icon: '💰' },
        { id: 'admin', name: 'ADMIN', icon: '📊' }
    ];
    
    var curMods = JSON.parse(sessionStorage.getItem('mods') || '[]');
    
    for (var i = 0; i < mods.length; i++) {
        var m = mods[i];
        if (curMods.indexOf(m.id) !== -1) {
            var card = document.createElement('div');
            card.className = 'bg-slate-800 hover:bg-slate-700 p-6 rounded-2xl text-center cursor-pointer';
            card.onclick = (function(mid) {
                return function() { openMod(mid); };
            })(m.id);
            card.innerHTML = '<div class="text-4xl mb-3">' + m.icon + '</div><div class="text-xs font-bold">' + m.name + '</div>';
            grid.appendChild(card);
        }
    }
};

// Open Module - GLOBAL
window.openMod = function(id) {
    console.log('[MODULE] Opening:', id);    document.getElementById('modWindow').className = 'fixed inset-0 bg-slate-900/95 z-50 overflow-y-auto p-4';
    document.getElementById('modContent').innerHTML = '<div class="text-center py-20"><p class="text-emerald-400">Loading ' + id + '...</p></div>';
};

// Close Module - GLOBAL
window.closeMod = function() {
    document.getElementById('modWindow').className = 'hidden';
};

// Logout - GLOBAL
window.doLogout = function() {
    sessionStorage.clear();
    location.reload();
};

// Check Session - GLOBAL
window.checkSession = function() {
    var role = sessionStorage.getItem('role');
    var mods = sessionStorage.getItem('mods');
    
    if (role && mods) {
        document.getElementById('login-zone').className = 'hidden';
        document.getElementById('dashboard').className = 'max-w-7xl mx-auto p-4';
        document.getElementById('userRole').textContent = role;
        renderMods();
    }
};

// ===== INIT ON LOAD =====
console.log('[INIT] Dream OS v2.0 Starting...');
console.log('[INIT] Functions loaded:', typeof window.togglePass, typeof window.doLogin);

// Run check session
window.checkSession();
</script>

</body>
</html>
