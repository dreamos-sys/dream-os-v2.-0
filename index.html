<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream OS v2.0 - Working!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #020617 0%, #1e293b 100%); 
            color: white; 
            font-family: system-ui, sans-serif;
            min-height: 100vh;
            padding: 1rem;
        }
        .glass { 
            background: rgba(255,255,255,0.05); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 1.5rem;
        }
        .module-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); 
            gap: 1rem; 
            max-width: 600px; 
            margin: 2rem auto;
        }
        .module-card { 
            background: rgba(16, 185, 129, 0.1); 
            border: 2px solid rgba(16, 185, 129, 0.3);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .module-card:hover { 
            transform: translateY(-5px); 
            background: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
        }
        .module-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .module-name { font-weight: 600; font-size: 0.875rem; }
        .btn { 
            background: linear-gradient(135deg, #10b981, #059669); 
            border: none; 
            padding: 0.75rem 2rem;             border-radius: 8px; 
            color: white; 
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .input { 
            width: 100%; 
            padding: 0.75rem; 
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px; 
            background: rgba(255,255,255,0.05);
            color: white;
            margin-bottom: 1rem;
        }
        .input:focus { outline: none; border-color: #10b981; }
        .hidden { display: none !important; }
        .toast { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            background: rgba(0,0,0,0.9);
            padding: 1rem 2rem;
            border-radius: 8px;
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { 
            from { transform: translateX(400px); } 
            to { transform: translateX(0); } 
        }
        .loading { 
            border: 3px solid rgba(255,255,255,0.1); 
            border-top-color: #10b981; 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="fixed inset-0 flex items-center justify-center p-4" style="background: rgba(0,0,0,0.9);">
        <div class="glass max-w-md w-full text-center">
            <div style="font-size: 4rem; margin-bottom: 1rem;">🚀</div>            <h1 class="text-2xl font-bold mb-2">Dream OS <span style="color: #10b981;">v2.0</span></h1>
            <p class="text-sm text-gray-400 mb-6">Ultimate Edition - Working!</p>
            
            <input type="password" id="passkey" class="input" placeholder="Enter code (012443410 or 123)">
            <button onclick="doLogin()" class="btn w-full">LOGIN</button>
            <p id="errorMsg" class="text-red-400 text-sm mt-2 hidden">❌ Wrong password!</p>
            
            <p class="text-xs text-gray-500 mt-6">🕌 Bi idznillah - Dream Team © 2026</p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="hidden max-w-6xl mx-auto">
        <!-- Header -->
        <div class="glass mb-6 text-center p-6">
            <p style="font-size: 1.5rem; color: #10b981; margin-bottom: 0.5rem;">بِسْمِ اللَّهِ</p>
            <h1 class="text-3xl font-bold mb-2">Dream OS <span style="color: #10b981;">v2.0</span></h1>
            <p class="text-sm text-gray-400">💚 Working System - No Stuck Modules!</p>
        </div>

        <!-- Module Grid -->
        <div class="module-grid" id="moduleGrid">
            <!-- Modules injected by JavaScript -->
        </div>

        <!-- Footer -->
        <footer class="text-center text-xs text-gray-500 mt-8">
            DREAM TEAM © 2026 • AUTO SHALAT • AI CORE • OPTIMIZED
        </footer>
    </div>

    <!-- MODULE WINDOW OVERLAY -->
    <div id="moduleWindow" class="hidden fixed inset-0 p-4 overflow-y-auto" style="background: rgba(0,0,0,0.95); z-index: 1000;">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-4">
                <button onclick="closeModule()" class="text-white hover:text-emerald-400 transition">
                    ← Back to Dashboard
                </button>
                <button onclick="closeModule()" class="text-2xl text-white hover:text-red-400">×</button>
            </div>
            <div id="moduleContent" class="glass min-h-[400px]">
                <!-- Module content loaded here -->
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <script>        // ─────────────────────────────────────────────────────
        // MODULES CONFIGURATION
        // ─────────────────────────────────────────────────────
        const MODULES = [
            { id: 'commandcenter', name: 'COMMAND', icon: '📊' },
            { id: 'booking', name: 'BOOKING', icon: '📅' },
            { id: 'k3', name: 'K3', icon: '⚠️' },
            { id: 'sekuriti', name: 'SEKURITI', icon: '🛡️' },
            { id: 'janitor-indoor', name: 'JANITOR IN', icon: '🧹' },
            { id: 'janitor-outdoor', name: 'JANITOR OUT', icon: '🌿' },
            { id: 'stok', name: 'STOK', icon: '📦' },
            { id: 'maintenance', name: 'MAINTENANCE', icon: '🔧' },
            { id: 'asset', name: 'ASSET', icon: '🏢' }
        ];

        // ─────────────────────────────────────────────────────
        // TOAST NOTIFICATION
        // ─────────────────────────────────────────────────────
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderLeft = type === 'error' ? '4px solid #ef4444' : '4px solid #10b981';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ─────────────────────────────────────────────────────
        // LOGIN SYSTEM
        // ─────────────────────────────────────────────────────
        function doLogin() {
            const key = document.getElementById('passkey').value;
            if (key === '012443410' || key === '123') {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                renderModules();
                showToast('✅ Login successful! Welcome to Dream OS!');
                console.log('🚀 Dream OS v2.0 Loaded - Bi idznillah 💚');
            } else {
                const error = document.getElementById('errorMsg');
                error.classList.remove('hidden');
                setTimeout(() => error.classList.add('hidden'), 2000);
            }
        }

        // Enter key to login
        document.getElementById('passkey')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') doLogin();
        });
        // ─────────────────────────────────────────────────────
        // RENDER MODULES - GUARANTEED TO WORK!
        // ─────────────────────────────────────────────────────
        function renderModules() {
            const grid = document.getElementById('moduleGrid');
            if (!grid) {
                console.error('❌ Grid container not found!');
                return;
            }

            grid.innerHTML = '';
            
            MODULES.forEach(mod => {
                const card = document.createElement('div');
                card.className = 'module-card';
                card.innerHTML = `
                    <div class="module-icon">${mod.icon}</div>
                    <div class="module-name">${mod.name}</div>
                `;
                
                // GUARANTEED CLICK HANDLER
                card.addEventListener('click', () => {
                    console.log('📦 Module clicked:', mod.id);
                    openModule(mod);
                });
                
                grid.appendChild(card);
            });
            
            console.log('✅ Rendered', MODULES.length, 'modules');
        }

        // ─────────────────────────────────────────────────────
        // OPEN MODULE - WORKS WITHOUT EXTERNAL FILES!
        // ─────────────────────────────────────────────────────
        function openModule(mod) {
            console.log('🔓 Opening module:', mod.id);
            
            const win = document.getElementById('moduleWindow');
            const content = document.getElementById('moduleContent');
            
            if (!win || !content) {
                showToast('❌ Error: Module container not found!', 'error');
                return;
            }
            
            // Show window with loading
            win.classList.remove('hidden');
            content.innerHTML = `                <div class="text-center py-20">
                    <div class="loading"></div>
                    <p class="text-gray-400 mt-4">Loading ${mod.name}...</p>
                    <p class="text-xs text-gray-600 mt-2">🕌 اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ</p>
                </div>
            `;
            
            // Simulate loading then show module content
            setTimeout(() => {
                showModuleContent(mod);
            }, 800);
        }

        // ─────────────────────────────────────────────────────
        // SHOW MODULE CONTENT - DYNAMIC CONTENT
        // ─────────────────────────────────────────────────────
        function showModuleContent(mod) {
            const content = document.getElementById('moduleContent');
            
            // Different content for each module
            const moduleContents = {
                commandcenter: `
                    <div class="p-6">
                        <h2 class="text-3xl font-bold mb-2">📊 Command Center</h2>
                        <p class="text-gray-400 mb-6">Central control system for Dream OS</p>
                        
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                            <div class="glass p-4 text-center">
                                <div class="text-3xl mb-2">📅</div>
                                <div class="text-2xl font-bold text-emerald-400">0</div>
                                <div class="text-sm text-gray-400">Pending</div>
                            </div>
                            <div class="glass p-4 text-center">
                                <div class="text-3xl mb-2">✅</div>
                                <div class="text-2xl font-bold text-blue-400">100%</div>
                                <div class="text-sm text-gray-400">System OK</div>
                            </div>
                            <div class="glass p-4 text-center">
                                <div class="text-3xl mb-2">🤖</div>
                                <div class="text-2xl font-bold text-purple-400">AI</div>
                                <div class="text-sm text-gray-400">Ready</div>
                            </div>
                        </div>
                        
                        <div class="glass p-4">
                            <h3 class="font-bold mb-3">Quick Actions</h3>
                            <div class="flex gap-2 flex-wrap">
                                <button class="btn" onclick="showToast('System check complete!')">🔍 System Check</button>
                                <button class="btn" onclick="showToast('Backup created!')">💾 Backup</button>
                                <button class="btn" onclick="showToast('Cache cleared!')">🧹 Clear Cache</button>                            </div>
                        </div>
                    </div>
                `,
                booking: `
                    <div class="p-6">
                        <h2 class="text-3xl font-bold mb-2">📅 Booking System</h2>
                        <p class="text-gray-400 mb-6">Room and facility booking</p>
                        
                        <div class="glass p-4 mb-4">
                            <h3 class="font-bold mb-3">New Booking</h3>
                            <input type="text" class="input" placeholder="Your Name">
                            <input type="text" class="input" placeholder="Room Name">
                            <input type="date" class="input">
                            <button class="btn w-full" onclick="showToast('Booking submitted!')">📝 Submit Booking</button>
                        </div>
                        
                        <div class="glass p-4">
                            <h3 class="font-bold mb-3">Today's Bookings</h3>
                            <p class="text-gray-400 text-sm">No bookings for today</p>
                        </div>
                    </div>
                `,
                k3: `
                    <div class="p-6">
                        <h2 class="text-3xl font-bold mb-2">⚠️ K3 Reports</h2>
                        <p class="text-gray-400 mb-6">Safety & Health Reports</p>
                        
                        <div class="glass p-4 mb-4">
                            <h3 class="font-bold mb-3">New Report</h3>
                            <input type="text" class="input" placeholder="Location">
                            <select class="input">
                                <option>Low Risk</option>
                                <option>Medium Risk</option>
                                <option>High Risk</option>
                            </select>
                            <textarea class="input" rows="3" placeholder="Description"></textarea>
                            <button class="btn w-full" onclick="showToast('Report submitted!')">📤 Submit Report</button>
                        </div>
                    </div>
                `,
                stok: `
                    <div class="p-6">
                        <h2 class="text-3xl font-bold mb-2">📦 Inventory</h2>
                        <p class="text-gray-400 mb-6">Stock management</p>
                        
                        <div class="glass p-4">
                            <table class="w-full">
                                <thead>
                                    <tr class="text-left border-b border-gray-700">                                        <th class="pb-2">Item</th>
                                        <th class="pb-2">Stock</th>
                                        <th class="pb-2">Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr class="border-b border-gray-800">
                                        <td class="py-3">Kertas A4</td>
                                        <td>50 rim</td>
                                        <td class="text-emerald-400">✅ Good</td>
                                    </tr>
                                    <tr class="border-b border-gray-800">
                                        <td class="py-3">Pulpen</td>
                                        <td>100 pcs</td>
                                        <td class="text-emerald-400">✅ Good</td>
                                    </tr>
                                    <tr>
                                        <td class="py-3">Tinta Printer</td>
                                        <td>3 botol</td>
                                        <td class="text-orange-400">⚠️ Low</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                `
            };
            
            // Use predefined content or default
            const html = moduleContents[mod.id] || `
                <div class="p-6 text-center">
                    <div style="font-size: 4rem; margin-bottom: 1rem;">${mod.icon}</div>
                    <h2 class="text-3xl font-bold mb-2">${mod.name}</h2>
                    <p class="text-gray-400 mb-6">Module loaded successfully! 🎉</p>
                    
                    <div class="glass p-6 mb-6">
                        <p>This is the ${mod.name} module.</p>
                        <p class="text-sm text-gray-400 mt-2">ID: ${mod.id}</p>
                    </div>
                    
                    <button class="btn" onclick="showToast('Feature coming soon!')">🚀 Coming Soon</button>
                </div>
            `;
            
            content.innerHTML = html;
            console.log('✅ Module loaded:', mod.id);
        }

        // ─────────────────────────────────────────────────────
        // CLOSE MODULE        // ─────────────────────────────────────────────────────
        function closeModule() {
            const win = document.getElementById('moduleWindow');
            const content = document.getElementById('moduleContent');
            
            win.classList.add('hidden');
            content.innerHTML = '';
            
            console.log('🚪 Module closed');
        }

        // ─────────────────────────────────────────────────────
        // AUTO-SHOW LOGIN ON LOAD
        // ─────────────────────────────────────────────────────
        window.addEventListener('DOMContentLoaded', () => {
            console.log('🌟 Dream OS v2.0 - Ready to rock! 🚀');
            console.log('💡 Use code: 012443410 or 123');
        });
    </script>
</body>
</html>
