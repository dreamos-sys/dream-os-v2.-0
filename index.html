<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <title>Dream OS v2.0</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top-color: #a855f7; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen">

<div id="toast-container"></div>

<div id="login-zone" class="fixed inset-0 z-50 flex items-center justify-center bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900">
    <div class="bg-white/10 backdrop-blur-xl p-8 rounded-3xl border border-white/20 max-w-sm w-full">
        <div class="text-center">
            <div class="text-4xl mb-2">🚀</div>
            <h1 class="text-2xl font-black text-emerald-400">Dream OS v2.0</h1>
            <p class="text-xs text-slate-400 mb-6">Masukkan master key</p>
            <input type="password" id="passkey" placeholder="Key" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 text-white mb-4">
            <button id="btnLogin" class="w-full bg-emerald-600 hover:bg-emerald-500 p-3 rounded-xl font-bold">Login</button>
            <p id="error-msg" class="text-red-400 text-xs mt-2 hidden">Akses ditolak</p>
        </div>
    </div>
</div>

<div id="app-shell" class="hidden max-w-7xl mx-auto p-4">
    <div class="bg-slate-800/50 rounded-2xl p-4 mb-6 flex justify-between items-center">
        <h1 class="text-xl font-bold text-emerald-400">Dream OS <span class="text-white">v2.0</span></h1>
        <div class="flex items-center gap-2">
            <span id="user-role" class="text-sm text-slate-300"></span>
            <button onclick="window.logout()" class="bg-red-600 px-3 py-1 rounded-lg text-xs">Logout</button>
        </div>
    </div>
    <div id="grid-modules" class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
</div>

<div id="module-window" class="hidden fixed inset-0 bg-slate-900/95 overflow-y-auto p-4 z-50">
    <div class="max-w-7xl mx-auto">
        <button onclick="window.closeModule()" class="mb-4 text-emerald-400">
            <i class="fas fa-arrow-left mr-2"></i> Kembali
        </button>
        <div id="module-content"></div>
    </div>
</div>

<script type="module" src="core/supabase.js"></script>
<script type="module" src="core/store.js"></script>
<script type="module" src="core/auth.js"></script>
<script type="module" src="core/router.js"></script>
<script type="module">
    import { checkSession, login, logout } from './core/auth.js';
    import { loadModule, closeModule } from './core/router.js';
    import { showToast } from './core/components.js';

    window.logout = logout;
    window.closeModule = closeModule;
    window.loadModule = loadModule;

    const MODULES = [
        { id: 'booking', name: 'Booking', icon: '📅' },
        { id: 'k3', name: 'K3 Report', icon: '⚠️' },
        { id: 'commandcenter', name: 'Admin Panel', icon: '📊' }
    ];

    function renderGrid(modules) {
        const container = document.getElementById('grid-modules');
        container.innerHTML = '';
        MODULES.forEach(m => {
            if (modules.includes(m.id) || modules.includes('all')) {
                container.innerHTML += `
                    <div onclick="loadModule('${m.id}')" class="bg-slate-800 p-4 rounded-xl text-center hover:scale-105 transition cursor-pointer border border-slate-700">
                        <div class="text-3xl mb-2">${m.icon}</div>
                        <div class="text-xs font-bold uppercase">${m.name}</div>
                    </div>
                `;
            }
        });
    }

    if (checkSession()) {
        const user = JSON.parse(sessionStorage.getItem('dream_user_data'));
        document.getElementById('login-zone').classList.add('hidden');
        document.getElementById('app-shell').classList.remove('hidden');
        document.getElementById('user-role').textContent = user.role;
        renderGrid(user.modules);
    }

    document.getElementById('btnLogin').addEventListener('click', async () => {
        const key = document.getElementById('passkey').value;
        const success = await login(key);
        if (success) {
            const user = JSON.parse(sessionStorage.getItem('dream_user_data'));
            document.getElementById('login-zone').classList.add('hidden');
            document.getElementById('app-shell').classList.remove('hidden');
            document.getElementById('user-role').textContent = user.role;
            renderGrid(user.modules);
        } else {
            document.getElementById('error-msg').classList.remove('hidden');
            setTimeout(() => document.getElementById('error-msg').classList.add('hidden'), 2000);
        }
    });
</script>
</body>
</html>
