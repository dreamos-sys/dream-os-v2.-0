<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream OS v2.0 | Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #020617; color: white; font-family: sans-serif; min-height: 100vh; }
        
        /* LOGIN PAGE */
        .login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
        .login-box { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 2rem; max-width: 400px; width: 100%; }
        .logo { text-align: center; font-size: 4rem; margin-bottom: 1rem; }
        .title { text-align: center; color: #10b981; font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
        .subtitle { text-align: center; opacity: 0.6; margin-bottom: 2rem; }
        .input-group { position: relative; margin-bottom: 1rem; }
        .input-group input { width: 100%; padding: 14px 50px 14px 14px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 12px; color: white; font-size: 1rem; outline: none; }
        .input-group input:focus { border-color: #10b981; }
        .eye-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: rgba(16,185,129,0.3); border: none; border-radius: 50%; width: 40px; height: 40px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .eye-btn:hover { background: rgba(16,185,129,0.5); }
        .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #10b981 0%, #059669 100%); border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 1rem; cursor: pointer; }
        .login-btn:hover { transform: translateY(-2px); }
        .msg { text-align: center; margin-top: 1rem; min-height: 1.5rem; }
        .msg.error { color: #ef4444; }
        .msg.success { color: #10b981; }
        
        /* DASHBOARD */
        .dashboard { display: none; padding: 2rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .module-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; max-width: 500px; margin: 0 auto; }
        .module-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 2rem 1rem; text-align: center; cursor: pointer; transition: 0.3s; }
        .module-card:hover { transform: translateY(-5px); border-color: #10b981; }
        .module-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .module-name { font-size: 0.875rem; font-weight: 600; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-page">
    <div class="login-box">
        <div class="logo">🚀</div>
        <h1 class="title">Dream OS v2.0</h1>
        <p class="subtitle">Crystal Prism Edition</p>
                <div class="input-group">
            <input type="password" id="passkey" placeholder="Access Code">
            <button type="button" class="eye-btn" id="eyeBtn">
                <i class="fas fa-eye" id="eyeIcon"></i>
            </button>
        </div>
        
        <button class="login-btn" onclick="login()">🔓 Access System</button>
        <p id="msg" class="msg"></p>
        <p style="text-align: center; margin-top: 2rem; opacity: 0.3; font-size: 0.75rem;">🔐 ISO 27001 | Dream Team © 2026</p>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">
    <div class="header">
        <div>
            <h1 style="color: #10b981;">Dream OS v2.0</h1>
            <p style="opacity: 0.6; font-size: 0.875rem;">Welcome, <span id="userRole">User</span></p>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    
    <div class="module-grid" id="moduleGrid"></div>
    
    <footer style="text-align: center; margin-top: 3rem; opacity: 0.3; font-size: 0.75rem;">
        <p>ISO 27001 • ISO 55001 • ISO 9001</p>
        <p>Dream Team © 2026</p>
    </footer>
</div>

<script>
// 12 ACCESS CODES
const ACCESS_CODES = {
    "012443410": { role: "DEVELOPER", modules: ['all'] },
    "Mr.M_Architect_2025": { role: "MASTER", modules: ['all'] },
    "4dm1n_AF6969@00": { role: "ADMIN", modules: ['all'] },
    "LHPSsec_AF2025": { role: "SEKURITI", modules: ['sekuriti'] },
    "CHCS_AF_@003": { role: "JANITOR", modules: ['janitor-indoor','janitor-outdoor'] },
    "SACS_AF@004": { role: "STOK", modules: ['stok'] },
    "M41n_4F@234": { role: "MAINTENANCE", modules: ['maintenance'] },
    "4dm1n_6969@01": { role: "ASSET", modules: ['asset'] },
    "4dm1n_9696@02": { role: "GUDANG", modules: ['stok'] },
    "4553Tumum_AF@1112": { role: "ASSET", modules: ['asset'] },
    "user_@1234": { role: "USER", modules: ['booking'] },
    "user_@2345": { role: "USER", modules: ['k3'] }
};

// 9 MODULES
const MODULES = [    { id: 'booking', name: 'BOOKING', icon: '📅' },
    { id: 'k3', name: 'K3 REPORT', icon: '⚠️' },
    { id: 'sekuriti', name: 'SEKURITI', icon: '🛡️' },
    { id: 'janitor-indoor', name: 'JANITOR IN', icon: '🧹' },
    { id: 'janitor-outdoor', name: 'JANITOR OUT', icon: '🌿' },
    { id: 'stok', name: 'STOK', icon: '📦' },
    { id: 'maintenance', name: 'MAINTENANCE', icon: '🔧' },
    { id: 'asset', name: 'ASSET', icon: '🏢' },
    { id: 'commandcenter', name: 'COMMAND', icon: '📊' }
];

// SHOW/HIDE PASSWORD
const eyeBtn = document.getElementById('eyeBtn');
const passkey = document.getElementById('passkey');
const eyeIcon = document.getElementById('eyeIcon');

eyeBtn.addEventListener('click', function(e) {
    e.preventDefault();
    if (passkey.type === 'password') {
        passkey.type = 'text';
        eyeIcon.className = 'fas fa-eye-slash';
    } else {
        passkey.type = 'password';
        eyeIcon.className = 'fas fa-eye';
    }
});

// LOGIN FUNCTION
function login() {
    const code = passkey.value.trim();
    const msg = document.getElementById('msg');
    
    if (!code) {
        msg.textContent = '❌ Masukkan Access Code!';
        msg.className = 'msg error';
        return;
    }
    
    const userData = ACCESS_CODES[code];
    
    if (!userData) {
        msg.textContent = '❌ Access Denied!';
        msg.className = 'msg error';
        return;
    }
    
    // SUCCESS!
    sessionStorage.setItem('role', userData.role);
    sessionStorage.setItem('modules', JSON.stringify(userData.modules));
        showDashboard(userData);
}

// SHOW DASHBOARD
function showDashboard(user) {
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('userRole').textContent = user.role;
    
    renderModules(user.modules);
}

// RENDER MODULES
function renderModules(modules) {
    const grid = document.getElementById('moduleGrid');
    grid.innerHTML = '';
    
    MODULES.forEach(m => {
        if (modules.includes(m.id) || modules.includes('all')) {
            const card = document.createElement('div');
            card.className = 'module-card';
            card.innerHTML = `
                <div class="module-icon">${m.icon}</div>
                <div class="module-name">${m.name}</div>
            `;
            card.onclick = () => openModule(m.id);
            grid.appendChild(card);
        }
    });
}

// OPEN MODULE
function openModule(moduleId) {
    alert('Loading module: ' + moduleId + '\n\nUpload modules/' + moduleId + '/index.html to enable!');
}

// LOGOUT
function logout() {
    sessionStorage.clear();
    location.reload();
}

// ENTER KEY
passkey.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') login();
});

// CHECK SESSION
window.addEventListener('load', () => {
    const role = sessionStorage.getItem('role');    const modules = JSON.parse(sessionStorage.getItem('modules') || '[]');
    
    if (role) {
        showDashboard({ role, modules });
    }
});
</script>

</body>
</html>
