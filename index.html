<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Dream OS v2.0 - Command Center</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #10b981;
            --accent-hover: #059669;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --glass: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(148, 163, 184, 0.2);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
        }
        /* Spiritual Aura Background */
        .aura-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: auraPulse 8s ease-in-out infinite;
        }
        @keyframes auraPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }

        /* Header */
        .header {
            position: sticky; top: 0; z-index: 50;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header-brand { display: flex; align-items: center; gap: 0.75rem; }
        .header-brand i { font-size: 1.5rem; color: var(--accent); }
        .header-brand h1 { font-size: 1.1rem; font-weight: 700; }
        .header-actions { display: flex; gap: 0.5rem; }
        .header-btn {
            width: 40px; height: 40px; border-radius: 10px;
            background: var(--bg-secondary); border: none; color: var(--text-primary);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .header-btn:hover { background: var(--bg-tertiary); transform: scale(1.05); }
        .header-btn.active { background: var(--accent); color: #0f172a; }

        /* Main Content */
        .main { position: relative; z-index: 1; padding: 1rem; padding-bottom: 80px; }

        /* Slider System */
        .slider-container {
            position: relative;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);        }
        .slider-track {
            display: flex;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
        }
        .slide {
            min-width: 100%;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .slide-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
        .slide-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
        .slide-content { font-size: 0.95rem; color: var(--text-secondary); width: 100%; }
        .slide-content b { color: var(--text-primary); }
        .slide-alert { 
            position: absolute; top: 0.75rem; right: 0.75rem;
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--warning); animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .slider-controls {
            display: flex; justify-content: center; gap: 0.5rem;
            padding: 0.75rem; background: rgba(0,0,0,0.2);
        }
        .slider-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--text-secondary); opacity: 0.4;
            cursor: pointer; transition: all 0.2s;
        }
        .slider-dot.active { background: var(--accent); opacity: 1; transform: scale(1.2); }
        .slider-dot.controlled { border: 2px solid var(--info); background: transparent; }

        /* Quick Actions */
        .quick-actions {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; margin-bottom: 1.5rem;
        }
        .qa-btn {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: var(--radius); padding: 1rem 0.5rem;
            display: flex; flex-direction: column; align-items: center; gap: 0.5rem;            cursor: pointer; transition: all 0.2s;
        }
        .qa-btn:hover { background: var(--bg-secondary); transform: translateY(-2px); }
        .qa-btn i { font-size: 1.25rem; color: var(--accent); }
        .qa-btn span { font-size: 0.75rem; font-weight: 500; }

        /* Cards */
        .card {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: var(--radius); padding: 1rem; margin-bottom: 1rem;
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
        .card-title { font-size: 0.95rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
        .card-body { font-size: 0.9rem; color: var(--text-secondary); }
        .card-body b { color: var(--text-primary); }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
            background: var(--glass); backdrop-filter: blur(12px);
            border-top: 1px solid var(--glass-border);
            display: flex; justify-content: space-around; padding: 0.5rem 0;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 0.25rem;
            padding: 0.5rem 1rem; border-radius: 10px; cursor: pointer;
            color: var(--text-secondary); transition: all 0.2s;
        }
        .nav-item.active { color: var(--accent); background: rgba(16, 185, 129, 0.1); }
        .nav-item i { font-size: 1.1rem; }
        .nav-item span { font-size: 0.7rem; font-weight: 500; }

        /* Toast */
        .toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: var(--bg-secondary); border: 1px solid var(--glass-border);
            border-radius: 10px; padding: 0.75rem 1.5rem;
            display: flex; align-items: center; gap: 0.5rem;
            box-shadow: var(--shadow); z-index: 200;
            transition: transform 0.3s ease; font-size: 0.9rem;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { border-left: 4px solid var(--accent); }
        .toast.error { border-left: 4px solid var(--danger); }
        .toast.info { border-left: 4px solid var(--info); }

        /* Modal */
        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 300;
            background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center;            padding: 1rem; opacity: 0; pointer-events: none; transition: opacity 0.2s;
        }
        .modal.show { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: var(--bg-secondary); border: 1px solid var(--glass-border);
            border-radius: var(--radius); padding: 1.5rem; width: 100%; max-width: 400px;
            animation: modalIn 0.2s ease-out;
        }
        @keyframes modalIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; }
        .modal-body { margin-bottom: 1.5rem; }
        .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
        .btn {
            padding: 0.5rem 1rem; border-radius: 8px; border: none;
            font-weight: 500; cursor: pointer; transition: all 0.2s; font-size: 0.9rem;
        }
        .btn-primary { background: var(--accent); color: #0f172a; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); }
        .btn-secondary:hover { background: var(--text-secondary); color: #0f172a; }
        .btn-ghost { background: transparent; border: 1px solid var(--glass-border); }

        /* Utilities */
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .text-accent { color: var(--accent); }
        .text-warning { color: var(--warning); }
        .text-danger { color: var(--danger); }
        .mt-1 { margin-top: 0.5rem; } .mt-2 { margin-top: 1rem; }
        .mb-1 { margin-bottom: 0.5rem; } .mb-2 { margin-bottom: 1rem; }
        .flex { display: flex; } .flex-col { flex-direction: column; }
        .items-center { align-items: center; } .justify-between { justify-content: space-between; }
        .gap-1 { gap: 0.5rem; } .gap-2 { gap: 1rem; }

        /* Loading */
        .loader {
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
            padding: 2rem; color: var(--text-secondary);
        }
        .spinner {
            width: 20px; height: 20px; border: 2px solid var(--glass-border);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsive */
        @media (min-width: 768px) {
            .main { max-width: 600px; margin: 0 auto; }
            .quick-actions { grid-template-columns: repeat(2, 1fr); }        }
    </style>
</head>
<body>
    <div class="aura-bg"></div>
    
    <!-- Header -->
    <header class="header">
        <div class="header-brand">
            <i class="fas fa-rocket"></i>
            <h1>Dream OS <span style="color:var(--accent);font-size:0.9rem">v2.0</span></h1>
        </div>
        <div class="header-actions">
            <button class="header-btn" id="lang-toggle" title="Ganti Bahasa"><i class="fas fa-language"></i></button>
            <button class="header-btn" id="theme-toggle" title="Ganti Tema"><i class="fas fa-moon"></i></button>
            <button class="header-btn active" id="cc-toggle" title="Command Center"><i class="fas fa-terminal"></i></button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <!-- Slider System -->
        <div class="slider-container" id="slider">
            <div class="slider-track" id="slider-track"></div>
            <div class="slider-controls" id="slider-dots"></div>
        </div>

        <!-- Quick Actions -->
<div class="quick-actions" style="grid-template-columns:repeat(3,1fr);gap:.75rem">
    <div class="qa-btn" onclick="openModule('booking')"><i class="fas fa-calendar-check"></i><span>Booking</span></div>
    <div class="qa-btn" onclick="openModule('k3')"><i class="fas fa-hard-hat"></i><span>K3</span></div>
    <div class="qa-btn" onclick="openModule('inventory')"><i class="fas fa-boxes"></i><span>Inventory</span></div>
    <div class="qa-btn" onclick="openModule('reports')"><i class="fas fa-chart-pie"></i><span>Laporan</span></div>
    <div class="qa-btn" onclick="openModule('tasks')"><i class="fas fa-tasks"></i><span>Tasks</span></div>
    <div class="qa-btn" onclick="openModule('calendar')"><i class="fas fa-calendar-alt"></i><span>Kalender</span></div>
    <div class="qa-btn" onclick="openModule('documents')"><i class="fas fa-file-alt"></i><span>Dokumen</span></div>
    <div class="qa-btn" onclick="openModule('notifications')"><i class="fas fa-bell"></i><span>Notifikasi</span></div>
    <div class="qa-btn" onclick="openModule('settings')"><i class="fas fa-cog"></i><span>Settings</span></div>
</div>

        <!-- Dynamic Content Area -->
        <div id="dynamic-content"></div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-item active" data-page="home"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item" data-page="booking"><i class="fas fa-calendar-alt"></i><span>Booking</span></div>
        <div class="nav-item" data-page="k3"><i class="fas fa-shield-alt"></i><span>K3</span></div>
        <div class="nav-item" data-page="profile"><i class="fas fa-user"></i><span>Profile</span></div>
    </nav>

    <!-- Toast Container -->
    <div id="toast-container"></div>
    <!-- Modal Container -->
    <div id="modal-container" class="modal"></div>

    <!-- Command Center (Loaded Dynamically) -->
    <script>
        // ========== GLOBAL CONFIG ==========
        const CONFIG = {
            supabaseUrl: 'https://your-project.supabase.co',
            supabaseKey: 'your-anon-key',
            apiKey: 'f7890d7569950ffa34a5827880e8442f',
            location: 'Depok',
            timezone: 'Asia/Jakarta'
        };

        // ========== TRANSLATIONS ==========
        const translations = {
            id: {
                greeting_morning: 'Selamat Pagi',
                greeting_afternoon: 'Selamat Siang',
                greeting_evening: 'Selamat Sore',
                greeting_night: 'Selamat Malam',
                booking: 'Booking Hari Ini',
                k3: 'K3 Progress',
                weather: 'Cuaca & Mitigasi',
                loading: 'Memuat...',
                error: 'Terjadi kesalahan',
                success: 'Berhasil!',
                cancel: 'Batal',
                save: 'Simpan'
            },
            en: {
                greeting_morning: 'Good Morning',
                greeting_afternoon: 'Good Afternoon',
                greeting_evening: 'Good Evening',
                greeting_night: 'Good Night',
                booking: "Today's Booking",
                k3: 'K3 Progress',
                weather: 'Weather & Mitigation',
                loading: 'Loading...',
                error: 'An error occurred',
                success: 'Success!',
                cancel: 'Cancel',
                save: 'Save'
            }
        };

        let currentLang = 'id';
        let _sb = null;
        let _currentUser = null;
        // ========== SLIDER SYSTEM (FINAL REVISI) ==========
        const SLIDES_CONFIG = { total: 7, adminControlled: [5, 6, 7] };

        function getSlideData() {
            return [
                { title: getGreeting(), content: 'Selamat datang di Dream OS v2.0', icon: '🚀', controlled: false },
                { title: translations[currentLang]?.booking || 'Booking Hari Ini', content: getBookingData(), icon: '📅', controlled: false },
                { title: translations[currentLang]?.k3 || 'K3 Progress', content: getK3Data(), icon: '⚠️', controlled: false },
                { title: translations[currentLang]?.weather || 'Cuaca & Mitigasi', content: getWeatherData(), icon: '🌤️', controlled: false, alert: true },
                { title: '📢 Pengumuman Admin', content: getAdminSlide(1), icon: '📌', controlled: true, slideId: 5 },
                { title: 'ℹ️ Info Tambahan', content: getAdminSlide(2), icon: '💡', controlled: true, slideId: 6 },
                { title: '📊 Statistik Hari Ini', content: getAdminSlide(3), icon: '📈', controlled: true, slideId: 7 }
            ];
        }

        function getAdminSlide(num) {
            return localStorage.getItem(`cc_slide_${num}`) || 
                   (num === 1 ? 'Rapat koordinasi jam 10.00 - Aula SMP' :
                    num === 2 ? 'Pengumuman: Libur tanggal 17 Agustus 2026' :
                    'Kehadiran hari ini: 85%');
        }

        // Weather untuk Slide 4 (BUKAN di CC!)
        async function getWeatherData() {
            try {
                const API_KEY = CONFIG.apiKey;
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CONFIG.location}&appid=${API_KEY}&units=metric&lang=id`);
                const data = await response.json();
                const temp = Math.round(data.main.temp);
                const desc = data.weather[0].description;
                const humidity = data.main.humidity;
                const wind = data.wind.speed;
                
                let mitigation = '';
                if (desc.includes('hujan') || desc.includes('thunderstorm')) {
                    mitigation = '⚠️ Mitigasi: Siapkan payung/jas hujan, waspada banjir!';
                } else if (wind > 15) {
                    mitigation = '⚠️ Mitigasi: Angin kencang, amankan benda ringan!';
                } else if (temp > 33) {
                    mitigation = '☀️ Mitigasi: Cuaca panas, cukupi cairan tubuh!';
                } else {
                    mitigation = '✅ Kondisi aman, aktivitas normal';
                }
                
                const hour = new Date().getHours();
                const traffic = '🚗 Lalu lintas: ' + (hour >= 7 && hour <= 9 ? 'Padat (jam sibuk)' : 'Lancar');
                
                return `<div style="font-size:2.5rem;font-weight:700;color:#10b981">${temp}°C</div>
                    <div style="font-size:1rem;opacity:.9;margin:.5rem 0">${desc}</div>
                    <div style="font-size:.85rem;opacity:.7">💧 ${humidity}% | 💨 ${wind} m/s</div>                    <div style="margin-top:.75rem;padding:.5rem;background:rgba(255,255,255,.1);border-radius:8px;font-size:.85rem">${traffic}</div>
                    <div style="margin-top:.5rem;padding:.5rem;background:${mitigation.includes('⚠️')?'rgba(245,158,11,.2)':'rgba(16,185,129,.2)'};border-radius:8px;font-size:.85rem">${mitigation}</div>`;
            } catch (err) {
                console.warn('Weather API error:', err);
                return '🌤️ 26°C, Cerah | Lalu lintas lancar';
            }
        }

        function getGreeting() {
            const h = new Date().getHours();
            const t = translations[currentLang];
            if (h < 11) return t.greeting_morning + ', My Bro! ☀️';
            if (h < 15) return t.greeting_afternoon + '! 🌤️';
            if (h < 18) return t.greeting_evening + '! 🌅';
            return t.greeting_night + '! 🌙';
        }

        function getBookingData() {
            // Mock data - replace with real Supabase fetch
            return `<b>3 Booking Aktif</b><br>
                • 09:00 - Ruang Rapat A<br>
                • 13:00 - Aula SMP<br>
                • 15:30 - Lab Komputer`;
        }

        function getK3Data() {
            return `<b>✅ Semua Aman</b><br>
                • APD: 100% terpenuhi<br>
                • Inspeksi: Terakhir 2 jam lalu<br>
                • Incident: 0 hari ini`;
        }

        // Slider Render & Controls
        let currentSlide = 0;
        let sliderInterval = null;

        function renderSlider() {
            const track = document.getElementById('slider-track');
            const dots = document.getElementById('slider-dots');
            const slides = getSlideData();
            
            track.innerHTML = slides.map(slide => `
                <div class="slide">
                    ${slide.alert ? '<div class="slide-alert"></div>' : ''}
                    <div class="slide-icon">${slide.icon}</div>
                    <div class="slide-title">${slide.title}</div>
                    <div class="slide-content">${slide.content}</div>
                    ${slide.controlled ? `<button class="btn btn-ghost btn-sm mt-1" onclick="editAdminSlide(${slide.slideId - 4})"><i class="fas fa-edit"></i> Edit</button>` : ''}
                </div>
            `).join('');            
            dots.innerHTML = slides.map((_, i) => 
                `<div class="slider-dot ${i === currentSlide ? 'active' : ''} ${slides[i].controlled ? 'controlled' : ''}" 
                    onclick="goToSlide(${i})"></div>`
            ).join('');
            
            updateSliderPosition();
        }

        function updateSliderPosition() {
            const track = document.getElementById('slider-track');
            track.style.transform = `translateX(-${currentSlide * 100}%)`;
            document.querySelectorAll('.slider-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentSlide);
            });
        }

        function goToSlide(index) {
            currentSlide = index;
            updateSliderPosition();
            resetSliderTimer();
        }

        function nextSlide() {
            currentSlide = (currentSlide + 1) % SLIDES_CONFIG.total;
            updateSliderPosition();
        }

        function startSliderTimer() {
            sliderInterval = setInterval(nextSlide, 8000);
        }

        function resetSliderTimer() {
            clearInterval(sliderInterval);
            startSliderTimer();
        }

        // Admin Slide Editor
        window.editAdminSlide = (num) => {
            const current = getAdminSlide(num);
            const newVal = prompt(`✏️ Edit Slide ${num + 4} (Admin Controlled):`, current);
            if (newVal !== null && newVal.trim()) {
                localStorage.setItem(`cc_slide_${num}`, newVal.trim());
                renderSlider();
                showToast('✅ Slide ' + (num + 4) + ' updated!', 'success');
                // Sync to Supabase if available
                if (_sb && _currentUser) {
                    _sb.from('admin_slides').upsert({
                        slide_number: num,
                        content: newVal.trim(),                        updated_at: new Date().toISOString(),
                        updated_by: _currentUser.name || 'Admin'
                    }).then(() => console.log('Slide synced to Supabase'));
                }
            }
        };

        // ========== UI HELPERS ==========
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function showModal(content) {
            const modal = document.getElementById('modal-container');
            modal.innerHTML = content;
            modal.classList.add('show');
            modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('show'); };
        }

        function loader(text = 'Memuat...') {
            return `<div class="loader"><div class="spinner"></div> ${text}</div>`;
        }

        // ========== MODULE LOADER ==========
        async function openModule(moduleName) {
            const content = document.getElementById('dynamic-content');
            content.innerHTML = loader(`Memuat ${moduleName}...`);
            
            try {
                // Load module dynamically
                const response = await fetch(`modules/${moduleName}/module.js`);
                const moduleCode = await response.text();
                
                // Execute in isolated scope
                const moduleFn = new Function('config', 'utils', `_sb`, `_currentUser`, `showToast`, `showModal`, `loader`, `translations`, `currentLang`, moduleCode + '\nreturn initModule;');
                const initModule = moduleFn(CONFIG, { showToast, showModal, loader, getAdminSlide }, _sb, _currentUser, showToast, showModal, loader, translations, currentLang);
                
                if (initModule) {
                    const html = await initModule();
                    content.innerHTML = html;
                }            } catch (err) {
                console.error('Module load error:', err);
                content.innerHTML = `<div class="card text-center"><p class="text-danger">❌ Gagal memuat modul: ${moduleName}</p><button class="btn btn-primary mt-2" onclick="openModule('${moduleName}')">Coba Lagi</button></div>`;
                showToast('Gagal memuat modul', 'error');
            }
        }

        // ========== INIT ==========
        async function init() {
            // Init Supabase
            try {
                _sb = supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey);
                const { data: { user } } = await _sb.auth.getUser();
                _currentUser = user;
                console.log('✅ Supabase connected');
            } catch (e) {
                console.warn('⚠️ Supabase not configured, using localStorage only');
            }

            // Render initial UI
            renderSlider();
            startSliderTimer();

            // Event Listeners
            document.getElementById('lang-toggle').onclick = () => {
                currentLang = currentLang === 'id' ? 'en' : 'id';
                renderSlider();
                showToast(`🌐 Bahasa: ${currentLang.toUpperCase()}`, 'info');
            };

            document.getElementById('cc-toggle').onclick = () => {
                openModule('commandcenter');
                showToast('🎛️ Command Center opened', 'info');
            };

            // Bottom Nav
            document.querySelectorAll('.nav-item').forEach(item => {
                item.onclick = (e) => {
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    const page = item.dataset.page;
                    if (page !== 'home') openModule(page);
                };
            });

            // Swipe support for slider
            let touchStartX = 0;
            const sliderEl = document.getElementById('slider');
            sliderEl.addEventListener('touchstart', e => touchStartX = e.touches[0].clientX, { passive: true });
            sliderEl.addEventListener('touchend', e => {                const diff = touchStartX - e.changedTouches[0].clientX;
                if (Math.abs(diff) > 50) {
                    diff > 0 ? nextSlide() : goToSlide(Math.max(0, currentSlide - 1));
                    resetSliderTimer();
                }
            }, { passive: true });

            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight') nextSlide();
                if (e.key === 'ArrowLeft') goToSlide(Math.max(0, currentSlide - 1));
                if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') resetSliderTimer();
            });

            console.log('🚀 Dream OS v2.0 initialized | Bi idznillah 💚');
        }

        // Start when DOM ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        // PWA Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed:', err));
        }
    </script>
</body>
</html>
