<script>
    // ========== SIMPLE LOGIN (TANPA CORE) ==========
    const USERS = {
        '012443410': { role: 'DEVELOPER', modules: ['booking','k3','sekuriti','janitor-indoor','janitor-outdoor','stok','maintenance','asset','commandcenter'] },
        'Mr.M_Architect_2025': { role: 'MASTER', modules: ['booking','k3','sekuriti','janitor-indoor','janitor-outdoor','stok','maintenance','asset','commandcenter'] },
        '4dm1n_AF6969@00': { role: 'ADMIN', modules: ['booking','k3','sekuriti','janitor-indoor','janitor-outdoor','stok','maintenance','asset','commandcenter'] }
    };

    const MODULES = [
        { id: 'commandcenter', name: 'COMMAND', icon: '📊' },
        { id: 'booking', name: 'BOOKING', icon: '📅' },
        { id: 'k3', name: 'K3 REPORT', icon: '⚠️' },
        { id: 'sekuriti', name: 'SEKURITI', icon: '🛡️' },
        { id: 'janitor-indoor', name: 'JANITOR IN', icon: '🧹' },
        { id: 'janitor-outdoor', name: 'JANITOR OUT', icon: '🌿' },
        { id: 'stok', name: 'STOK', icon: '📦' },
        { id: 'maintenance', name: 'MAINTENANCE', icon: '🔧' },
        { id: 'asset', name: 'ASSET', icon: '🏢' }
    ];

    let sessionTimer = null;
    let sessionTime = 300;
    let currentSlide = 0;
    const totalSlides = 7;
    let slideInterval = null;

    function showToast(msg, isSuccess = true) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.background = isSuccess ? 'rgba(16,185,129,0.95)' : 'rgba(239,68,68,0.95)';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function renderGrid(modules) {
        const container = document.getElementById('grid-modules');
        if (!container) return;
        container.innerHTML = '';
        MODULES.forEach(m => {
            if (modules.includes(m.id) || modules.includes('all')) {
                const card = document.createElement('div');
                card.className = 'module-card';
                card.onclick = () => {
                    showToast(`Modul ${m.name} akan segera dibuka`, true);
                    // Nanti ganti dengan loadModule
                };
                card.innerHTML = `<div class="crystal-icon">${m.icon}</div><div class="text-xs font-bold uppercase">${m.name}</div>`;
                container.appendChild(card);
            }
        });
    }

    function startSessionTimer() {
        if (sessionTimer) clearInterval(sessionTimer);
        sessionTime = 300;
        const display = document.getElementById('timerDisplay');
        sessionTimer = setInterval(() => {
            sessionTime--;
            const m = Math.floor(sessionTime / 60);
            const s = sessionTime % 60;
            if (display) display.textContent = m + ':' + (s < 10 ? '0' : '') + s;
            if (sessionTime <= 0) {
                clearInterval(sessionTimer);
                showToast('Session expired!', false);
                sessionStorage.clear();
                location.reload();
            }
        }, 1000);
    }

    function updatePrayerTheme() {
        const hour = new Date().getHours();
        const body = document.body;
        const prayer = document.getElementById('prayerTime');
        body.className = '';
        if (hour >= 4 && hour < 6) { body.classList.add('theme-fajr'); if(prayer) prayer.textContent = '🌅 Fajr'; }
        else if (hour >= 6 && hour < 12) { body.classList.add('theme-dhuhr'); if(prayer) prayer.textContent = '☀️ Dhuhr'; }
        else if (hour >= 12 && hour < 15) { body.classList.add('theme-asr'); if(prayer) prayer.textContent = '🌤️ Asr'; }
        else if (hour >= 15 && hour < 18) { body.classList.add('theme-maghrib'); if(prayer) prayer.textContent = '🌅 Maghrib'; }
        else { body.classList.add('theme-isha'); if(prayer) prayer.textContent = '🌙 Isha'; }
    }

    window.goToSlide = function(index) {
        if (index < 0) index = totalSlides - 1;
        if (index >= totalSlides) index = 0;
        currentSlide = index;
        const wrapper = document.getElementById('sliderWrapper');
        if (wrapper) wrapper.style.transform = `translateX(-${currentSlide * 100}%)`;
        document.querySelectorAll('.slider-dot').forEach((dot, i) => {
            dot.classList.toggle('active', i === currentSlide);
        });
        resetSlideInterval();
    };

    window.nextSlide = function() { goToSlide(currentSlide + 1); };
    window.prevSlide = function() { goToSlide(currentSlide - 1); };

    function startSlideInterval() {
        if (slideInterval) clearInterval(slideInterval);
        slideInterval = setInterval(() => { nextSlide(); }, 7000);
    }

    function resetSlideInterval() {
        if (slideInterval) {
            clearInterval(slideInterval);
            startSlideInterval();
        }
    }

    async function loadSlideData() {
        const slides = [
            { title: 'Assalamualaikum', content: 'Selamat datang di Dream OS v2.0' },
            { title: 'Booking Hari Ini', content: 'Tidak ada booking' },
            { title: 'K3 Hari Ini', content: 'Tidak ada laporan' },
            { title: 'Cuaca & Mitigasi', content: '<div class="slide-weather-icon">🌤️</div><div>26°C, Kelembaban 80%</div><div class="slide-meta"><span class="slide-meta-item">🚦 Lalu lintas: Lancar</span><span class="slide-meta-item">🌋 Mitigasi: Aman</span></div>' },
            { title: 'Pengumuman', content: 'Tidak ada' },
            { title: 'Info Tambahan 1', content: 'Kosong' },
            { title: 'Info Tambahan 2', content: 'Kosong' }
        ];
        const wrapper = document.getElementById('sliderWrapper');
        if (!wrapper) return;
        wrapper.innerHTML = slides.map(s => `
            <div class="slider-slide">
                <h3 class="slide-title">${s.title}</h3>
                <div class="slide-content">${s.content}</div>
            </div>
        `).join('');
        const dotsContainer = document.getElementById('sliderDots');
        if (!dotsContainer) return;
        dotsContainer.innerHTML = slides.map((_, i) => `
            <div class="slider-dot ${i === 0 ? 'active' : ''}" onclick="goToSlide(${i})"></div>
        `).join('');
    }

    window.doLogout = function() {
        sessionStorage.clear();
        location.reload();
    };

    window.doCloseModule = function() {
        document.getElementById('module-window').classList.add('hidden');
    };

    document.getElementById('toggleBtn').addEventListener('click', function() {
        const pass = document.getElementById('passkey');
        const icon = document.getElementById('eyeIcon');
        pass.type = pass.type === 'password' ? 'text' : 'password';
        icon.className = pass.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
    });

    document.getElementById('btnLogin').addEventListener('click', async () => {
        const key = document.getElementById('passkey').value;
        const user = USERS[key];
        if (user) {
            sessionStorage.setItem('dream_user', key);
            sessionStorage.setItem('dream_user_data', JSON.stringify(user));
            
            document.getElementById('login-zone').classList.add('hidden');
            document.getElementById('app-shell').classList.remove('hidden');
            document.getElementById('user-role').textContent = user.role;
            
            renderGrid(user.modules);
            await loadSlideData();
            startSlideInterval();
            startSessionTimer();
            updatePrayerTheme();
            showToast('Welcome, ' + user.role + '!', true);
        } else {
            document.getElementById('error-msg').textContent = '❌ Access Denied!';
            setTimeout(() => document.getElementById('error-msg').textContent = '', 2000);
        }
    });

    document.getElementById('passkey').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('btnLogin').click();
    });

    // Cek session
    (function checkSession() {
        const data = sessionStorage.getItem('dream_user_data');
        if (data) {
            const user = JSON.parse(data);
            document.getElementById('login-zone').classList.add('hidden');
            document.getElementById('app-shell').classList.remove('hidden');
            document.getElementById('user-role').textContent = user.role;
            renderGrid(user.modules);
            loadSlideData().then(() => startSlideInterval());
            startSessionTimer();
            updatePrayerTheme();
        }
    })();
</script>
