<style>
    /* CRYSTAL ICON DESIGN */
    .crystal-node {
        position: relative;
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 28px;
        padding: 1.5rem 0.5rem;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        overflow: hidden;
    }

    .crystal-node:active {
        transform: scale(0.9) rotate(2deg);
        background: rgba(16, 185, 129, 0.1);
    }

    /* Efek Kilauan Cahaya di Icon */
    .crystal-node::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
        transform: rotate(45deg);
        pointer-events: none;
    }

    /* Icon Melayang (Floating) */
    .icon-sphere {
        width: 60px;
        height: 60px;
        margin: 0 auto 0.8rem;
        background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.8rem;
        box-shadow: 
            0 10px 20px rgba(0,0,0,0.3),
            inset 0 0 15px rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
    }

    .icon-label {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: rgba(255,255,255,0.7);
        text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
</style>

<script>
// Replace fungsi renderNodes lo dengan yang ini biar Icon Crystal-nya muncul!
function renderNodes(lang) {
    const grid = document.getElementById('nodeGrid');
    const icons = ['📅', '⚠️', '🛡️', '🧹', '🌿', '📦', '🔧', '🏢', '📊'];
    const modNames = TRANSLATIONS[lang].mods;
    
    grid.innerHTML = '';
    MODS.forEach((m, i) => {
        if (curMods.indexOf(m.id) !== -1 || curMods.indexOf('all') !== -1) {
            const card = document.createElement('div');
            card.className = 'crystal-node group';
            card.onclick = () => openMod(m.id);
            
            card.innerHTML = `
                <div class="icon-sphere">
                    ${icons[i]}
                </div>
                <div class="icon-label group-hover:text-emerald-400 transition-colors">
                    ${modNames[i]}
                </div>
                <div class="absolute bottom-0 left-0 right-0 h-1 bg-emerald-500/20 blur-md"></div>
            `;
            grid.appendChild(card);
        }
    });
}
</script>
