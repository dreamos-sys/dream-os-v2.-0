<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <title>Dream OS v2.0 | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rajdhani', sans-serif; background: #0f172a; color: white; min-height: 100vh; }
        .bg-animated { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); }
        .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        .module-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 2rem; cursor: pointer; transition: all 0.3s ease; text-align: center; }
        .module-card:hover { transform: translateY(-8px); border-color: #10b981; }
        .module-icon { font-size: 3.5rem; margin-bottom: 1rem; }
        .btn-primary { background: linear-gradient(135deg, #10b981 0%, #059669 100%); border: none; border-radius: 16px; padding: 1rem 2rem; font-weight: 700; cursor: pointer; }
        .btn-primary:hover { transform: translateY(-2px); }
        .input-modern { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 1rem; color: white; font-family: monospace; }
        .input-modern:focus { outline: none; border-color: #10b981; }
        .eye-btn { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); z-index: 100; background: transparent; border: none; cursor: pointer; color: #94a3b8; }
        .eye-btn:hover { color: #10b981; }
        .toast { position: fixed; top: 20px; right: 20px; background: #10b981; color: white; padding: 1rem 2rem; border-radius: 16px; z-index: 10000; }
        .title-font { font-family: 'Orbitron', sans-serif; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="bg-animated"></div>
<div id="toast-container"></div>

<!-- LOGIN -->
<div id="login-zone" class="fixed inset-0 z-40 flex items-center justify-center">
    <div class="glass-card p-8 max-w-md w-full mx-4">
        <div class="text-center">
            <div class="text-6xl mb-4">🚀</div>
            <h1 class="title-font text-3xl font-black text-emerald-400 mb-2">DREAM OS v2.0</h1>
            <p class="text-sm text-slate-400 mb-6">Command Center</p>
            <p class="text-xl text-emerald-300 mb-6">بِسْمِ اللَّهِ</p>
            
            <div class="relative mb-6">
                <input type="password" id="passkey" class="input-modern w-full text-center pr-12" placeholder="Access Code">
                <button type="button" class="eye-btn" onclick="togglePass()">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
            </div>
                        <button class="btn-primary w-full mb-4" onclick="doLogin()">🔓 Access System</button>
            <p id="errMsg" class="text-red-400 text-xs hidden"></p>
            <p class="text-[8px] text-slate-500 mt-8">Dream Team © 2026</p>
        </div>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden max-w-7xl mx-auto p-4">
    <div class="glass-card p-6 mb-8">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="title-font text-2xl font-black text-emerald-400">DREAM OS v2.0</h1>
                <p class="text-xs text-slate-400">COMMAND CENTER</p>
            </div>
            <div class="flex items-center gap-4">
                <span id="userRole" class="text-emerald-400 font-bold"></span>
                <button class="bg-red-600 px-4 py-2 rounded-xl text-xs" onclick="doLogout()">Logout</button>
            </div>
        </div>
    </div>
    
    <!-- 7-SLIDE INFO PANEL -->
    <div class="glass-card p-6 mb-8 overflow-hidden">
        <div id="slider" class="flex transition-transform">
            <div class="min-w-full text-center"><p class="text-2xl">📅 Booking Hari Ini</p><p id="slide-booking" class="text-slate-400">Loading...</p></div>
            <div class="min-w-full text-center"><p class="text-2xl">⚠️ K3 Reports</p><p id="slide-k3" class="text-slate-400">Loading...</p></div>
            <div class="min-w-full text-center"><p class="text-2xl">💰 Dana Pending</p><p id="slide-dana" class="text-slate-400">Loading...</p></div>
            <div class="min-w-full text-center"><p class="text-2xl">🌤️ Cuaca</p><p id="slide-weather" class="text-slate-400">Loading...</p></div>
            <div class="min-w-full text-center"><p class="text-2xl">📢 Pengumuman</p><p id="slide-announce" class="text-slate-400">Loading...</p></div>
            <div class="min-w-full text-center"><p class="text-2xl">🕌 Prayer Time</p><p id="slide-prayer" class="text-slate-400">Loading...</p></div>
            <div class="min-w-full text-center"><p class="text-2xl">🤖 AI Insight</p><p id="slide-ai" class="text-slate-400">Loading...</p></div>
        </div>
        <div class="flex justify-center gap-2 mt-4" id="slider-dots"></div>
    </div>
    
    <!-- 9 MODULES -->
    <div id="moduleGrid" class="grid grid-cols-3 md:grid-cols-5 gap-4"></div>
</div>

<!-- MODULE WINDOW -->
<div id="modWindow" class="hidden fixed inset-0 bg-slate-900/95 z-50 p-4">
    <div class="max-w-7xl mx-auto">
        <button class="mb-6 text-emerald-400" onclick="closeMod()">← Back</button>
        <div id="modContent"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>// Config
var SB_URL = 'https://pvznaeppaagylwddirla.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2em5hZXBwYWFneWx3ZGRpcmxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NTEwNDMsImV4cCI6MjA4NzUyNzA0M30.t9SJi3VfsBDkKmeZ3egZ4rbvljl4xe0WwNkPtfA9-vo';
var supabase = window.supabase.createClient(SB_URL, SB_KEY);

// Roles
var ROLES = {
    "012443410": { role: "DEVELOPER", mods: ['all'] },
    "Mr.M_Architect_2025": { role: "MASTER", mods: ['all'] },
    "4dm1n_AF6969@00": { role: "ADMIN", mods: ['all'] },
    "LHPSsec_AF2025": { role: "SEKURITI", mods: ['sekuriti'] },
    "CHCS_AF_@003": { role: "JANITOR", mods: ['janitor-indoor','janitor-outdoor'] },
    "SACS_AF@004": { role: "STOK", mods: ['stok'] },
    "M41n_4F@234": { role: "MAINTENANCE", mods: ['maintenance'] },
    "4dm1n_6969@01": { role: "ASSET", mods: ['asset'] },
    "user_@1234": { role: "USER", mods: ['booking'] },
    "user_@2345": { role: "USER", mods: ['k3'] }
};

// 9 MODULES (BENAR!)
var MODS = [
    { id: 'booking', name: 'BOOKING', icon: '📅' },
    { id: 'k3', name: 'K3 REPORT', icon: '⚠️' },
    { id: 'sekuriti', name: 'SEKURITI', icon: '🛡️' },
    { id: 'janitor-indoor', name: 'JANITOR INDOOR', icon: '🧹' },
    { id: 'janitor-outdoor', name: 'JANITOR OUTDOOR', icon: '🌿' },
    { id: 'stok', name: 'ALAT & STOK', icon: '📦' },
    { id: 'maintenance', name: 'MAINTENANCE', icon: '🔧' },
    { id: 'asset', name: 'ASSET', icon: '🏢' },
    { id: 'commandcenter', name: 'COMMAND CENTER', icon: '📊' }
];

var curRole = null, curMods = [], currentSlide = 0;

// Toast
function toast(msg, ok) {
    var t = document.createElement('div');
    t.className = 'toast';
    t.style.background = ok ? '#10b981' : '#ef4444';
    t.textContent = (ok ? '✅ ' : '❌ ') + msg;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(function() { t.remove(); }, 3000);
}

// Toggle Password
function togglePass() {
    var p = document.getElementById('passkey');
    var i = document.getElementById('eyeIcon');
    p.type = p.type === 'password' ? 'text' : 'password';
    i.className = p.type === 'text' ? 'fas fa-eye-slash' : 'fas fa-eye';}

// Login
function doLogin() {
    var k = document.getElementById('passkey').value.trim();
    var err = document.getElementById('errMsg');
    var u = ROLES[k];
    if (!u) {
        err.textContent = '❌ Access Denied!';
        err.className = 'text-red-400 text-xs';
        toast('Access Denied!', false);
        setTimeout(function() { err.className = 'hidden'; }, 2000);
        return;
    }
    curRole = u.role;
    curMods = u.mods;
    sessionStorage.setItem('role', u.role);
    sessionStorage.setItem('mods', JSON.stringify(u.mods));
    toast('Welcome, ' + u.role + '!', true);
    document.getElementById('login-zone').className = 'hidden';
    document.getElementById('dashboard').className = 'max-w-7xl mx-auto p-4';
    document.getElementById('userRole').textContent = u.role;
    renderMods();
    startSlider();
    loadStats();
}

// Render 9 Modules
function renderMods() {
    var g = document.getElementById('moduleGrid');
    g.innerHTML = '';
    for (var i = 0; i < MODS.length; i++) {
        var m = MODS[i];
        if (curMods.indexOf(m.id) !== -1 || curMods.indexOf('all') !== -1) {
            var c = document.createElement('div');
            c.className = 'module-card';
            c.onclick = (function(mid) { return function() { openMod(mid); }; })(m.id);
            c.innerHTML = '<div class="module-icon">' + m.icon + '</div><div class="font-bold text-sm">' + m.name + '</div>';
            g.appendChild(c);
        }
    }
}

// Slider
function startSlider() {
    var dots = document.getElementById('slider-dots');
    dots.innerHTML = '';
    for (var i = 0; i < 7; i++) {
        var d = document.createElement('div');
        d.style.cssText = 'width:8px;height:8px;border-radius:50%;background:#94a3b8;cursor:pointer';        d.onclick = (function(idx) { return function() { goToSlide(idx); }; })(i);
        dots.appendChild(d);
    }
    setInterval(function() { goToSlide((currentSlide + 1) % 7); }, 7000);
    goToSlide(0);
}

function goToSlide(idx) {
    currentSlide = idx;
    document.getElementById('slider').style.transform = 'translateX(-' + (idx * 100) + '%)';
    var dots = document.getElementById('slider-dots').children;
    for (var i = 0; i < dots.length; i++) {
        dots[i].style.background = i === idx ? '#10b981' : '#94a3b8';
    }
    loadSlideData(idx);
}

function loadSlideData(idx) {
    if (idx === 0) loadBookingToday();
    if (idx === 1) loadK3Today();
    if (idx === 2) loadDanaPending();
    if (idx === 3) loadWeather();
    if (idx === 4) loadAnnouncement();
    if (idx === 5) loadPrayer();
    if (idx === 6) loadAIInsight();
}

function loadBookingToday() { document.getElementById('slide-booking').textContent = 'Loading...'; }
function loadK3Today() { document.getElementById('slide-k3').textContent = 'Loading...'; }
function loadDanaPending() { document.getElementById('slide-dana').textContent = 'Loading...'; }
function loadWeather() { document.getElementById('slide-weather').textContent = '31°C - Scattered Clouds'; }
function loadAnnouncement() { document.getElementById('slide-announce').textContent = 'No announcements'; }
function loadPrayer() { document.getElementById('slide-prayer').textContent = 'Next: Maghrib 17:52'; }
function loadAIInsight() { document.getElementById('slide-ai').textContent = 'System running optimal'; }

function loadStats() {
    // Load real stats from Supabase
}

// Open Module
function openMod(id) {
    document.getElementById('modWindow').className = 'fixed inset-0 bg-slate-900/95 z-50 p-4';
    document.getElementById('modContent').innerHTML = '<div class="text-center py-20"><p class="text-emerald-400">Loading ' + id + '...</p></div>';
    fetch('./modules/' + id + '/index.html')
        .then(function(r) { return r.text(); })
        .then(function(h) { document.getElementById('modContent').innerHTML = h; })
        .catch(function(e) { document.getElementById('modContent').innerHTML = '<p class="text-red-400">Module not found: ' + id + '</p>'; });
}

// Close Modulefunction closeMod() { document.getElementById('modWindow').className = 'hidden'; }

// Logout
function doLogout() { sessionStorage.clear(); location.reload(); }

// Check Session
function checkSession() {
    var r = sessionStorage.getItem('role');
    var m = sessionStorage.getItem('mods');
    if (r && m) {
        curRole = r;
        curMods = JSON.parse(m);
        document.getElementById('login-zone').className = 'hidden';
        document.getElementById('dashboard').className = 'max-w-7xl mx-auto p-4';
        document.getElementById('userRole').textContent = r;
        renderMods();
        startSlider();
        toast('Welcome back!', true);
    }
}

// Enter key login
document.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        var p = document.getElementById('passkey');
        if (p && document.activeElement === p) doLogin();
    }
});

console.log('🚀 Dream OS v2.0 - 9 Modules Ready!');
checkSession();
</script>

</body>
</html>
