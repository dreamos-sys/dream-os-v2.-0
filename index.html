<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#10b981">
    <title>Dream OS v2.0 | The Power Soul of Shalawat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #020617; color: white; font-family: 'Rajdhani', sans-serif; min-height: 100vh; }
        .hidden { display: none !important; }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top-color: #10b981; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; top: 20px; right: 20px; padding: 12px 24px; border-radius: 12px; color: white; font-weight: 700; font-size: 12px; z-index: 10000; animation: slideIn 0.3s ease-out; }
        .toast-success { background: #10b981; }
        .toast-error { background: #ef4444; }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

<div id="toast-container"></div>

<!-- LOGIN ZONE -->
<div id="login-zone" class="fixed inset-0 z-50 flex items-center justify-center bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900">
    <div class="bg-white/10 backdrop-blur-xl p-8 rounded-3xl border border-white/20 max-w-sm w-full mx-4">
        <div class="text-center">
            <div class="text-5xl mb-3">🚀</div>
            <h1 class="text-2xl font-black text-emerald-400 mb-1">Dream OS v2.0</h1>
            <p class="text-xs text-slate-400 mb-6">The Power Soul of Shalawat</p>
            <p class="text-lg text-emerald-300 mb-4 font-arabic">بِسْمِ اللَّهِ</p>
            <input type="password" id="passkey" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700 text-white mb-4 text-center font-mono" placeholder="Access Code">
            <button id="btnLogin" class="w-full bg-emerald-600 hover:bg-emerald-500 p-3 rounded-xl font-bold transition active:scale-95">🔓 Login</button>
            <p id="error-msg" class="text-red-400 text-xs mt-3 hidden font-bold"></p>
            <p class="text-[8px] text-slate-500 mt-6">🔐 ISO 27001 Certified | Dream Team © 2026</p>
        </div>
    </div>
</div>

<!-- APP SHELL -->
<div id="app-shell" class="hidden max-w-7xl mx-auto p-4">
    <div class="bg-slate-800/50 rounded-2xl p-4 mb-6 flex justify-between items-center">
        <h1 class="text-xl font-bold text-emerald-400">Dream OS <span class="text-white">v2.0</span></h1>
        <div class="flex items-center gap-2">
            <span id="user-role" class="text-sm text-slate-300"></span>
            <button onclick="doLogout()" class="bg-red-600 hover:bg-red-500 px-3 py-1 rounded-lg text-xs transition">Logout</button>
        </div>
    </div>

    <div id="grid-modules" class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
</div>

<!-- MODULE WINDOW -->
<div id="module-window" class="hidden fixed inset-0 bg-slate-900/95 overflow-y-auto p-4 z-50">
    <div class="max-w-7xl mx-auto">
        <button onclick="doCloseModule()" class="mb-4 text-emerald-400 hover:text-emerald-300 transition">
            <i class="fas fa-arrow-left mr-2"></i> Kembali ke Dashboard
        </button>
        <div id="module-content"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
    import { CONFIG } from './core/config.js';
    import { supabase } from './core/supabase.js';
    import { store } from './core/store.js';
    import { login, logout, checkSession } from './core/auth.js';
    import { loadModule, closeModule } from './core/router.js';
    import { showToast } from './core/components.js';
    import { requestNotificationPermission } from './core/notification.js';
    import { syncOffline } from './core/offline.js';

    window.doLogout = logout;
    window.doCloseModule = closeModule;

    const MODULES = [
        { id: 'booking', name: 'BOOKING', icon: '📅' },
        { id: 'k3', name: 'K3 REPORT', icon: '⚠️' },
        { id: 'sekuriti', name: 'SEKURITI', icon: '🛡️' },
        { id: 'janitor-indoor', name: 'JANITOR IN', icon: '🧹' },
        { id: 'janitor-outdoor', name: 'JANITOR OUT', icon: '🌿' },
        { id: 'stok', name: 'STOK', icon: '📦' },
        { id: 'maintenance', name: 'MAINTENANCE', icon: '🔧' },
        { id: 'asset', name: 'ASSET', icon: '🏢' },
        { id: 'dana', name: 'DANA', icon: '💰' },
        { id: 'commandcenter', name: 'COMMAND', icon: '📊' },
        { id: 'qr', name: 'QR', icon: '📱' }
    ];

    function renderGrid(modules) {
        const container = document.getElementById('grid-modules');
        container.innerHTML = '';
        MODULES.forEach(m => {
            if (modules.includes(m.id) || modules.includes('all')) {
                const card = document.createElement('div');
                card.className = 'bg-slate-800 hover:bg-slate-700 p-6 rounded-2xl text-center cursor-pointer transition transform hover:scale-105 border border-slate-700';
                card.onclick = () => loadModule(m.id);
                card.innerHTML = `<div class="text-4xl mb-3">${m.icon}</div><div class="text-xs font-bold uppercase">${m.name}</div>`;
                container.appendChild(card);
            }
        });
    }

    // Cek session
    if (checkSession()) {
        const user = store.get('user');
        document.getElementById('login-zone').classList.add('hidden');
        document.getElementById('app-shell').classList.remove('hidden');
        document.getElementById('user-role').textContent = user.role;
        renderGrid(user.modules);
        syncOffline(); // sinkronisasi offline
        requestNotificationPermission();
    }

    // Login event
    document.getElementById('btnLogin').addEventListener('click', async () => {
        const key = document.getElementById('passkey').value;
        const success = await login(key);
        if (success) {
            const user = store.get('user');
            document.getElementById('login-zone').classList.add('hidden');
            document.getElementById('app-shell').classList.remove('hidden');
            document.getElementById('user-role').textContent = user.role;
            renderGrid(user.modules);
            syncOffline();
            requestNotificationPermission();
        } else {
            document.getElementById('error-msg').classList.remove('hidden');
            document.getElementById('error-msg').textContent = 'Akses ditolak!';
            setTimeout(() => document.getElementById('error-msg').classList.add('hidden'), 2000);
        }
    });

    // Enter key
    document.getElementById('passkey').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('btnLogin').click();
    });
</script>
</body>
</html>
