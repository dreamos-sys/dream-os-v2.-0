<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <title>Dream OS v2.0 | Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #020617; 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 3rem 2rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo { 
            width: 80px; 
            height: 80px; 
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .subtitle { color: rgba(255,255,255,0.5); font-size: 0.875rem; margin-bottom: 2rem; }
        .arabic { 
            font-size: 2rem; 
            color: #10b981; 
            margin-bottom: 2rem;
            font-family: 'Amiri', serif;
        }
        .input-group {
            position: relative;            margin-bottom: 1.5rem;
        }
        .input-group input {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 18px;
            padding: 14px 50px 14px 14px;
            color: white;
            font-size: 1rem;
            text-align: center;
            letter-spacing: 4px;
            outline: none;
        }
        .input-group input:focus {
            border-color: #10b981;
            box-shadow: 0 0 20px rgba(16,185,129,0.3);
        }
        .eye-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            cursor: pointer;
            color: rgba(255,255,255,0.5);
            font-size: 1.25rem;
            padding: 5px;
            z-index: 999;
        }
        .eye-btn:hover { color: #10b981; }
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 18px;
            padding: 14px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .login-btn:active { transform: scale(0.98); }
        .error-msg {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 1rem;
            min-height: 1.25rem;        }
        .footer {
            color: rgba(255,255,255,0.3);
            font-size: 0.75rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>

<div class="login-box">
    <div class="logo">🚀</div>
    <h1>Dream OS <span style="color: #10b981;">v2.0</span></h1>
    <p class="subtitle">Crystal Prism Edition</p>
    <p class="arabic">بِسْمِ اللَّهِ</p>
    
    <div class="input-group">
        <input type="password" id="passkey" placeholder="Access Code" autocomplete="off">
        <button type="button" class="eye-btn" onclick="togglePassword()">
            <i class="fas fa-eye" id="eyeIcon"></i>
        </button>
    </div>
    
    <button class="login-btn" onclick="doLogin()">
        <i class="fas fa-lock-open" style="margin-right: 8px;"></i>Access System
    </button>
    
    <p class="error-msg" id="errorMsg"></p>
    
    <p class="footer">🔐 ISO 27001 | Dream Team © 2026</p>
</div>

<script>
// ═══════════════════════════════════════════════════════
// PASSWORD TOGGLE - PASTI JALAN!
// ═══════════════════════════════════════════════════════
function togglePassword() {
    console.log('👁️ togglePassword called!');
    var pass = document.getElementById('passkey');
    var icon = document.getElementById('eyeIcon');
    
    if (pass.type === 'password') {
        pass.type = 'text';
        icon.className = 'fas fa-eye-slash';
        console.log('✅ Password shown');
    } else {
        pass.type = 'password';
        icon.className = 'fas fa-eye';
        console.log('✅ Password hidden');
    }}

// ═══════════════════════════════════════════════════════
// LOGIN - PASTI JALAN!
// ═══════════════════════════════════════════════════════
var KEYS = {
    "012443410": { role: "DEVELOPER", modules: ['all'] },
    "Mr.M_Architect_2025": { role: "ARCHITECT", modules: ['all'] },
    "4dm1n_AF6969@00": { role: "ADMIN", modules: ['all'] },
    "user_@1234": { role: "USER", modules: ['booking'] },
    "user_@2345": { role: "USER", modules: ['k3'] }
};

function doLogin() {
    console.log('🔑 doLogin called!');
    var key = document.getElementById('passkey').value;
    var user = KEYS[key];
    var errorMsg = document.getElementById('errorMsg');
    
    if (user) {
        console.log('✅ Login success:', user.role);
        sessionStorage.setItem('dream_role', user.role);
        sessionStorage.setItem('dream_modules', JSON.stringify(user.modules));
        errorMsg.textContent = '✅ Login successful! Redirecting...';
        errorMsg.style.color = '#10b981';
        
        // Redirect ke app shell (nanti kita buat)
        setTimeout(function() {
            alert('Login berhasil sebagai: ' + user.role + '\n\nNext: Buat app-shell.html');
        }, 1000);
    } else {
        console.log('❌ Login failed');
        errorMsg.textContent = '❌ Access Denied!';
        errorMsg.style.color = '#ef4444';
    }
}

// Enter key untuk login
document.getElementById('passkey').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        doLogin();
    }
});

console.log('✅ Dream OS Login Ready!');
</script>

</body>
</html>
