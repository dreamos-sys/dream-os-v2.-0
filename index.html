<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dream OS v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== Semua CSS dari command center ===== */
        :root { --emerald: #10b981; --blue: #3b82f6; --orange: #f59e0b; --purple: #a855f7; --red: #ef4444; --bg: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #020617 0%, #1e293b 100%); color: white; font-family: 'Rajdhani', sans-serif; padding: 1rem; min-height: 100vh; }
        .crystal-card { background: var(--bg); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .arabic { font-family: 'Amiri', serif; }
        .tab-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 1.5rem; color: white; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: var(--emerald); border-color: var(--emerald); }
        .stat-box { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 1rem; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 700; }
        .security-status { padding: 0.75rem 1.5rem; border-radius: 12px; font-weight: 700; text-align: center; }
        .status-safe { background: rgba(16,185,129,0.2); color: var(--emerald); border: 1px solid var(--emerald); }
        .status-warning { background: rgba(245,158,11,0.2); color: var(--orange); border: 1px solid var(--orange); }
        .status-danger { background: rgba(239,68,68,0.2); color: var(--red); border: 1px solid var(--red); }
        .submenu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
        .submenu-item { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 16px; padding: 1rem 0.5rem; text-align: center; cursor: pointer; transition: 0.3s; }
        .submenu-item:hover { border-color: var(--emerald); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .hidden { display: none !important; }
        /* Tambahkan semua CSS yang diperlukan... */
    </style>
</head>
<body class="theme-isha">

<!-- LOGIN ZONE (sama seperti sebelumnya) -->
<div id="login-zone" class="fixed inset-0 z-50 flex items-center justify-center p-6">
    <div class="glass-card p-8 max-w-sm w-full text-center">
        <div class="crystal-logo"><i class="fas fa-rocket"></i></div>
        <h1 class="text-2xl font-bold mb-1">Dream OS <span style="color: var(--emerald);">v2.0</span></h1>
        <p class="text-xs text-slate-400 mb-6">Crystal Prism Edition</p>
        <p class="arabic text-2xl text-emerald-300 mb-6">بِسْمِ اللَّهِ</p>
        <div class="relative mb-6">
            <input type="password" id="passkey" class="input-crystal" placeholder="Access Code">
            <button type="button" id="toggleBtn" class="eye-btn"><i class="fas fa-eye" id="eyeIcon"></i></button>
        </div>
        <button id="btnLogin" class="btn-crystal"><i class="fas fa-lock-open mr-2"></i> Access System</button>
        <p id="error-msg" class="text-red-400 text-xs mt-4 h-4 font-bold"></p>
        <p class="text-[8px] text-slate-500 mt-8">🔐 ISO 27001 | Dream Team © 2026</p>
    </div>
</div>

<!-- APP SHELL -->
<div id="app-shell" class="hidden max-w-7xl mx-auto p-4">
    <div class="glass-card p-4 mb-6 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="text-3xl">🚀</div>
            <div><h1 class="text-xl font-bold">Dream OS <span class="text-white">v2.0</span></h1></div>
        </div>
        <div class="flex items-center gap-4">
            <span id="user-role" class="text-sm"></span>
            <button onclick="window.doLogout()" class="bg-red-600 px-3 py-1 rounded-lg text-xs">Logout</button>
        </div>
    </div>
    <div class="module-grid" id="grid-modules"></div>
</div>

<!-- MODULE WINDOW -->
<div id="module-window" class="hidden fixed inset-0 z-50 p-4" style="background: rgba(0,0,0,0.95); overflow-y: auto;">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <button onclick="window.doCloseModule()" class="text-emerald-400"><i class="fas fa-arrow-left mr-2"></i>Back</button>
            <button onclick="window.doCloseModule()" class="text-white/40"><i class="fas fa-times"></i></button>
        </div>
        <div id="module-content"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module">
    import { store } from './core/store.js';
    import { login, logout, checkSession } from './core/auth.js';
    import { showToast } from './core/components.js';

    // Load module function (sederhana)
    async function loadModule(moduleId) {
        const win = document.getElementById('module-window');
        const content = document.getElementById('module-content');
        if (!win || !content) return;
        win.classList.remove('hidden');
        content.innerHTML = '<div class="shalawat-loading">Memuat...</div>';
        try {
            const mod = await import(`./modules/${moduleId}/module.js`);
            if (mod && typeof mod.init === 'function') {
                await mod.init();
            } else {
                content.innerHTML = '<p>Modul tidak memiliki init</p>';
            }
        } catch (err) {
            content.innerHTML = `<p style="color:red;">Error: ${err.message}</p>`;
        }
    }

    function closeModule() {
        document.getElementById('module-window').classList.add('hidden');
        document.getElementById('module-content').innerHTML = '';
    }

    window.loadModule = loadModule;
    window.doCloseModule = closeModule;
    window.doLogout = logout;

    const MODULES = [
        { id: 'commandcenter', name: 'COMMAND', icon: '📊' },
        // tambah modul lain nanti
    ];

    function renderGrid(modules) {
        const container = document.getElementById('grid-modules');
        if (!container) return;
        container.innerHTML = '';
        MODULES.forEach(m => {
            if (modules.includes(m.id) || modules.includes('all')) {
                const card = document.createElement('div');
                card.className = 'module-card';
                card.onclick = () => loadModule(m.id);
                card.innerHTML = `<div class="crystal-icon">${m.icon}</div><div class="text-xs font-bold uppercase">${m.name}</div>`;
                container.appendChild(card);
            }
        });
    }

    document.getElementById('btnLogin').addEventListener('click', async () => {
        const key = document.getElementById('passkey').value;
        const success = await login(key);
        if (success) {
            const user = store.get('user');
            document.getElementById('login-zone').classList.add('hidden');
            document.getElementById('app-shell').classList.remove('hidden');
            document.getElementById('user-role').textContent = user.role;
            renderGrid(user.modules);
        } else {
            document.getElementById('error-msg').textContent = '❌ Access Denied!';
        }
    });

    document.getElementById('passkey').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('btnLogin').click();
    });

    if (checkSession()) {
        const user = store.get('user');
        document.getElementById('login-zone').classList.add('hidden');
        document.getElementById('app-shell').classList.remove('hidden');
        document.getElementById('user-role').textContent = user.role;
        renderGrid(user.modules);
    }
</script>
</body>
</html>
