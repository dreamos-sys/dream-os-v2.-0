<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#10b981">
    <title>Dream OS v2.0 | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Rajdhani', sans-serif; 
            color: white; 
            min-height: 100vh; 
            transition: background 1s ease;
            /* DARK MODE SPESIAL RAMADHAN */
            background: linear-gradient(180deg, #051937 0%, #004d7a 50%, #0f172a 100%);
        }
        
        /* DYNAMIC SKY - DARKER VERSION */
        .sky-fajr { background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
        .sky-dhuhr { background: linear-gradient(180deg, #0f3460 0%, #16213e 50%, #1a1a2e 100%); }
        .sky-asr { background: linear-gradient(180deg, #1a1a2e 0%, #e94560 50%, #0f3460 100%); }
        .sky-maghrib { background: linear-gradient(180deg, #0f3460 0%, #e94560 50%, #1a1a2e 100%); }
        .sky-isha { background: linear-gradient(180deg, #000000 0%, #0f0c29 50%, #1a1a2e 100%); }
        
        /* CRYSTAL SPHERE - MORE CONTRAST */
        .crystal-sphere {
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.2);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem auto; position: relative;
        }
        .crystal-icon { font-size: 2.5rem; position: relative; z-index: 10; filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }
        
        /* GLASS CARD - DARKER */
        .glass-card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
                /* MODULE CARD - DARKER */
        .module-card {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        .module-card:hover { 
            transform: translateY(-8px); 
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(0, 0, 0, 0.5);
        }
        
        /* TEXT - HIGH CONTRAST */
        .module-text {
            color: #ffffff;
            text-shadow: 0px 2px 8px rgba(0, 0, 0, 0.8);
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-top: 0.5rem;
        }
        
        /* BUTTON */
        .btn-primary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: none;
            border-radius: 16px;
            padding: 1rem 2rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-bottom: 1rem;
            color: white;
            font-size: 1rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(16,185,129,0.4); }
        
        /* INPUT */
        .input-modern {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 1rem;
            color: white;
            font-family: monospace;            width: 100%;
            font-size: 1rem;
        }
        .input-modern:focus { outline: none; border-color: rgba(255, 255, 255, 0.5); }
        
        /* EYE BUTTON */
        .eye-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            cursor: pointer;
            color: rgba(255,255,255,0.6);
            padding: 8px;
            z-index: 100;
        }
        .eye-btn:hover { color: white; }
        
        /* TOAST */
        .toast {
            position: fixed; top: 20px; right: 20px;
            background: rgba(16,185,129,0.9);
            color: white; padding: 1rem 2rem;
            border-radius: 16px; z-index: 10000;
            backdrop-filter: blur(10px);
        }
        
        .title-font { font-family: 'Orbitron', sans-serif; }
        .hidden { display: none !important; }
        .relative { position: relative; }
        
        /* PRAYER INDICATOR */
        .prayer-indicator {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 0.5rem 1rem;
            border-radius: 12px;
            font-size: 0.75rem;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body class="sky-isha">
<!-- PRAYER TIME -->
<div class="prayer-indicator">
    <i class="fas fa-moon mr-2"></i>
    <span id="prayer-time">Loading...</span>
</div>

<div id="toast-container"></div>

<!-- LOGIN -->
<div id="login-zone" class="fixed inset-0 z-40 flex items-center justify-center">
    <div class="glass-card p-8 max-w-md w-full mx-4">
        <div class="text-center">
            <div class="crystal-sphere" style="width: 100px; height: 100px; margin: 0 auto 1.5rem auto;">
                <div class="crystal-icon">🚀</div>
            </div>
            
            <h1 class="title-font text-3xl font-black text-white mb-2">DREAM OS v2.0</h1>
            <p class="text-sm text-white/60 mb-6">Command Center</p>
            <p class="text-xl text-white/80 mb-6">بِسْمِ اللَّهِ</p>
            
            <div class="relative" style="margin-bottom: 1.5rem;">
                <input type="password" id="passkey" class="input-modern" placeholder="Access Code">
                <button type="button" id="toggleBtn" class="eye-btn" onclick="togglePass()">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
            </div>
            
            <button id="loginBtn" class="btn-primary" onclick="doLogin()">🔓 Access System</button>
            <p id="errMsg" class="text-red-300 text-xs hidden"></p>
            <p class="text-[8px] text-white/40 mt-8">Dream Team © 2026 | Ramadhan Mode 🌙</p>
        </div>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden max-w-7xl mx-auto p-4">
    <div class="glass-card p-6 mb-8">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="crystal-sphere" style="width: 50px; height: 50px;">
                    <div class="crystal-icon" style="font-size: 1.5rem;">🚀</div>
                </div>
                <div>
                    <h1 class="title-font text-2xl font-black text-white">DREAM OS v2.0</h1>
                    <p class="text-xs text-white/60">COMMAND CENTER</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <span id="userRole" class="text-emerald-300 font-bold"></span>                <button class="bg-red-600/80 px-4 py-2 rounded-xl text-xs" onclick="doLogout()">Logout</button>
            </div>
        </div>
    </div>
    
    <!-- 9 MODULES -->
    <div id="moduleGrid" class="grid grid-cols-3 md:grid-cols-5 gap-4"></div>
    
    <footer class="text-center py-8 mt-8">
        <p class="text-xs text-white/40 mb-2">THE POWER SOUL OF SHALAWAT 🌙</p>
        <p class="text-[8px] text-white/30">Dream Team © 2026 | Ramadhan Kareem</p>
    </footer>
</div>

<!-- MODULE WINDOW -->
<div id="modWindow" class="hidden fixed inset-0 z-50 p-4" style="background: rgba(0,0,0,0.95);">
    <div class="max-w-7xl mx-auto">
        <button class="mb-6 text-emerald-300" onclick="closeMod()">← Back</button>
        <div id="modContent"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// Config
var SB_URL = 'https://pvznaeppaagylwddirla.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2em5hZXBwYWFneWx3ZGRpcmxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NTEwNDMsImV4cCI6MjA4NzUyNzA0M30.t9SJi3VfsBDkKmeZ3egZ4rbvljl4xe0WwNkPtfA9-vo';
var supabase = window.supabase.createClient(SB_URL, SB_KEY);

var ROLES = {
    "012443410": { role: "DEVELOPER", mods: ['all'] },
    "Mr.M_Architect_2025": { role: "MASTER", mods: ['all'] },
    "4dm1n_AF6969@00": { role: "ADMIN", mods: ['all'] },
    "LHPSsec_AF2025": { role: "SEKURITI", mods: ['sekuriti'] },
    "CHCS_AF_@003": { role: "JANITOR", mods: ['janitor-indoor','janitor-outdoor'] },
    "SACS_AF@004": { role: "STOK", mods: ['stok'] },
    "M41n_4F@234": { role: "MAINTENANCE", mods: ['maintenance'] },
    "4dm1n_6969@01": { role: "ASSET", mods: ['asset'] },
    "user_@1234": { role: "USER", mods: ['booking'] },
    "user_@2345": { role: "USER", mods: ['k3'] }
};

var MODS = [
    { id: 'booking', name: 'BOOKING', icon: '📅' },
    { id: 'k3', name: 'K3 REPORT', icon: '⚠️' },
    { id: 'sekuriti', name: 'SEKURITI', icon: '🛡️' },
    { id: 'janitor-indoor', name: 'JANITOR INDOOR', icon: '🧹' },
    { id: 'janitor-outdoor', name: 'JANITOR OUTDOOR', icon: '🌿' },
    { id: 'stok', name: 'ALAT & STOK', icon: '📦' },
    { id: 'maintenance', name: 'MAINTENANCE', icon: '🔧' },    { id: 'asset', name: 'ASSET', icon: '🏢' },
    { id: 'commandcenter', name: 'COMMAND CENTER', icon: '📊' }
];

var curRole = null, curMods = [];

function togglePass() {
    var p = document.getElementById('passkey');
    var i = document.getElementById('eyeIcon');
    p.type = p.type === 'password' ? 'text' : 'password';
    i.className = p.type === 'text' ? 'fas fa-eye-slash' : 'fas fa-eye';
}

function doLogin() {
    var k = document.getElementById('passkey').value.trim();
    var err = document.getElementById('errMsg');
    var u = ROLES[k];
    if (!u) {
        err.textContent = '❌ Access Denied!';
        err.className = 'text-red-300 text-xs';
        toast('Access Denied!', false);
        setTimeout(function() { err.className = 'hidden'; }, 2000);
        return;
    }
    curRole = u.role;
    curMods = u.mods;
    sessionStorage.setItem('role', u.role);
    sessionStorage.setItem('mods', JSON.stringify(u.mods));
    toast('Welcome, ' + u.role + '!', true);
    document.getElementById('login-zone').className = 'hidden';
    document.getElementById('dashboard').className = 'max-w-7xl mx-auto p-4';
    document.getElementById('userRole').textContent = u.role;
    renderMods();
    updateSkyBackground();
}

function renderMods() {
    var g = document.getElementById('moduleGrid');
    g.innerHTML = '';
    for (var i = 0; i < MODS.length; i++) {
        var m = MODS[i];
        if (curMods.indexOf(m.id) !== -1 || curMods.indexOf('all') !== -1) {
            var c = document.createElement('div');
            c.className = 'module-card';
            c.onclick = (function(mid) { return function() { openMod(mid); }; })(m.id);
            c.innerHTML = '<div class="crystal-sphere"><div class="crystal-icon">' + m.icon + '</div></div><div class="module-text">' + m.name + '</div>';
            g.appendChild(c);
        }
    }
}
function openMod(id) {
    document.getElementById('modWindow').className = 'fixed inset-0 z-50 p-4';
    document.getElementById('modContent').innerHTML = '<div class="text-center py-20"><p class="text-white/60">Loading ' + id + '...</p></div>';
}

function closeMod() { document.getElementById('modWindow').className = 'hidden'; }
function doLogout() { sessionStorage.clear(); location.reload(); }

function toast(msg, ok) {
    var t = document.createElement('div');
    t.className = 'toast';
    t.textContent = (ok ? '✅ ' : '❌ ') + msg;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(function() { t.remove(); }, 3000);
}

function updateSkyBackground() {
    var hour = new Date().getHours();
    var body = document.body;
    var prayer = document.getElementById('prayer-time');
    body.className = '';
    if (hour >= 4 && hour < 6) { body.classList.add('sky-fajr'); prayer.innerHTML = '🌅 Fajr'; }
    else if (hour >= 6 && hour < 12) { body.classList.add('sky-dhuhr'); prayer.innerHTML = '☀️ Dhuhr'; }
    else if (hour >= 12 && hour < 15) { body.classList.add('sky-asr'); prayer.innerHTML = '🌤️ Asr'; }
    else if (hour >= 15 && hour < 18) { body.classList.add('sky-maghrib'); prayer.innerHTML = '🌅 Maghrib'; }
    else { body.classList.add('sky-isha'); prayer.innerHTML = '🌙 Isha'; }
}

function checkSession() {
    var r = sessionStorage.getItem('role');
    var m = sessionStorage.getItem('mods');
    if (r && m) {
        curRole = r;
        curMods = JSON.parse(m);
        document.getElementById('login-zone').className = 'hidden';
        document.getElementById('dashboard').className = 'max-w-7xl mx-auto p-4';
        document.getElementById('userRole').textContent = r;
        renderMods();
        updateSkyBackground();
        toast('Welcome back!', true);
    }
}

document.addEventListener('DOMContentLoaded', function() {
    checkSession();
    updateSkyBackground();
});

document.addEventListener('keypress', function(e) {    if (e.key === 'Enter') {
        var p = document.getElementById('passkey');
        if (p && document.activeElement === p) doLogin();
    }
});

console.log('🌙 Dream OS v2.0 - Ramadhan Dark Mode Ready!');
</script>

</body>
</html>
