<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dream OS v2.0</title>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: rgba(255,255,255,0.1); padding: 2rem; border-radius: 1rem; text-align: center; }
        input, button { padding: 0.5rem 1rem; margin: 0.5rem; border-radius: 0.5rem; border: none; }
        button { background: #10b981; color: white; cursor: pointer; }
        .hidden { display: none; }
        .module-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-top: 2rem; }
        .module-card { background: rgba(255,255,255,0.1); padding: 2rem; border-radius: 1rem; text-align: center; cursor: pointer; }
        .module-card:hover { background: rgba(16,185,129,0.3); }
        #module-window { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); padding: 2rem; overflow-y: auto; }
    </style>
</head>
<body>

<!-- LOGIN ZONE -->
<div id="login-zone" class="login-box">
    <h2>Dream OS v2.0</h2>
    <input type="password" id="passkey" placeholder="Access Code">
    <button id="btnLogin">Login</button>
    <p id="error-msg" style="color: red;"></p>
</div>

<!-- APP SHELL (setelah login) -->
<div id="app-shell" class="hidden">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>Dream OS</h2>
        <div>
            <span id="user-role"></span>
            <button onclick="window.doLogout()">Logout</button>
        </div>
    </div>
    <div class="module-grid" id="grid-modules"></div>
</div>

<!-- MODULE WINDOW -->
<div id="module-window" class="hidden">
    <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
        <button onclick="window.doCloseModule()">⬅️ Back</button>
        <button onclick="window.doCloseModule()">✖️</button>
    </div>
    <div id="module-content"></div>
</div>

<script type="module">
    import { store } from './core/store.js';
    import { login, logout, checkSession } from './core/auth.js';
    import { showToast } from './core/components.js';

    // Definisikan fungsi loadModule sederhana dulu
    async function loadModule(moduleId) {
        const win = document.getElementById('module-window');
        const content = document.getElementById('module-content');
        if (!win || !content) return;

        win.classList.remove('hidden');
        content.innerHTML = '<p>Loading...</p>';

        try {
            const mod = await import(`./modules/${moduleId}/module.js`);
            if (mod && typeof mod.init === 'function') {
                await mod.init();
            } else {
                content.innerHTML = '<p>Modul tidak memiliki init</p>';
            }
        } catch (err) {
            content.innerHTML = `<p style="color:red;">Error: ${err.message}</p>`;
        }
    }

    function closeModule() {
        document.getElementById('module-window').classList.add('hidden');
        document.getElementById('module-content').innerHTML = '';
    }

    window.loadModule = loadModule;
    window.doCloseModule = closeModule;
    window.doLogout = logout;

    const MODULES = [
        { id: 'commandcenter', name: 'COMMAND', icon: '📊' },
    ];

    function renderGrid(modules) {
        const container = document.getElementById('grid-modules');
        if (!container) return;
        container.innerHTML = '';
        MODULES.forEach(m => {
            if (modules.includes(m.id) || modules.includes('all')) {
                const card = document.createElement('div');
                card.className = 'module-card';
                card.onclick = () => loadModule(m.id);
                card.innerHTML = `<div style="font-size:3rem;">${m.icon}</div><div>${m.name}</div>`;
                container.appendChild(card);
            }
        });
    }

    document.getElementById('btnLogin').addEventListener('click', async () => {
        const key = document.getElementById('passkey').value;
        const success = await login(key);
        if (success) {
            const user = store.get('user');
            document.getElementById('login-zone').classList.add('hidden');
            document.getElementById('app-shell').classList.remove('hidden');
            document.getElementById('user-role').textContent = user.role;
            renderGrid(user.modules);
        } else {
            document.getElementById('error-msg').textContent = '❌ Access Denied!';
        }
    });

    document.getElementById('passkey').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('btnLogin').click();
    });

    if (checkSession()) {
        const user = store.get('user');
        document.getElementById('login-zone').classList.add('hidden');
        document.getElementById('app-shell').classList.remove('hidden');
        document.getElementById('user-role').textContent = user.role;
        renderGrid(user.modules);
    }
</script>
</body>
</html>
