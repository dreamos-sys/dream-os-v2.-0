<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#10b981">
    <title>DREAM OS v2.0 | Secure Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --emerald: #10b981; --bg: #020617; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; min-height: 100vh; transition: background 0.5s ease; }
        .crystal-border { border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); border-radius: 24px; }
        .fingerprint-scanner { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--emerald); margin: 2rem auto; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        .fingerprint-scanner i { font-size: 2rem; color: var(--emerald); }
        .fingerprint-scanner::after { content: ""; position: absolute; inset: -5px; border-radius: 50%; border: 2px solid var(--emerald); animation: pulse-ring 2s infinite; }
        @keyframes pulse-ring { 0% { transform: scale(0.7); opacity: 0; } 50% { opacity: 0.5; } 100% { transform: scale(1.2); opacity: 0; } }
        .arabic { font-family: 'Amiri', serif; }
        .hidden { display: none !important; }
        .switch-mode { width: 50px; height: 24px; background: rgba(255,255,255,0.1); border-radius: 20px; position: relative; border: 1px solid var(--emerald); cursor: pointer; }
        .switch-circle { width: 18px; height: 18px; background: var(--emerald); border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: 0.3s; }
        .dark-active .switch-circle { left: 28px; background: #fbbf24; }
        .input-field { background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 18px; padding: 14px; width: 100%; color: white; outline: none; text-align: center; font-family: monospace; letter-spacing: 4px; }
        .input-field:focus { border-color: var(--emerald); }
        .btn-login { background: linear-gradient(135deg, var(--emerald) 0%, #059669 100%); border: none; border-radius: 18px; padding: 14px; width: 100%; color: white; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(16,185,129,0.4); }
        .eye-btn { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: transparent; border: none; cursor: pointer; color: rgba(255,255,255,0.5); padding: 8px; z-index: 100; }
        .eye-btn:hover { color: var(--emerald); }
        .module-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 1.5rem 1rem; text-align: center; cursor: pointer; transition: 0.3s; }
        .module-card:hover { transform: translateY(-5px); border-color: var(--emerald); }
        .toast { position: fixed; top: 20px; right: 20px; background: rgba(16,185,129,0.95); color: white; padding: 1rem 2rem; border-radius: 16px; z-index: 10000; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body id="masterBody">

<!-- LOGIN -->
<div id="loginZone" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-[#020617]">
    <div class="crystal-border p-8 max-w-sm w-full text-center bg-white/5">
        <h2 class="text-xl font-bold tracking-widest mb-1">DREAM OS <span class="text-emerald-400">v2.0</span></h2>
        <div class="arabic text-2xl mb-4 text-white">بِسْمِ اللَّهِ</div>
        
        <div class="fingerprint-scanner" onclick="simulateFingerprint()">
            <i class="fas fa-fingerprint"></i>
        </div>
        <p class="text-[8px] tracking-[3px] opacity-40 mb-6">BIOMETRIC AUTH (SIMULATED)</p>
        
        <div class="relative mb-4">            <input type="password" id="passkey" class="input-field" placeholder="Access Code">
            <button type="button" id="toggleBtn" class="eye-btn">
                <i id="eyeIcon" class="fas fa-eye"></i>
            </button>
        </div>
        
        <button id="loginBtn" class="btn-login">🔓 UNLOCK CORE</button>
        <p id="msg" class="text-[10px] mt-4 h-4 text-red-500 font-bold"></p>
        <p class="text-[8px] text-white/30 mt-8">Dream Team © 2026</p>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden h-full flex flex-col">
    <header class="p-6 text-center border-b border-white/5">
        <div class="flex justify-between items-center mb-6">
            <select id="langSwitch" onchange="changeLang()" class="bg-white/5 border border-white/10 rounded-lg text-[10px] p-1 text-white">
                <option value="id" class="text-black">🇮🇩 IND</option>
                <option value="en" class="text-black">🇺🇸 ENG</option>
                <option value="ar" class="text-black">🇸🇦 ARB</option>
            </select>
            <div class="switch-mode" id="modeBtn" onclick="toggleMode()">
                <div class="switch-circle"></div>
            </div>
        </div>
        <div class="arabic text-2xl mb-1 text-white" id="bismillahTxt">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
        <div class="arabic text-lg text-emerald-400" id="shalawatTxt">اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ</div>
        <p class="text-[8px] tracking-[4px] text-white/30 font-bold mt-2">THE POWER SOUL OF SHALAWAT</p>
    </header>

    <div class="px-6 mt-4">
        <div class="crystal-border p-3 flex items-center justify-between bg-emerald-500/5">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></div>
                <p class="text-[9px] font-bold tracking-widest uppercase">AI Inside Core <span class="text-emerald-400">Secure</span></p>
            </div>
            <div class="text-[7px] opacity-30">SESSION: <span id="sessionTimer">5:00</span></div>
        </div>
    </div>

    <div class="grid grid-cols-3 gap-3 p-6 max-w-md mx-auto" id="nodeGrid"></div>

    <footer class="mt-auto pb-6 text-center">
        <p class="text-[8px] tracking-[5px] text-white/10 uppercase">ISO 27001 • ISO 55001 • ISO 9001</p>
    </footer>
</div>

<!-- MODULE WINDOW -->
<div id="modWindow" class="hidden fixed inset-0 z-50 p-4" style="background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);">
    <div class="max-w-7xl mx-auto h-full overflow-y-auto">        <div class="flex justify-between items-center mb-6">
            <button id="closeModBtn" class="text-emerald-400 hover:text-emerald-300 text-lg">
                <i class="fas fa-arrow-left mr-2"></i> Back to Dashboard
            </button>
            <button id="closeModBtn2" class="text-white/40 hover:text-white text-xl">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div id="modContent"></div>
    </div>
</div>

<div id="toast-container"></div>

<script>
// ===== 12 ACCESS CODES =====
var ROLES = {
    "012443410": { role: "DEVELOPER", mods: ['all'] },
    "Mr.M_Architect_2025": { role: "MASTER", mods: ['all'] },
    "4dm1n_AF6969@00": { role: "ADMIN", mods: ['all'] },
    "LHPSsec_AF2025": { role: "SEKURITI", mods: ['sekuriti'] },
    "CHCS_AF_@003": { role: "JANITOR", mods: ['janitor-indoor','janitor-outdoor'] },
    "SACS_AF@004": { role: "STOK", mods: ['stok'] },
    "M41n_4F@234": { role: "MAINTENANCE", mods: ['maintenance'] },
    "4dm1n_6969@01": { role: "ASSET", mods: ['asset'] },
    "4dm1n_9696@02": { role: "GUDANG", mods: ['stok'] },
    "4553Tumum_AF@1112": { role: "ASSET", mods: ['asset'] },
    "user_@1234": { role: "USER", mods: ['booking'] },
    "user_@2345": { role: "USER", mods: ['k3'] }
};

// ===== 9 MODULES =====
var MODS = [
    { id: 'booking', name: 'Booking', icon: '📅' },
    { id: 'k3', name: 'K3 Report', icon: '⚠️' },
    { id: 'sekuriti', name: 'Sekuriti', icon: '🛡️' },
    { id: 'janitor-indoor', name: 'Janitor In', icon: '🧹' },
    { id: 'janitor-outdoor', name: 'Janitor Out', icon: '🌿' },
    { id: 'stok', name: 'Alat & Stok', icon: '📦' },
    { id: 'maintenance', name: 'Maintenance', icon: '🔧' },
    { id: 'asset', name: 'Asset', icon: '🏢' },
    { id: 'commandcenter', name: 'Command', icon: '📊' }
];

// ===== TRANSLATIONS =====
var TRANSLATIONS = {
    id: { b: 'بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ', s: 'اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ', mods: ['Booking', 'Laporan K3', 'Sekuriti', 'Janitor In', 'Janitor Out', 'Stok Alat', 'Maintenance', 'Aset', 'Panel Utama'] },
    en: { b: 'In the name of Allah', s: 'Blessing for Sayyidina Muhammad', mods: ['Booking', 'K3 Report', 'Security', 'Janitor In', 'Janitor Out', 'Stock', 'Maintenance', 'Asset', 'Command Center'] },
    ar: { b: 'بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ', s: 'اللَّهُمَّ صَلِّ عَلَى سَيِّدِنَا مُحَمَّدٍ', mods: ['الحجز', 'تقرير K3', 'الأمن', 'عامل داخلي', 'عامل خارجي', 'المخزن', 'الصيانة', 'الأصول', 'مركز القيادة'] }
};
var curMods = [], sessionTimer = null, sessionTime = 300;

// ===== TOAST =====
function toast(msg, ok) {
    var t = document.createElement('div');
    t.className = 'toast';
    t.textContent = (ok ? '✅ ' : '❌ ') + msg;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(function() { t.remove(); }, 3000);
}

// ===== TOGGLE PASSWORD =====
document.getElementById('toggleBtn').addEventListener('click', function() {
    var p = document.getElementById('passkey');
    var i = document.getElementById('eyeIcon');
    p.type = p.type === 'password' ? 'text' : 'password';
    i.className = p.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
});

// ===== SIMULATE FINGERPRINT =====
function simulateFingerprint() {
    var msg = document.getElementById('msg');
    msg.innerText = "SCANNING FINGERPRINT...";
    msg.className = "text-emerald-400 text-[10px] font-bold";
    setTimeout(function() {
        msg.innerText = "BIOMETRIC REQUIRES NATIVE APP";
        msg.className = "text-yellow-400 text-[10px] font-bold";
    }, 1500);
}

// ===== LOGIN =====
document.getElementById('loginBtn').addEventListener('click', function() {
    var k = document.getElementById('passkey').value.trim();
    var msg = document.getElementById('msg');
    var u = ROLES[k];
    
    if (!u) {
        msg.innerText = '❌ Access Denied!';
        toast('Access Denied!', false);
        setTimeout(function() { msg.innerText = ''; }, 2000);
        return;
    }
    
    curMods = u.mods;
    sessionStorage.setItem('role', u.role);
    sessionStorage.setItem('mods', JSON.stringify(u.mods));
    sessionStorage.setItem('lang', document.getElementById('langSwitch').value);
    
    var body = document.getElementById('masterBody');    sessionStorage.setItem('darkMode', body.classList.contains('bg-slate-50') ? 'light' : 'dark');
    
    msg.innerText = '';
    document.getElementById('loginZone').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    
    toast('Welcome, ' + u.role + '!', true);
    renderNodes(document.getElementById('langSwitch').value);
    startSessionTimer();
});

// ===== SESSION TIMER =====
function startSessionTimer() {
    sessionTime = 300;
    var display = document.getElementById('sessionTimer');
    sessionTimer = setInterval(function() {
        sessionTime--;
        var m = Math.floor(sessionTime / 60);
        var s = sessionTime % 60;
        display.textContent = m + ':' + (s < 10 ? '0' : '') + s;
        if (sessionTime <= 0) {
            clearInterval(sessionTimer);
            toast('Session expired!', false);
            sessionStorage.clear();
            location.reload();
        }
    }, 1000);
}

// ===== RENDER MODULES =====
function renderNodes(lang) {
    var grid = document.getElementById('nodeGrid');
    var icons = ['📅', '⚠️', '🛡️', '🧹', '🌿', '📦', '🔧', '🏢', '📊'];
    var modNames = TRANSLATIONS[lang].mods;
    
    grid.innerHTML = '';
    for (var i = 0; i < MODS.length; i++) {
        var m = MODS[i];
        if (curMods.indexOf(m.id) !== -1 || curMods.indexOf('all') !== -1) {
            var c = document.createElement('div');
            c.className = 'module-card';
            c.onclick = (function(id) { return function() { openModule(id); }; })(m.id);
            c.innerHTML = '<div class="text-2xl mb-2">' + icons[i] + '</div><div class="text-[8px] font-bold uppercase">' + modNames[i] + '</div>';
            grid.appendChild(c);
        }
    }
}

// ===== OPEN MODULE =====
function openModule(id) {    document.getElementById('modWindow').classList.remove('hidden');
    document.getElementById('modContent').innerHTML = '<div class="text-center py-20"><div class="text-4xl mb-4">⏳</div><p class="text-emerald-400">Loading ' + id + '...</p></div>';
    
    fetch('./modules/' + id + '/index.html')
        .then(function(r) { return r.text(); })
        .then(function(h) { document.getElementById('modContent').innerHTML = h; })
        .catch(function(e) { document.getElementById('modContent').innerHTML = '<div class="text-center py-20"><p class="text-red-400">Module not found: ' + id + '</p></div>'; });
}

// ===== CLOSE MODULE =====
function closeModule() {
    document.getElementById('modWindow').classList.add('hidden');
}

document.getElementById('closeModBtn').addEventListener('click', closeModule);
document.getElementById('closeModBtn2').addEventListener('click', closeModule);

// ===== LOGOUT =====
function doLogout() {
    sessionStorage.clear();
    location.reload();
}

// ===== TOGGLE MODE =====
function toggleMode() {
    var body = document.getElementById('masterBody');
    var btn = document.getElementById('modeBtn');
    body.classList.toggle('bg-slate-50');
    body.style.setProperty('--bg', body.classList.contains('bg-slate-50') ? '#f8fafc' : '#020617');
    body.style.setProperty('--text', body.classList.contains('bg-slate-50') ? '#020617' : '#ffffff');
    btn.classList.toggle('dark-active');
    sessionStorage.setItem('darkMode', body.classList.contains('bg-slate-50') ? 'light' : 'dark');
}

// ===== CHANGE LANG =====
function changeLang() {
    var lang = document.getElementById('langSwitch').value;
    document.getElementById('bismillahTxt').innerText = TRANSLATIONS[lang].b;
    document.getElementById('shalawatTxt').innerText = TRANSLATIONS[lang].s;
    sessionStorage.setItem('lang', lang);
    renderNodes(lang);
}

// ===== CHECK SESSION =====
function checkSession() {
    var r = sessionStorage.getItem('role');
    var m = sessionStorage.getItem('mods');
    var lang = sessionStorage.getItem('lang') || 'id';
    var darkMode = sessionStorage.getItem('darkMode') || 'dark';
        if (r && m) {
        curMods = JSON.parse(m);
        document.getElementById('loginZone').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        document.getElementById('langSwitch').value = lang;
        
        if (darkMode === 'light') {
            document.getElementById('masterBody').classList.add('bg-slate-50');
            document.getElementById('modeBtn').classList.add('dark-active');
        }
        
        renderNodes(lang);
        startSessionTimer();
        toast('Welcome back!', true);
    }
}

// ===== ENTER KEY LOGIN =====
document.getElementById('passkey').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        document.getElementById('loginBtn').click();
    }
});

// ===== ANTI-SCREENSHOT =====
document.addEventListener('keyup', function(e) {
    if (e.key === 'PrintScreen' || e.keyCode === 44) {
        navigator.clipboard.writeText('');
        alert('SECURITY ALERT: Screenshot Disabled!');
    }
});

document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && (e.key === 'p' || e.key === 's' || e.key === 'u')) {
        e.preventDefault();
        alert('ISO 27001: Data Protection Active');
    }
});

// ===== INIT =====
document.addEventListener('DOMContentLoaded', function() {
    checkSession();
    console.log('💎 Dream OS v2.0 - Secure Core Ready!');
    console.log('🔑 12 Access Codes | 📱 9 Modules | 🔒 Session Secure');
});
</script>

</body>
</html>
