<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream OS v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-white min-h-screen">

<div id="toast-container" class="fixed top-4 right-4 z-50"></div>

<!-- LOGIN -->
<div id="login-zone" class="fixed inset-0 z-40 flex items-center justify-center bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900">
    <div class="bg-white/10 backdrop-blur-xl p-8 rounded-3xl border border-white/20 max-w-sm w-full mx-4">
        <div class="text-center">
            <div class="text-5xl mb-3">🚀</div>
            <h1 class="text-2xl font-black text-emerald-400 mb-1">Dream OS v2.0</h1>
            <p class="text-xs text-slate-400 mb-6">The Power Soul of Shalawat</p>
            <p class="text-lg text-emerald-300 mb-4">بِسْمِ اللَّهِ</p>
            
            <div class="relative mb-4">
                <input type="password" id="passkey" class="w-full p-3 pr-12 rounded-xl bg-slate-800 border border-slate-700 text-white text-center font-mono" placeholder="Access Code">
                <button type="button" id="toggleBtn" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400" onclick="togglePass()">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
            
            <button id="loginBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 p-3 rounded-xl font-bold" onclick="doLogin()">
                🔓 Login
            </button>
            
            <p id="errMsg" class="text-red-400 text-xs mt-3 hidden"></p>
            <p class="text-[8px] text-slate-500 mt-6">Dream Team © 2026</p>
        </div>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden max-w-7xl mx-auto p-4">
    <div class="bg-slate-800 rounded-2xl p-4 mb-6 flex justify-between items-center">
        <h1 class="text-xl font-bold text-emerald-400">Dream OS v2.0</h1>
        <div class="flex items-center gap-2">
            <span id="userRole" class="text-sm text-slate-300"></span>
            <button class="bg-red-600 px-3 py-1 rounded-lg text-xs" onclick="doLogout()">Logout</button>
        </div>
    </div>
    <div id="moduleGrid" class="grid grid-cols-3 md:grid-cols-4 gap-4"></div>
</div>
<!-- MODULE WINDOW -->
<div id="modWindow" class="hidden fixed inset-0 bg-slate-900/95 z-50 overflow-y-auto p-4">
    <div class="max-w-7xl mx-auto">
        <button class="mb-4 text-emerald-400" onclick="closeMod()">← Back</button>
        <div id="modContent"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// Config
const SB_URL = 'https://pvznaeppaagylwddirla.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2em5hZXBwYWFneWx3ZGRpcmxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NTEwNDMsImV4cCI6MjA4NzUyNzA0M30.t9SJi3VfsBDkKmeZ3egZ4rbvljl4xe0WwNkPtfA9-vo';
const supabase = window.supabase.createClient(SB_URL, SB_KEY);

// Roles
const ROLES = {
    "012443410": { role: "DEVELOPER", mods: ['booking','k3','dana','admin'] },
    "Mr.M_Architect_2025": { role: "MASTER", mods: ['booking','k3','dana','admin'] },
    "4dm1n_AF6969@00": { role: "ADMIN", mods: ['booking','k3','dana','admin'] },
    "user_@1234": { role: "USER", mods: ['booking'] },
    "user_@2345": { role: "USER", mods: ['k3'] }
};

// Modules
const MODS = [
    { id: 'booking', name: 'BOOKING', icon: '📅' },
    { id: 'k3', name: 'K3 REPORT', icon: '⚠️' },
    { id: 'dana', name: 'DANA', icon: '💰' },
    { id: 'admin', name: 'ADMIN', icon: '📊' }
];

let curRole = null;
let curMods = [];

// Toast
function toast(msg, ok) {
    var t = document.createElement('div');
    t.className = 'fixed top-4 right-4 px-4 py-2 rounded-lg text-white text-sm z-50 ' + (ok ? 'bg-green-600' : 'bg-red-600');
    t.textContent = msg;
    document.getElementById('toast-container').appendChild(t);
    setTimeout(function() { t.remove(); }, 3000);
}

// Toggle Password
function togglePass() {
    var p = document.getElementById('passkey');
    var i = document.querySelector('#toggleBtn i');
    if (p.type === 'password') {        p.type = 'text';
        i.className = 'fas fa-eye-slash';
    } else {
        p.type = 'password';
        i.className = 'fas fa-eye';
    }
}

// Login
function doLogin() {
    var k = document.getElementById('passkey').value.trim();
    var err = document.getElementById('errMsg');
    var u = ROLES[k];
    
    console.log('Login attempt:', k);
    console.log('User data:', u);
    
    if (!u) {
        err.textContent = '❌ Access Denied!';
        err.className = 'text-red-400 text-xs mt-3';
        toast('Access Denied!', false);
        setTimeout(function() { err.className = 'text-red-400 text-xs mt-3 hidden'; }, 2000);
        return;
    }
    
    curRole = u.role;
    curMods = u.mods;
    
    sessionStorage.setItem('role', u.role);
    sessionStorage.setItem('mods', JSON.stringify(u.mods));
    
    toast('Welcome, ' + u.role + '!', true);
    
    document.getElementById('login-zone').className = 'hidden';
    document.getElementById('dashboard').className = 'max-w-7xl mx-auto p-4';
    document.getElementById('userRole').textContent = u.role;
    
    renderMods();
}

// Render Modules
function renderMods() {
    var g = document.getElementById('moduleGrid');
    g.innerHTML = '';
    
    for (var i = 0; i < MODS.length; i++) {
        var m = MODS[i];
        if (curMods.indexOf(m.id) !== -1) {
            var c = document.createElement('div');
            c.className = 'bg-slate-800 hover:bg-slate-700 p-6 rounded-2xl text-center cursor-pointer';            c.onclick = function(mid) { return function() { openMod(mid); }; }(m.id);
            c.innerHTML = '<div class="text-4xl mb-3">' + m.icon + '</div><div class="text-xs font-bold">' + m.name + '</div>';
            g.appendChild(c);
        }
    }
}

// Open Module
function openMod(id) {
    console.log('Opening module:', id);
    document.getElementById('modWindow').className = 'hidden fixed inset-0 bg-slate-900/95 z-50 overflow-y-auto p-4';
    document.getElementById('modContent').innerHTML = '<div class="text-center py-20"><p class="text-emerald-400">Loading ' + id + '...</p></div>';
    
    fetch('./modules/' + id + '/index.html')
        .then(function(r) { return r.text(); })
        .then(function(h) {
            document.getElementById('modContent').innerHTML = h;
        })
        .catch(function(e) {
            document.getElementById('modContent').innerHTML = '<p class="text-red-400">Error: ' + e.message + '</p>';
        });
}

// Close Module
function closeMod() {
    document.getElementById('modWindow').className = 'hidden';
}

// Logout
function doLogout() {
    sessionStorage.clear();
    location.reload();
}

// Check Session
function checkSession() {
    var r = sessionStorage.getItem('role');
    var m = sessionStorage.getItem('mods');
    
    if (r && m) {
        curRole = r;
        curMods = JSON.parse(m);
        
        document.getElementById('login-zone').className = 'hidden';
        document.getElementById('dashboard').className = 'max-w-7xl mx-auto p-4';
        document.getElementById('userRole').textContent = r;
        
        renderMods();
        toast('Welcome back!', true);
    }}

// Init
console.log('Dream OS v2.0 Starting...');
checkSession();
</script>

</body>
</html>
