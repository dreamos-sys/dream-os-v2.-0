<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream OS v2.0 | Test</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #020617; 
            color: white; 
            font-family: sans-serif; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .login-box {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 2rem;
            max-width: 400px;
            width: 100%;
        }
        .input-group {
            position: relative;
            margin-bottom: 1rem;
        }
        .input-group input {
            width: 100%;
            padding: 14px 50px 14px 14px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .input-group input:focus {
            border-color: #10b981;
        }
        .eye-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(16,185,129,0.3);            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            z-index: 9999;
        }
        .eye-btn:hover {
            background: rgba(16,185,129,0.5);
        }
        .eye-btn:active {
            transform: translateY(-50%) scale(0.95);
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
        }
        .login-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="login-box">
    <h1 style="text-align: center; margin-bottom: 1.5rem; color: #10b981;">🚀 Dream OS v2.0</h1>
    <p style="text-align: center; margin-bottom: 1.5rem; opacity: 0.6;">Test Show/Hide Password</p>
    
    <div class="input-group">
        <input type="password" id="passkey" placeholder="Access Code">
        <button type="button" class="eye-btn" id="eyeBtn">
            <i class="fas fa-eye" id="eyeIcon"></i>
        </button>
    </div>
    
    <button class="login-btn" onclick="testLogin()">🔓 Test Login</button>
    <p id="msg" style="text-align: center; margin-top: 1rem; color: #ef4444;"></p>
</div>
<script>
// SIMPLE TEST - PASTI JALAN!
const eyeBtn = document.getElementById('eyeBtn');
const passkey = document.getElementById('passkey');
const eyeIcon = document.getElementById('eyeIcon');

console.log('🔍 Test Script Loaded!');
console.log('👁️ Eye Button:', eyeBtn);
console.log('🔑 Input:', passkey);

// DIRECT EVENT LISTENER
eyeBtn.addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();
    console.log('👁️ EYE BUTTON CLICKED!');
    
    if (passkey.type === 'password') {
        passkey.type = 'text';
        eyeIcon.className = 'fas fa-eye-slash';
        console.log('✅ Password Visible');
    } else {
        passkey.type = 'password';
        eyeIcon.className = 'fas fa-eye';
        console.log('✅ Password Hidden');
    }
});

// TEST LOGIN
function testLogin() {
    const code = passkey.value.trim();
    const msg = document.getElementById('msg');
    
    if (!code) {
        msg.textContent = '❌ Masukkan code!';
        return;
    }
    
    msg.style.color = '#10b981';
    msg.textContent = '✅ Code: ' + code + ' (Check console!)';
    console.log('🔑 Login Code:', code);
}

// ENTER KEY
passkey.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') testLogin();
});

console.log('✅ Test Ready! Try click eye button!');
</script>
</body>
</html>
