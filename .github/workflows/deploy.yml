name: Deploy Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}   # Bisa juga pakai ini, tapi lebih baik di wrangler.toml
          workingDirectory: 'workers'   # <-- PENTING: arahkan ke folder workers
          secrets: |
            SUPABASE_ANON_KEY
            WEATHER_API_KEY
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
