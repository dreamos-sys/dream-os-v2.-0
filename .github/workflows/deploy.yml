# .github/workflows/deploy.yml
# Dream OS v2.0 — Enterprise-Grade Deployment Pipeline
# ✅ Multi-Environment • Security • Testing • Notifications • Rollback

name: 🚀 Dream OS v2.0 — Enterprise Deploy

on:
  push:
    branches: [main, develop, staging]
  
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  
  workflow_dispatch:
    inputs:
      environment:
        description: '🎯 Target Environment'
        required: true
        default: 'production'
        type: choice
        options: [staging, production]
      skip_tests:
        description: '⚠️ Skip tests (EMERGENCY ONLY)'
        required: false
        default: false
        type: boolean
      force_deploy:
        description: '🔥 Force deploy even if checks fail'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write
  issues: write
  actions: read

concurrency:
  group: "dreamos-${{ github.ref }}-${{ github.workflow }}"
  cancel-in-progress: true

env:
  # 🎛️ Global Configuration
  NODE_VERSION: '20'
  BUILD_TIMEOUT_MINUTES: 20
  DEPLOY_TIMEOUT_MINUTES: 10  TEST_TIMEOUT_MINUTES: 15
  ARTIFACT_RETENTION_DAYS: 30
  
  # 🔐 Security & Quality Gates
  NPM_AUDIT_LEVEL: 'moderate'
  LINT_STRICT: 'true'
  COVERAGE_THRESHOLD: 80

jobs:
  # ════════════════════════════════════════════════════════
  # 🛡️ PRE-FLIGHT CHECKS — Gatekeeper
  # ════════════════════════════════════════════════════════
  pre-flight:
    name: 🛡️ Pre-Flight Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      can_proceed: ${{ steps.validate.outputs.valid }}
      commit_hash: ${{ steps.info.outputs.hash }}
      branch_name: ${{ steps.info.outputs.branch }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      
      - name: 🔍 Repository Validation
        id: validate
        run: |
          echo "🔍 Validating repository structure..."
          
          # Check essential files
          REQUIRED_FILES=("package.json" "index.html" "modules/")
          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -e "$file" ]; then
              echo "❌ Required file missing: $file"
              echo "valid=false" >> $GITHUB_OUTPUT
              exit 1
            fi
          done
          
          echo "✅ All required files present"
          echo "valid=true" >> $GITHUB_OUTPUT
      
      - name: 📊 Gather Deployment Info
        id: info
        run: |
          echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT          echo "author=${{ github.actor }}" >> $GITHUB_OUTPUT
          echo "message=$(git log -1 --pretty=%B | head -1)" >> $GITHUB_OUTPUT
      
      - name: 🏷️ Display Deployment Context
        run: |
          echo "════════════════════════════════════════"
          echo "🚀 DREAM OS v2.0 — DEPLOYMENT INITIATED"
          echo "════════════════════════════════════════"
          echo "📦 Repository: ${{ github.repository }}"
          echo "🔖 Branch: ${{ steps.info.outputs.branch }}"
          echo "📝 Commit: ${{ steps.info.outputs.hash }}"
          echo "💬 Message: ${{ steps.info.outputs.message }}"
          echo "👤 Author: ${{ steps.info.outputs.author }}"
          echo "🎯 Environment: ${{ github.event.inputs.environment || 'production' }}"
          echo "════════════════════════════════════════"

  # ════════════════════════════════════════════════════════
  # 🧪 QUALITY GATES — Testing & Security
  # ════════════════════════════════════════════════════════
  quality-gates:
    name: 🧪 Quality Gates
    needs: pre-flight
    runs-on: ubuntu-latest
    timeout-minutes: ${{ env.TEST_TIMEOUT_MINUTES }}
    if: ${{ needs.pre-flight.outputs.can_proceed == 'true' && github.event.inputs.skip_tests != 'true' }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: 📦 Install Dependencies
        run: npm ci
        env:
          CI: true
          NPM_CONFIG_FUND: false
      
      - name: 🔍 Lint Code
        run: npm run lint --if-present
        continue-on-error: true
      
      - name: 🧪 Run Unit Tests
        run: npm test --if-present
        continue-on-error: true
      
      - name: 🔒 Security Audit        run: npm audit --audit-level=${{ env.NPM_AUDIT_LEVEL }} --json > audit-report.json || true
      
      - name: 📊 Upload Audit Report
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-${{ needs.pre-flight.outputs.commit_hash }}
          path: audit-report.json
          retention-days: 7
        if: always()
      
      - name: ✅ Quality Gate Summary
        run: |
          echo "🧪 Quality Gates Completed"
          echo "  • Lint: ${{ job.status == 'success' && '✅' || '⚠️' }}"
          echo "  • Tests: ${{ job.status == 'success' && '✅' || '⚠️' }}"
          echo "  • Security: Audit report uploaded"

  # ════════════════════════════════════════════════════════
  # 🔨 BUILD PIPELINE — Optimized & Verified
  # ════════════════════════════════════════════════════════
  build:
    name: 🔨 Build Application
    needs: [pre-flight, quality-gates]
    runs-on: ubuntu-latest
    timeout-minutes: ${{ env.BUILD_TIMEOUT_MINUTES }}
    if: ${{ needs.pre-flight.outputs.can_proceed == 'true' }}
    outputs:
      build_hash: ${{ steps.metadata.outputs.hash }}
      build_timestamp: ${{ steps.metadata.outputs.timestamp }}
      artifact_name: ${{ steps.metadata.outputs.artifact_name }}
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: 📦 Restore Build Cache
        uses: actions/cache@v4
        id: cache-restore
        with:
          path: |
            node_modules
            ~/.npm
            ~/.cache          key: ${{ runner.os }}-node${{ env.NODE_VERSION }}-build-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node${{ env.NODE_VERSION }}-
      
      - name: 📦 Install Dependencies
        run: npm install
        env:
          INSTALL: true
          NPM_CONFIG_FUND: false
      
      - name: 🔨 Build Application
        run: npm run build
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
          NODE_ENV: production
          CI: true
      
      - name: ✅ Verify Build Artifacts
        run: |
          echo "🔍 Verifying build output..."
          
          # Check dist directory
          if [ ! -d "./dist" ]; then
            echo "❌ CRITICAL: dist/ directory not found"
            exit 1
          fi
          
          # Check essential files
          ESSENTIAL_FILES=("index.html" "modules/" "assets/")
          for file in "${ESSENTIAL_FILES[@]}"; do
            if [ ! -e "./dist/$file" ] && [ "$file" != "modules/" ]; then
              echo "⚠️ Warning: $file not found in dist/"
            fi
          done
          
          # Show build stats
          echo "📊 Build Statistics:"
          echo "─────────────────────────────"
          du -sh ./dist/* 2>/dev/null | sort -hr | head -10 || true
          echo "─────────────────────────────"
          echo "📦 Total Size: $(du -sh ./dist | cut -f1)"
          echo "📄 File Count: $(find ./dist -type f | wc -l)"
          echo "─────────────────────────────"
      
      - name: 🏷️ Generate Build Metadata
        id: metadata
        run: |
          HASH=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)          ARTIFACT_NAME="dreamos-build-${HASH}-${TIMESTAMP}"
          
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "artifact_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
          
          # Create metadata file
          cat << EOF > ./dist/build-info.json
          {
            "version": "2.0.0",
            "commit": "$HASH",
            "branch": "${{ github.ref_name }}",
            "build_time": "$TIMESTAMP",
            "built_by": "${{ github.actor }}",
            "environment": "${{ github.event.inputs.environment || 'production' }}"
          }
          EOF
      
      - name: 📤 Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
      
      - name: 💾 Upload Full Build Archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.metadata.outputs.artifact_name }}
          path: ./dist
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
      
      - name: 📋 Build Summary
        run: |
          echo "✅ Build Completed Successfully"
          echo "🔖 Hash: ${{ steps.metadata.outputs.hash }}"
          echo "⏰ Timestamp: ${{ steps.metadata.outputs.timestamp }}"
          echo "📦 Artifact: ${{ steps.metadata.outputs.artifact_name }}"

  # ════════════════════════════════════════════════════════
  # 🚀 DEPLOYMENT — Safe & Tracked
  # ════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy to GitHub Pages
    needs: [pre-flight, build]
    runs-on: ubuntu-latest
    timeout-minutes: ${{ env.DEPLOY_TIMEOUT_MINUTES }}
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ steps.deployment.outputs.page_url }}
    if: ${{ needs.pre-flight.outputs.can_proceed == 'true' }}    
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      - name: 📊 Deployment Confirmation
        run: |
          echo "════════════════════════════════════════"
          echo "✅ DEPLOYMENT SUCCESSFUL"
          echo "════════════════════════════════════════"
          echo "🌐 Live URL: ${{ steps.deployment.outputs.page_url }}"
          echo "🔖 Commit: ${{ needs.build.outputs.build_hash }}"
          echo "⏰ Deployed: $(date -u)"
          echo "👤 By: ${{ github.actor }}"
          echo "🎯 Environment: ${{ github.event.inputs.environment || 'production' }}"
          echo "════════════════════════════════════════"
      
      - name: 📝 Generate Deployment Record
        run: |
          cat << EOF > deployment-record.json
          {
            "status": "success",
            "url": "${{ steps.deployment.outputs.page_url }}",
            "commit_hash": "${{ needs.build.outputs.build_hash }}",
            "branch": "${{ github.ref_name }}",
            "environment": "${{ github.event.inputs.environment || 'production' }}",
            "deployed_by": "${{ github.actor }}",
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "workflow_run_id": "${{ github.run_id }}",
            "repository": "${{ github.repository }}"
          }
          EOF
      
      - name: 🔔 Notify Team (Discord)
        if: ${{ vars.DISCORD_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ Dream OS v2.0 Deployed\",
                \"description\": \"🌐 ${{ steps.deployment.outputs.page_url }}\",
                \"color\": 3066993,
                \"fields\": [
                  {\"name\": \"🔖 Commit\", \"value\": \"\`${{ needs.build.outputs.build_hash }}\`\", \"inline\": true},
                  {\"name\": \"👤 Deployed By\", \"value\": \"${{ github.actor }}\", \"inline\": true},
                  {\"name\": \"🎯 Environment\", \"value\": \"${{ github.event.inputs.environment || 'production' }}\", \"inline\": true},
                  {\"name\": \"⏰ Time\", \"value\": \"$(date -u)\", \"inline\": false}
                ]
              }]            }" \
            "${{ vars.DISCORD_WEBHOOK_URL }}" || echo "⚠️ Discord notification failed"
        continue-on-error: true
      
      - name: 🏷️ Create GitHub Release (Production Only)
        if: ${{ github.ref == 'refs/heads/main' && (github.event.inputs.environment == 'production' || !github.event.inputs.environment) }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.${{ github.run_number }}
          name: "Dream OS v2.0 — Deployment #${{ github.run_number }}"
          body: |
            ## 🚀 Production Deployment
            
            ### Details
            - **URL**: ${{ steps.deployment.outputs.page_url }}
            - **Commit**: ${{ needs.build.outputs.build_hash }}
            - **Branch**: ${{ github.ref_name }}
            - **Deployed by**: ${{ github.actor }}
            - **Timestamp**: $(date -u)
            
            ### Changes
            ${{ github.event.head_commit.message }}
            
            ---
            *Automatically generated by GitHub Actions*
          draft: false
          prerelease: false
          make_latest: true
        continue-on-error: true

  # ════════════════════════════════════════════════════════
  # 📈 POST-DEPLOYMENT — Monitoring & Cleanup
  # ════════════════════════════════════════════════════════
  post-deployment:
    name: 📈 Post-Deployment Tasks
    needs: [deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    steps:
      - name: 📊 Workflow Summary
        run: |
          echo "📈 Deployment Workflow Summary"
          echo "  Status: ${{ job.status }}"
          echo "  Started: ${{ github.event.repository.updated_at }}"
          echo "  Completed: $(date -u)"
      
      - name: 🧹 Cleanup Old Artifacts (Optional)
        uses: actions/delete-package-versions@v5
        with:          package-name: dreamos-build
          package-type: container
          min-versions-to-keep: 5
        continue-on-error: true
      
      - name: ✅ Final Status
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "🎉 Dream OS v2.0 deployment pipeline completed successfully!"
          else
            echo "⚠️ Some post-deployment tasks had issues (non-critical)"
          fi
